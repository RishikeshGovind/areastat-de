              `<span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:50%;background:${s.color};flex-shrink:0"></span>${escapeHtml(s.label)}</span>`
            ).join('');
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
          });

          grid.appendChild(card);
        });

        sec.appendChild(grid);
        container.appendChild(sec);
      }

      // ══ INITIALISATION ══════════════════════════════════════════════════════════
      document.addEventListener('DOMContentLoaded', async () => {
        applyLang();

        // Pre-warm HuggingFace Spaces silently — free tier goes cold after inactivity,
        // cold start takes 30-60s. Pinging now means the Space is ready by the time
        // the user clicks the Analysis tab.
        Promise.allSettled([
          fetch(`${PLUMBER_BASE}/fiscal_risk_summary?ids=10101`).catch(() => {}),
          fetch(`${ML_BASE}/health`).catch(() => {}),
        ]);

        // Chart zoom overlay close handlers
        function closeChartZoom() {
          document.getElementById('chart-zoom-overlay').style.display = 'none';
          document.body.style.overflow = '';
        }
        document.getElementById('chart-zoom-close').addEventListener('click', closeChartZoom);
        document.getElementById('chart-zoom-overlay').addEventListener('click', e => {
          if (e.target === e.currentTarget) closeChartZoom();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChartZoom(); });

        if (!selectedIds.length) {
          document.getElementById('profile-loading').innerHTML =
            '<p style="color:#dc2626">No zones selected.<br><a href="./index.html" style="color:#1e3a5f;font-weight:500;">← Return to map</a></p>';
          return;
        }

        try {
          const data    = await fetch('./data.json').then(r => r.json());
          kommuneData   = data['Kommune']        || {};
          regionData      = data['Region']            || {};
          denmarkTotals = data['Denmark Total']   || {};
          window.denmarkTotals    = denmarkTotals;
          window.denmarkPopulation = totalPopulationForData(kommuneData);

          // Show content
          document.getElementById('profile-loading').style.display = 'none';
          document.getElementById('modal-toolbar').style.display   = '';
          document.getElementById('modal-body').style.display      = '';
          // modal-header (old breakdown bar) stays hidden — overview tab handles this

          window.selectedIdsExcel = new Set(selectedIds);
          window.chosenCategories = selectedCategories;

          // Compute aggregated data (no rendering side-effects that would conflict with new tabs)
          (function computeAggregated() {
            const src = currentZoneType === 'region' ? regionData : kommuneData;
            const agg = {};
            let totalPop = 0;
            selectedIds.forEach(id => {
              const z = src[id];
              if (!z) return;
              totalPop += getScalar(z['Population']) || 0;
              for (const [key, val] of Object.entries(z)) {
                if (excludedKeys.includes(key) || typeof val !== 'object' || val === null) continue;
                if (!agg[key]) agg[key] = {};
                for (const [ind, v] of Object.entries(val)) {
                  if (typeof v !== 'number') continue;
                  if (!agg[key][ind]) agg[key][ind] = { sum: 0, count: 0 };
                  agg[key][ind].sum += v;
                  agg[key][ind].count++;
                }
              }
            });
            latestAggregatedData = {};
            for (const [domain, inds] of Object.entries(agg)) {
              latestAggregatedData[domain] = {};
              for (const [ind, { sum, count }] of Object.entries(inds)) {
                latestAggregatedData[domain][ind] = isRatePer1000Indicator(domain, ind)
                  ? (totalPop > 0 ? parseFloat(((sum / totalPop) * 1000).toFixed(2)) : 0)
                  : (count > 0 ? parseFloat((sum / count).toFixed(2)) : 0);
              }
            }
            window.latestAggregatedData = latestAggregatedData;
            window.chosenCategories = DEFAULT_PROFILE_CATEGORIES;
            selectedCategories = DEFAULT_PROFILE_CATEGORIES;
          })();

          // Render Overview tab (default landing)
          renderOverview(selectedIds);

          // ── Tab bar
          const allTabContainers = {
            overview:     document.getElementById('overview-container'),
            demographics: document.getElementById('demographics-container'),
            economics:    document.getElementById('economics-container'),
            financial:    document.getElementById('financial-container'),
            'ml-export':  document.getElementById('ml-export-container'),
            explore:      document.getElementById('explorer-container'),
          };

          // Track which tabs have already been rendered
          const _rendered = new Set();

          document.querySelectorAll('.view-tab').forEach(tab => {
            tab.addEventListener('click', () => {
              document.querySelectorAll('.view-tab').forEach(btn => btn.classList.remove('selected'));
              tab.classList.add('selected');
              Object.values(allTabContainers).forEach(div => { if (div) div.style.display = 'none'; });

              const view = tab.getAttribute('data-view');
              currentView = view;

              const container = allTabContainers[view];
              if (!container) return;

              if (view === 'explore') {
                container.style.display = 'flex';
                initExplorer(new Set(selectedIds), currentZoneType);
                return;
              }

              if (view === 'demographics') {
                container.style.display = 'block';
                if (!_rendered.has('demographics')) {
                  renderDomainView('demographics-container', DEMO_DOMAINS);
                  _rendered.add('demographics');
                }
                return;
              }

              if (view === 'economics') {
                container.style.display = 'block';
                if (!_rendered.has('economics')) {
                  renderDomainView('economics-container', ECON_DOMAINS);
                  _rendered.add('economics');
                }
                return;
              }

              if (view === 'financial') {
                container.style.display = 'block';
                if (!_rendered.has('financial')) {
                  renderFinancial(selectedIds);
                  _rendered.add('financial');
                }
                return;
              }

              if (view === 'ml-export') {
                container.style.display = 'block';
                if (!_rendered.has('ml-export')) {
                  renderMLExport(selectedIds);
                  _rendered.add('ml-export');
                }
                return;
              }

              // overview
              container.style.display = 'block';
            });
          });

        } catch (err) {
          document.getElementById('profile-loading').style.display = 'none';
          const errDiv = document.getElementById('profile-error');
          errDiv.style.display = 'block';
          errDiv.innerHTML = `<strong>Error loading data:</strong> ${escapeHtml(err.message)}<br><br><a href="./index.html">← Return to map</a>`;
        }
      });

      // ══ OVERVIEW TAB ══════════════════════════════════════════════════════════

      function renderOverview(ids) {
        const container = document.getElementById('overview-container');
        if (!container) return;
        container.innerHTML = '';

        const dataSource = currentZoneType === 'region' ? regionData : kommuneData;
        const segCfg = SEGMENTATION_CONFIG[activeSegmentation];

          totalPop += getScalar(z['Population']) || 0;
          const segVal = getScalar(z[segCfg.dataKey]);
          if (segVal && segCounts[segVal] !== undefined) segCounts[segVal]++;
          const reg = getScalar(z['Region']) || 'Unknown';
          regionCounts[reg] = (regionCounts[reg] || 0) + 1;
          zoneRows.push({ id, name: zoneName(id), region: reg, pop: getScalar(z['Population']) || 0, seg: segVal || '–' });

        tbl.innerHTML = `<thead><tr style="background:#1e3a5f;color:#fff;">

          <th style="padding:.55rem .9rem;text-align:left;font-weight:600;">Region</th>
          <th style="padding:.55rem .9rem;text-align:right;font-weight:600;">Population</th>
          <th style="padding:.55rem .9rem;text-align:left;font-weight:600;">Type</th>
        </tr></thead>`;

        zoneRows.sort((a,b) => b.pop - a.pop).forEach((z, i) => {
          const tr = document.createElement('tr');

        miniMapDiv.id = 'zone-minimap';
        miniMapDiv.style.cssText = 'display:none;width:100%;max-width:420px;height:220px;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb;background:#f3f4f6;margin-top:.6rem;';

        mapBtn.addEventListener('click', () => {

      // ══ DEMOGRAPHICS / ECONOMICS DOMAIN VIEWS ════════════════════════════════

      function renderDomainView(containerId, domains) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';

        const avail = Object.keys(latestAggregatedData);
        const valid = domains.filter(d => avail.includes(d));
        if (!valid.length) {
          container.innerHTML = '<p style="padding:2rem;color:#6b7280;">No data available for selected zones.</p>';
          return;
        }

        // Charts grid
        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.25rem;padding:1.5rem;';

        valid.forEach(domain => {
          const values = latestAggregatedData[domain];
          if (!values) return;
          const atDomain = denmarkTotals[domain] || {};

          const card = document.createElement('div');
          card.className = 'css-chart-domain-card';

          const head = document.createElement('div');
          head.className = 'css-chart-domain-head';
          head.innerHTML = `<span class="css-chart-domain-title">${escapeHtml(tDomain(domain))}</span>
            <span class="css-chart-at-legend"><span class="css-chart-at-swatch"></span>Denmark avg</span>`;
          card.appendChild(head);

          Object.entries(values).forEach(([rawLabel, value]) => {
            if (typeof value !== 'number') return;
            const atVal  = comparableDenmarkValue(domain, rawLabel, atDomain[rawLabel]);
            const fmt    = v => formatIndicatorValue(domain, rawLabel, v);
            const label  = displayIndicatorLabel(domain, rawLabel);
            const maxVal = Math.max(value, atVal ?? 0) * 1.12 || 1;
            const barPct = Math.min((value / maxVal) * 100, 100).toFixed(1);
            const atPct  = atVal != null ? Math.min((atVal / maxVal) * 100, 100).toFixed(1) : null;
            const overAT = atVal != null && value > atVal;

            const row = document.createElement('div');
            row.className = 'css-indicator-row';
            row.innerHTML = `
              <div class="css-indicator-meta">
                <span class="css-indicator-label">${escapeHtml(label)}</span>
                <span class="css-indicator-value">${escapeHtml(fmt(value))}${atVal != null ? ` <span class="css-indicator-at">(DK: ${escapeHtml(fmt(atVal))})</span>` : ''}</span>
              </div>
              <div class="css-bar-track">
                <div class="css-bar-fill${overAT ? ' over-at' : ''}" style="width:${barPct}%"></div>
                ${atPct != null ? `<div class="css-bar-at" style="left:${atPct}%"></div>` : ''}
              </div>`;
            card.appendChild(row);
          });

          grid.appendChild(card);
        });

        container.appendChild(grid);
      }

      // ══ FINANCIAL TAB — live DST NGLK fetch ══════════════════════════════════

      async function renderFinancial(ids) {
        const container = document.getElementById('financial-container');
        if (!container) return;

        if (currentZoneType !== 'kommune') {
          container.innerHTML = '<p style="padding:2rem;color:#6b7280;">Financial data is available at municipality (kommune) level only. Switch the geographic level on the map to Kommune.</p>';
          return;
        }

        container.innerHTML = `<div style="display:flex;align-items:center;gap:1rem;padding:2rem;color:#6b7280;font-size:.9rem;">
          <div style="width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:#4f46e5;border-radius:50%;animation:profile-spin .7s linear infinite;flex-shrink:0;"></div>
          Fetching municipal finance data from Statistics Denmark…
        </div>`;

        try {
          // NGLK: Key figures for municipal general economy. KOMKODE area var.
          // Variables: FUNKTION (line item), KOMKODE (municipality), TID (year)
          const latest = new Date().getFullYear() - 1;
          const koderParam = ids.map(id => id.padStart(4,'0')).join(',');

          const metaRes = await fetch('https://api.statbank.dk/v1/tableinfo/NGLK?lang=en');
          const meta    = await metaRes.json();

          // Find the FUNKTION variable values
          const funktionVar = (meta.variables || []).find(v => v.id === 'FUNKTION');
          const tidVar      = (meta.variables || []).find(v => v.id === 'TID');

          const allFunktioner = funktionVar ? funktionVar.values.map(v => v.id) : [];
          const latestYear    = tidVar ? tidVar.values[tidVar.values.length - 1].id : String(latest);
          const funktionLabels = {};
          if (funktionVar) funktionVar.values.forEach(v => { funktionLabels[v.id] = v.text; });

          // Fetch the data
          const body = {
            table: 'NGLK', format: 'JSONSTAT',
            valuePresentation: 'Value',
            variables: [
              { code: 'FUNKTION', values: allFunktioner.length ? allFunktioner : ['*'] },
              { code: 'KOMKODE',  values: ids.map(id => id.padStart(4,'0')) },
              { code: 'TID',      values: [latestYear] },
            ]
          };
          const dataRes  = await fetch('https://api.statbank.dk/v1/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const rawData = await dataRes.json();

          // Parse JSONSTAT
          const ds     = rawData.dataset || rawData;
          const dims   = ds.dimension;
          const values = ds.value;

          if (!dims || !values) throw new Error('Unexpected NGLK response format');

          const funktionIds  = dims.FUNKTION.category.index;
          const komIds       = dims.KOMKODE.category.index;
          const tidIds       = dims.TID.category.index;
          const funktionLbls = dims.FUNKTION.category.label;
          const komLbls      = dims.KOMKODE.category.label;

          const nF = Object.keys(funktionIds).length;
          const nK = Object.keys(komIds).length;
          const nT = Object.keys(tidIds).length;

          // Build lookup: komkode → funktion → value
          const table = {};
          Object.entries(komIds).forEach(([kom, ki]) => {
            table[kom] = {};
            Object.entries(funktionIds).forEach(([funk, fi]) => {
              const idx = fi * nK * nT + ki * nT + 0;
              table[kom][funk] = values[idx];
            });
          });

          // Render
          container.innerHTML = '';

          const header = document.createElement('div');
          header.style.cssText = 'padding:1.25rem 1.5rem .5rem;';
          header.innerHTML = `<h2 style="font-size:1rem;font-weight:700;color:#1e3a5f;margin:0 0 .25rem;">Municipal Finances — Key Figures (${escapeHtml(latestYear)})</h2>
            <p style="font-size:.78rem;color:#6b7280;margin:0;">Source: Statistics Denmark · NGLK · DKK 1,000 · <a href="https://api.statbank.dk" target="_blank" style="color:#4f46e5;">api.statbank.dk</a></p>`;
          container.appendChild(header);

          const scroll = document.createElement('div');
          scroll.style.cssText = 'overflow-x:auto;padding:0 1.5rem 1.5rem;';

          const tbl = document.createElement('table');
          tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:.78rem;white-space:nowrap;background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;';

          const funktionList = Object.keys(funktionIds);

          // Header row
          const thead = document.createElement('thead');
          const hRow = document.createElement('tr');
          hRow.innerHTML = `<th style="background:#1e3a5f;color:#fff;padding:.5rem .9rem;text-align:left;position:sticky;left:0;z-index:1;">Municipality</th>`;
          funktionList.forEach(fk => {
            const th = document.createElement('th');
            th.style.cssText = 'background:#1e3a5f;color:#fff;padding:.5rem .75rem;text-align:right;max-width:130px;';
            th.title = funktionLbls[fk] || fk;
            th.textContent = (funktionLbls[fk] || fk).substring(0, 22);
            hRow.appendChild(th);
          });
          thead.appendChild(hRow);
          tbl.appendChild(thead);

          const tbody = document.createElement('tbody');
          Object.entries(komIds).forEach(([kom, ki], ri) => {
            const tr = document.createElement('tr');
            tr.style.cssText = `border-bottom:1px solid #f0f0f0;${ri%2===1?'background:#f9fafb;':''}`;
            const nameTd = document.createElement('td');
            nameTd.style.cssText = 'padding:.45rem .9rem;font-weight:600;color:#1e3a5f;position:sticky;left:0;background:inherit;z-index:1;';
            nameTd.textContent = komLbls[kom] || kom;
            tr.appendChild(nameTd);
            funktionList.forEach(fk => {
              const td = document.createElement('td');
              td.style.cssText = 'padding:.45rem .75rem;text-align:right;font-family:"JetBrains Mono",monospace;color:#374151;';
              const v = table[kom]?.[fk];
              td.textContent = (v != null && !isNaN(v)) ? Number(v).toLocaleString() : '–';
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          tbl.appendChild(tbody);
          scroll.appendChild(tbl);
          container.appendChild(scroll);

        } catch (err) {
          container.innerHTML = `<div style="padding:2rem;color:#dc2626;background:#fef2f2;border-radius:8px;margin:1.5rem;">
            <strong>Could not load financial data.</strong><br>${escapeHtml(err.message)}<br>
            <small style="color:#6b7280;display:block;margin-top:.5rem;">Tip: Financial data requires kommuner selected (not regions), and a network connection to api.statbank.dk.</small>
          </div>`;
        }
      }

      // ══ ML EXPORT TAB — feature matrix + CSV download ════════════════════════

      function renderMLExport(ids) {
        const container = document.getElementById('ml-export-container');
        if (!container) return;
        container.innerHTML = '';

        const dataSource = currentZoneType === 'region' ? regionData : kommuneData;

        // Build flat feature rows
        const ALL_DOMAINS = [...DEMO_DOMAINS, ...ECON_DOMAINS];
        const colDefs = []; // { domain, indicator, colName }

        // Discover all columns from first valid zone
        for (const id of ids) {
          const z = dataSource[id];
          if (!z) continue;
          ALL_DOMAINS.forEach(domain => {
            const domData = z[domain];
            if (!domData) return;
            Object.keys(domData).forEach(indicator => {
              const colName = (domain + '_' + indicator)
                .replace(/[^a-zA-Z0-9_]/g, '_')
                .replace(/_+/g, '_')
                .replace(/_%_/g, '_pct_')
                .toLowerCase();
              if (!colDefs.find(c => c.colName === colName)) {
                colDefs.push({ domain, indicator, colName });
              }
            });
          });
          break;
        }

        const metaCols = ['zone_code', 'zone_name', 'region', 'population', 'urban_rural', 'settlement_class'];
        const allCols  = [...metaCols, ...colDefs.map(c => c.colName)];

        const rows = ids.map(id => {
          const z = dataSource[id];
          if (!z) return null;
          const row = {
            zone_code:       id,
            zone_name:       zoneName(id),
            region:          getScalar(z['Region']) || '',
            population:      getScalar(z['Population']) || 0,
            urban_rural:     getScalar(z['Urban_rural_status']) || '',
            settlement_class: getScalar(z['Settlement_class']) || '',
          };
          colDefs.forEach(({ domain, indicator, colName }) => {
            const v = z[domain]?.[indicator];
            row[colName] = typeof v === 'number' ? v : '';
          });
          return row;
        }).filter(Boolean);

        if (!rows.length) {
          container.innerHTML = '<p style="padding:2rem;color:#6b7280;">No zone data found.</p>';
          return;
        }

        // Header
        const hdr = document.createElement('div');
        hdr.style.cssText = 'padding:1.25rem 1.5rem .5rem;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.75rem;';
        hdr.innerHTML = `<div>
          <h2 style="font-size:1rem;font-weight:700;color:#1e3a5f;margin:0 0 .2rem;">ML Feature Matrix</h2>
          <p style="font-size:.78rem;color:#6b7280;margin:0;">${escapeHtml(String(rows.length))} zones &times; ${escapeHtml(String(allCols.length))} features &nbsp;&middot;&nbsp; Each row = one area &nbsp;&middot;&nbsp; Ready for model training</p>
        </div>
        <div style="display:flex;gap:.5rem;">
          <button id="ml-dl-csv" style="background:#4f46e5;color:#fff;border:none;border-radius:6px;padding:.45rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;">⬇ Download CSV</button>
          <button id="ml-dl-json" style="background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:6px;padding:.45rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;">⬇ JSON</button>
        </div>`;
        container.appendChild(hdr);

        // Column groups legend
        const legend = document.createElement('div');
        legend.style.cssText = 'padding:.25rem 1.5rem .9rem;display:flex;flex-wrap:wrap;gap:.4rem;';
        const groups = [
          { label: 'Meta', count: metaCols.length, color: '#6b7280' },
          { label: 'Demographics', count: colDefs.filter(c => DEMO_DOMAINS.includes(c.domain)).length, color: '#7c3aed' },
          { label: 'Economics', count: colDefs.filter(c => ECON_DOMAINS.includes(c.domain)).length, color: '#0e7490' },
        ];
        groups.forEach(g => {
          const chip = document.createElement('span');
          chip.style.cssText = `display:inline-flex;align-items:center;gap:.3rem;background:${g.color}18;border:1px solid ${g.color}40;color:${g.color};border-radius:99px;padding:.2rem .65rem;font-size:.72rem;font-weight:600;`;
          chip.textContent = `${g.label} (${g.count})`;
          legend.appendChild(chip);
        });
        container.appendChild(legend);

        // Table
        const scroll = document.createElement('div');
        scroll.style.cssText = 'overflow:auto;padding:0 1.5rem 1.5rem;max-height:60vh;';

        const tbl = document.createElement('table');
        tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:.75rem;white-space:nowrap;background:#fff;border:1px solid #e5e7eb;';

        const thead = document.createElement('thead');
        const hRow = document.createElement('tr');
        allCols.forEach((col, ci) => {
          const th = document.createElement('th');
          const isDemo = colDefs.find(c => c.colName === col && DEMO_DOMAINS.includes(c.domain));
          const isEcon = colDefs.find(c => c.colName === col && ECON_DOMAINS.includes(c.domain));
          const bg = ci < metaCols.length ? '#374151' : isDemo ? '#5b21b6' : '#0e7490';
          th.style.cssText = `background:${bg};color:#fff;padding:.45rem .65rem;text-align:left;position:sticky;top:0;font-weight:600;`;
          th.title = col;
          th.textContent = col.length > 20 ? col.substring(0,18) + '…' : col;
          hRow.appendChild(th);
        });
        thead.appendChild(hRow);
        tbl.appendChild(thead);

        const tbody = document.createElement('tbody');
        rows.forEach((row, ri) => {
          const tr = document.createElement('tr');
          tr.style.cssText = `border-bottom:1px solid #f0f0f0;${ri%2===1?'background:#f9fafb;':''}`;
          allCols.forEach((col, ci) => {
            const td = document.createElement('td');
            const isMeta = ci < metaCols.length;
            td.style.cssText = `padding:.38rem .65rem;${isMeta?'font-weight:500;color:#1e3a5f;':'font-family:"JetBrains Mono",monospace;color:#374151;text-align:right;'}`;
            const v = row[col];
            td.textContent = typeof v === 'number' ? (Number.isInteger(v) ? v.toLocaleString() : v.toFixed(2)) : String(v ?? '');
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        scroll.appendChild(tbl);
        container.appendChild(scroll);

        // CSV download
        document.getElementById('ml-dl-csv').addEventListener('click', () => {
          const lines = [allCols.join(',')];
          rows.forEach(row => {
            lines.push(allCols.map(col => {
              const v = row[col];
              const s = v == null ? '' : String(v);
              return s.includes(',') || s.includes('"') ? `"${s.replace(/"/g, '""')}"` : s;
            }).join(','));
          });
          const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `areastat_ml_features_${ids.length}zones.csv`;
          a.click();
        });

        // JSON download
        document.getElementById('ml-dl-json').addEventListener('click', () => {
          const blob = new Blob([JSON.stringify({ columns: allCols, rows }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `areastat_ml_features_${ids.length}zones.json`;
          a.click();
        });
      }

    </script>

  <div id="chart-zoom-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(10,20,40,0.82);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
    <div id="chart-zoom-box" style="background:#fff;border-radius:14px;padding:24px 28px 20px;width:92vw;max-width:1300px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 24px 64px rgba(0,0,0,0.35);">
      <button id="chart-zoom-close" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#64748b;line-height:1;" title="Close">✕</button>
      <div id="chart-zoom-title" style="font-size:15px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;padding-right:32px;"></div>
      <div id="chart-zoom-svg"></div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script>
    (function () {
      const ZONE_URLS = {
        kommune: [
          'https://api.dataforsyningen.dk/kommuner?format=geojson&srid=4326',
        ],
        sogn: [
          'https://api.dataforsyningen.dk/regioner?format=geojson&srid=4326',
        ],
      };

      function toGeoJSON(raw) {
        if (raw.type === 'Topology') {
          const key = Object.keys(raw.objects)[0];
          return topojson.feature(raw, raw.objects[key]);
        }
        return raw;
      }

      function getGkz(props, idx, zoneType) {
        // DAWA GeoJSON uses 'kode' property (4-char zero-padded string)
        if (props.kode != null && props.kode !== '') return String(props.kode);
        const candidates = [props.KOMKODE, props.SOGNKODE, props.id, props.ID];
        for (const c of candidates) {
          if (c != null && c !== '') return String(c);
        }
        return null;
      }

      async function fetchFirst(urls) {
        for (const url of urls) {
          try { const r = await fetch(url); if (r.ok) return r.json(); } catch (_) {}
        }
        return null;
      }

      window.initZoneMiniMap = async function (selectedIds, zoneType) {
        const container = document.getElementById('zone-minimap');
        if (!container || typeof maplibregl === 'undefined' || typeof topojson === 'undefined') return;

        const raw = await fetchFirst(ZONE_URLS[zoneType] || ZONE_URLS.sogn);
        if (!raw) return;

        const geoJSON = toGeoJSON(raw);
        const selectedSet = new Set(selectedIds);

        let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
        geoJSON.features.forEach((f, idx) => {
          const gkz = getGkz(f.properties, idx, zoneType);
          f.properties._sel = gkz && selectedSet.has(gkz) ? 1 : 0;
          if (!f.properties._sel) return;
          const scan = (a) => {
            if (typeof a[0] === 'number') {
              if (a[0] < minLng) minLng = a[0]; if (a[0] > maxLng) maxLng = a[0];
              if (a[1] < minLat) minLat = a[1]; if (a[1] > maxLat) maxLat = a[1];
            } else a.forEach(scan);
          };
          if (f.geometry?.coordinates) scan(f.geometry.coordinates);
        });

        const bounds = minLng < Infinity
          ? [[minLng, minLat], [maxLng, maxLat]]
          : [[7.0, 54.5], [15.5, 58.1]];

        const map = new maplibregl.Map({
          container: 'zone-minimap',
          style: 'https://tiles.openfreemap.org/styles/bright',
          bounds,
          fitBoundsOptions: { padding: 32 },
          dragPan: false, scrollZoom: false, boxZoom: false,
          dragRotate: false, keyboard: false, doubleClickZoom: false,
          touchZoomRotate: false,
          attributionControl: false,
          preserveDrawingBuffer: true,
        });
        window._zoneMiniMap = map;

        map.on('load', () => {
          map.addSource('zones', { type: 'geojson', data: geoJSON, generateId: true });
          map.addLayer({ id: 'zones-bg', type: 'fill', source: 'zones',
            filter: ['==', ['get', '_sel'], 0],
            paint: { 'fill-color': '#d1d5db', 'fill-opacity': 0.5 } });
          map.addLayer({ id: 'zones-sel', type: 'fill', source: 'zones',
            filter: ['==', ['get', '_sel'], 1],
            paint: { 'fill-color': '#c026d3', 'fill-opacity': 0.65 } });
          map.addLayer({ id: 'zones-sel-line', type: 'line', source: 'zones',
            filter: ['==', ['get', '_sel'], 1],
            paint: { 'line-color': '#86198f', 'line-width': 1.2 } });
        });
      };
    })();
  </script>
  </body>
