      // ══ SVG CHART HELPERS ══════════════════════════════════════════════════════

      function svgDonut(slices, size = 100) {
        const total = slices.reduce((s, d) => s + Number(d.value), 0);
        if (!total) return `<svg width="${size}" height="${size}"></svg>`;
        const cx = size / 2, cy = size / 2, r = size / 2 - 3, ir = r * 0.52;
        let angle = -Math.PI / 2;
        const paths = slices.map(d => {
          const a = Math.min((Number(d.value) / total) * 2 * Math.PI, 2 * Math.PI - 0.001);
          const x1  = cx + r  * Math.cos(angle),   y1  = cy + r  * Math.sin(angle);
          const x2  = cx + r  * Math.cos(angle+a),  y2  = cy + r  * Math.sin(angle+a);
          const ix1 = cx + ir * Math.cos(angle),    iy1 = cy + ir * Math.sin(angle);
          const ix2 = cx + ir * Math.cos(angle+a),  iy2 = cy + ir * Math.sin(angle+a);
          const la  = a > Math.PI ? 1 : 0;
          const seg = `<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r},0,${la},1,${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${ir},${ir},0,${la},0,${ix1.toFixed(2)},${iy1.toFixed(2)} Z" fill="${d.color}"><title>${escapeHtml(d.label)}: ${Math.round(Number(d.value)/total*100)}%</title></path>`;
          angle += a;
          return seg;
        }).join('');
        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;flex-shrink:0">${paths}</svg>`;
      }

      function svgLineChart(series, years, W = 420, H = 190) {
        if (!series.length || years.length < 2) return '';
        const PL = 46, PR = 14, PT = 10, PB = 28;
        const w = W - PL - PR, h = H - PT - PB;
        const allV = series.flatMap(s => s.values.filter(v => v != null && !isNaN(v)));
        if (!allV.length) return '';
        let lo = Math.min(...allV), hi = Math.max(...allV);
        const span = hi - lo || Math.abs(lo) * 0.2 || 1;
        lo -= span * 0.15; hi += span * 0.15;
        const xS   = i => PL + (i / (years.length - 1)) * w;
        const yS   = v => PT + h - ((v - lo) / (hi - lo)) * h;
        const fmtY = v => Math.abs(v) >= 1000 ? (v/1000).toFixed(1)+'k' : Math.abs(v) < 0.5 ? (v*100).toFixed(1)+'%' : v.toFixed(1);

        let grid = '', yLbls = '', xLbls = '';
        [0, 0.25, 0.5, 0.75, 1].forEach(t => {
          const v = lo + (hi - lo) * t;
          const y = yS(v).toFixed(1);
          grid  += `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="#eceff4" stroke-width="1"/>`;
          yLbls += `<text x="${PL - 5}" y="${(+y + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="#94a3b8">${fmtY(v)}</text>`;
        });
        years.forEach((yr, i) => {
          if (i % 2 === 0 || i === years.length - 1)
            xLbls += `<text x="${xS(i).toFixed(1)}" y="${(PT + h + 18).toFixed(1)}" text-anchor="middle" font-size="9" fill="#94a3b8">${escapeHtml(String(yr))}</text>`;
        });

        const seriesPts = series.map(s =>
          years.map((_, i) => { const v = s.values[i]; return (v != null && !isNaN(v)) ? [xS(i), yS(v), v] : null; })
        );

        function smoothPath(pts) {
          const valid = pts.filter(Boolean);
          if (valid.length < 2) return '';
          let d = `M${valid[0][0].toFixed(1)},${valid[0][1].toFixed(1)}`;
          for (let i = 1; i < valid.length; i++) {
            const p0 = valid[Math.max(i - 2, 0)], p1 = valid[i - 1], p2 = valid[i], p3 = valid[Math.min(i + 1, valid.length - 1)];
            const cp1x = p1[0] + (p2[0] - p0[0]) / 6, cp1y = p1[1] + (p2[1] - p0[1]) / 6;
            const cp2x = p2[0] - (p3[0] - p1[0]) / 6, cp2y = p2[1] - (p3[1] - p1[1]) / 6;
            d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
          }
          return d;
        }

        const baseY = (PT + h).toFixed(1);
        const defs = series.map((s, si) => s.dashed ? '' :
          `<linearGradient id="slg${si}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.color}" stop-opacity="0.25"/><stop offset="90%" stop-color="${s.color}" stop-opacity="0.02"/></linearGradient>`
        ).join('');

        const areas = series.map((s, si) => {
          if (s.dashed) return '';
          const valid = seriesPts[si].filter(Boolean);
          if (valid.length < 2) return '';
          const lp = smoothPath(seriesPts[si]);
          if (!lp) return '';
          return `<path d="${lp} L${valid[valid.length-1][0].toFixed(1)},${baseY} L${valid[0][0].toFixed(1)},${baseY} Z" fill="url(#slg${si})" stroke="none"/>`;
        }).join('');

        const lines = series.map((s, si) => {
          const lp = smoothPath(seriesPts[si]);
          if (!lp) return '';
          const dash = s.dashed ? ' stroke-dasharray="5,4"' : '';
          const sw   = s.dashed ? 1.5 : 2.5;
          const op   = s.dashed ? ' opacity="0.65"' : '';
          return `<path d="${lp}" fill="none" stroke="${s.color}" stroke-width="${sw}"${dash}${op} stroke-linejoin="round" stroke-linecap="round"><title>${escapeHtml(s.label)}</title></path>`;
        }).join('');

        const dots = series.map((s, si) => {
          if (s.dashed) return '';
          return years.map((yr, i) => {
            const pt = seriesPts[si][i];
            if (!pt) return '';
            return `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3.5" fill="${s.color}" stroke="#fff" stroke-width="1.5"><title>${escapeHtml(yr)}: ${escapeHtml(fmtY(pt[2]))}</title></circle>`;
          }).join('');
        }).join('');

        return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block"><defs>${defs}</defs>${grid}${yLbls}${xLbls}${areas}${lines}${dots}</svg>`;
      }

      function renderTrendsSection(container, tsData, ids) {
        const sec  = makeSection('Socioeconomic Trends', '2012–2024 panel · DK population-weighted average shown as dashed grey line');
        const grid = document.createElement('div');
        grid.className = 'trends-grid';

        const zoneColorMap = {};
        ids.forEach((id, i) => { zoneColorMap[id] = ZONE_PALETTE[i % ZONE_PALETTE.length]; });

        tsData.forEach(ts => {
          const card  = document.createElement('div');
          card.className = 'trends-chart-card';

          const years  = ts.data.years_available || [];
          const series = (ts.data.series || []).map(z => ({
            label: `${zoneName(z.gcd)} (${z.gcd})`,
            color: zoneColorMap[z.gcd] || '#888',
            values: years.map(yr => {
              const idx = (z.years || []).indexOf(yr);
              return idx >= 0 ? z.values[idx] : null;
            }),
          }));

          const natMed = ts.data.national_median;
          if (natMed && natMed.years && natMed.values) {
            series.push({
              label: 'National median',
              color: '#94a3b8',
              dashed: true,
              values: years.map(yr => {
                const idx = natMed.years.indexOf(yr);
                return idx >= 0 ? natMed.values[idx] : null;
              }),
            });
          }

          const legendSeries = series.filter(s => !s.dashed);

          card.innerHTML = `
            <div class="trends-chart-title">
              ${escapeHtml(ts.label)}
              <button class="trends-expand-btn" title="Expand chart">⤢</button>
            </div>`;
          card.innerHTML += svgLineChart(series, years, 420, 190);
          if (legendSeries.length > 0) {
            card.innerHTML += `<div class="trends-legend">${
              legendSeries.map(s => `<span class="trends-legend-item"><span class="trends-legend-dot" style="background:${s.color}"></span>${escapeHtml(s.label)}</span>`).join('')
            }</div>`;
          }

          card.querySelector('.trends-expand-btn').addEventListener('click', () => {
            const overlay = document.getElementById('chart-zoom-overlay');
            document.getElementById('chart-zoom-title').textContent  = ts.label;
            document.getElementById('chart-zoom-svg').innerHTML      = svgLineChart(series, years, 1200, 420);
            document.getElementById('chart-zoom-legend').innerHTML   = legendSeries.map(s =>
              `<span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:50%;background:${s.color};flex-shrink:0"></span>${escapeHtml(s.label)}</span>`
            ).join('');
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
          });

          grid.appendChild(card);
        });

        sec.appendChild(grid);
        container.appendChild(sec);
      }

      // ══ INITIALISATION ══════════════════════════════════════════════════════════
      document.addEventListener('DOMContentLoaded', async () => {
        applyLang();

        // Pre-warm HuggingFace Spaces — free tier sleeps after inactivity,
        // cold start takes 30-90s. Pinging now means the Space is ready by the time
        // the user clicks the Analysis tab.
        Promise.allSettled([
          fetch(`${PLUMBER_BASE}/health`).catch(() => {}),
          fetch(`${ML_BASE}/health`).catch(() => {}),
        ]);

        // Chart zoom overlay close handlers
        function closeChartZoom() {
          document.getElementById('chart-zoom-overlay').style.display = 'none';
          document.body.style.overflow = '';
        }
        document.getElementById('chart-zoom-close').addEventListener('click', closeChartZoom);
        document.getElementById('chart-zoom-overlay').addEventListener('click', e => {
          if (e.target === e.currentTarget) closeChartZoom();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChartZoom(); });

        if (!selectedIds.length) {
          document.getElementById('profile-loading').innerHTML =
            '<p style="color:#dc2626">No zones selected.<br><a href="./index.html" style="color:#1e3a5f;font-weight:500;">← Return to map</a></p>';
          return;
        }

        // ── Tab wiring lives OUTSIDE try so closures are stable for event listeners
        const allTabContainers = {
          demographics: document.getElementById('demographics-container'),
          economics:    document.getElementById('economics-container'),
          financial:    document.getElementById('financial-container'),
          analysis:     document.getElementById('analysis-container'),
          'ml-export':        document.getElementById('ml-export-container'),
          'green-transition': document.getElementById('green-transition-container'),
          explore:            document.getElementById('explorer-container'),
        };
        const _rendered = new Set();

        // Exposed for retry button in analysis error banner
        window._retryAnalysis = () => {
          _rendered.delete('analysis');
          document.getElementById('analysis-container').innerHTML = '';
          showTab('analysis');
        };

        const showTab = (view) => {
          document.querySelectorAll('.view-tab').forEach(btn => {
            btn.classList.toggle('selected', btn.getAttribute('data-view') === view);
          });
          Object.entries(allTabContainers).forEach(([k, div]) => {
            if (div) div.style.display = (k === view) ? (view === 'explore' ? 'flex' : 'block') : 'none';
          });
          currentView = view;
          if (view === 'explore') { initExplorer(new Set(selectedIds), currentZoneType); return; }
          if (!_rendered.has(view)) {
            if (view === 'demographics') {
              renderDomainView('demographics-container', DEMO_DOMAINS);
              renderRichCharts('demographics-container', 'demo', selectedIds);
            } else if (view === 'economics') {
              renderDomainView('economics-container', ECON_DOMAINS);
              renderRichCharts('economics-container', 'econ', selectedIds);
            } else if (view === 'financial') {
              renderFinancial(selectedIds);
            } else if (view === 'analysis') {
              runFiscalAnalysis(selectedIds);
            } else if (view === 'ml-export') {
              renderMLExport(selectedIds);
            } else if (view === 'green-transition') {
              renderGreenTransition(selectedIds);
            }
            _rendered.add(view);
          }
        };

        document.querySelectorAll('.view-tab').forEach(tab => {
          tab.addEventListener('click', () => showTab(tab.getAttribute('data-view')));
        });

        try {
          const data    = await fetch('./data.json').then(r => r.json());
          kommuneData   = data['Kommune']       || {};
          regionData    = data['Region']        || {};
          denmarkTotals = data['Denmark Total'] || {};
          window.timeseriesData = data['timeseries'] || {};
          window.denmarkTotals     = denmarkTotals;
          window.denmarkPopulation = totalPopulationForData(kommuneData);

          document.getElementById('profile-loading').style.display = 'none';
          document.getElementById('modal-toolbar').style.display   = '';
          document.getElementById('modal-body').style.display      = '';

          window.selectedIdsExcel = new Set(selectedIds);
          window.chosenCategories = selectedCategories;

          // Aggregate indicators across selected zones
          (function computeAggregated() {
            const src = currentZoneType === 'region' ? regionData : kommuneData;
            const agg = {};
            let totalPop = 0;
            selectedIds.forEach(id => {
              const z = src[id];
              if (!z) return;
              totalPop += getScalar(z['Population']) || 0;
              for (const [key, val] of Object.entries(z)) {
                if (excludedKeys.includes(key) || typeof val !== 'object' || val === null) continue;
                if (!agg[key]) agg[key] = {};
                for (const [ind, v] of Object.entries(val)) {
                  if (typeof v !== 'number') continue;
                  if (!agg[key][ind]) agg[key][ind] = { sum: 0, count: 0 };
                  agg[key][ind].sum += v;
                  agg[key][ind].count++;
                }
              }
            });
            latestAggregatedData = {};
            for (const [domain, inds] of Object.entries(agg)) {
              latestAggregatedData[domain] = {};
              for (const [ind, { sum, count }] of Object.entries(inds)) {
                latestAggregatedData[domain][ind] = isRatePer1000Indicator(domain, ind)
                  ? (totalPop > 0 ? parseFloat(((sum / totalPop) * 1000).toFixed(2)) : 0)
                  : (count > 0 ? parseFloat((sum / count).toFixed(2)) : 0);
              }
            }
            window.latestAggregatedData = latestAggregatedData;
            window.chosenCategories = DEFAULT_PROFILE_CATEGORIES;
            selectedCategories = DEFAULT_PROFILE_CATEGORIES;
          })();

          renderSummaryBar(selectedIds);
          showTab('demographics');

        } catch (err) {
          document.getElementById('profile-loading').style.display = 'none';
          const errDiv = document.getElementById('profile-error');
          errDiv.style.display = 'block';
          errDiv.innerHTML = `<strong>Error loading data:</strong> ${escapeHtml(err.message)}<br><br><a href="./index.html">← Return to map</a>`;
        }
      });

      // ══ RICH CHARTS (Chart.js) ═══════════════════════════════════════════════════

      const _chartInstMap = {}; // id → Chart instance, for cleanup

      function destroyChart(id) {
        if (_chartInstMap[id]) { _chartInstMap[id].destroy(); delete _chartInstMap[id]; }
      }

      function makeChartCard(parent, title, height = 240) {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:1.1rem 1.1rem .85rem;display:flex;flex-direction:column;';
        const ttl = document.createElement('div');
        ttl.style.cssText = 'font-size:.82rem;font-weight:700;color:#1e3a5f;margin-bottom:.75rem;';
        ttl.textContent = title;
        const canvas = document.createElement('canvas');
        canvas.style.cssText = `max-height:${height}px;`;
        wrap.appendChild(ttl);
        wrap.appendChild(canvas);
        parent.appendChild(wrap);
        return canvas;
      }

      function renderDonutChart(canvas, segments) {
        destroyChart(canvas.id);
        _chartInstMap[canvas.id] = new Chart(canvas, {
          type: 'doughnut',
          data: {
            labels: segments.map(s => s.label),
            datasets: [{ data: segments.map(s => Math.max(0, s.value)), backgroundColor: segments.map(s => s.color), borderWidth: 2, borderColor: '#fff', hoverOffset: 6 }]
          },
          options: {
            responsive: true, maintainAspectRatio: true, cutout: '62%',
            plugins: {
              legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12, padding: 10 } },
              tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed.toFixed(1)}%` } }
            }
          }
        });
      }

      function renderHBarChart(canvas, labels, values, color, dkAvg) {
        destroyChart(canvas.id);
        const maxVal = Math.max(...values, dkAvg ?? 0) * 1.15 || 1;
        _chartInstMap[canvas.id] = new Chart(canvas, {
          type: 'bar',
          data: {
            labels,
            datasets: [{ data: values, backgroundColor: color + 'cc', borderColor: color, borderWidth: 1, borderRadius: 3 }]
          },
          options: {
            indexAxis: 'y', responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => ' ' + (typeof ctx.parsed.x === 'number' ? ctx.parsed.x.toLocaleString() : ctx.parsed.x) } },
              annotation: dkAvg != null ? {
                annotations: { dkLine: { type: 'line', xMin: dkAvg, xMax: dkAvg, borderColor: '#dc2626', borderWidth: 1.5, borderDash: [4,3], label: { display: true, content: 'DK avg', position: 'start', font: { size: 10 }, color: '#dc2626', backgroundColor: 'transparent' } } }
              } : {}
            },
            scales: {
              x: { max: maxVal, grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } } },
              y: { ticks: { font: { size: 10 }, maxRotation: 0 }, grid: { display: false } }
            }
          }
        });
      }

      function renderScatterChart(canvas, points, xLabel, yLabel) {
        destroyChart(canvas.id);
        _chartInstMap[canvas.id] = new Chart(canvas, {
          type: 'scatter',
          data: { datasets: [{ data: points.map(p => ({ x: p.x, y: p.y })), backgroundColor: points.map(p => p.color), pointRadius: 6, pointHoverRadius: 8 }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => { const p = points[ctx.dataIndex]; return `${p.label}: ${xLabel.includes('DKK') ? p.x.toLocaleString() + ' DKK' : p.x.toFixed(1) + '%'} / ${p.y.toFixed(1)}%`; } } }
            },
            scales: {
              x: { title: { display: true, text: xLabel, font: { size: 10 } }, grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } } },
              y: { title: { display: true, text: yLabel, font: { size: 10 } }, grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } } }
            }
          }
        });
      }

      function renderLineChart(canvas, datasets, years) {
        destroyChart(canvas.id);
        _chartInstMap[canvas.id] = new Chart(canvas, {
          type: 'line',
          data: {
            labels: years,
            datasets: datasets.map((ds, i) => ({
              label: ds.label,
              data: ds.values,
              borderColor: ZONE_PALETTE[i % ZONE_PALETTE.length],
              backgroundColor: 'transparent',
              borderWidth: 2, pointRadius: 3, tension: 0.3
            }))
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 8 } } },
            scales: {
              x: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } } },
              y: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } } }
            }
          }
        });
      }

      async function renderRichCharts(containerId, tabKey, ids) {
        const container = document.getElementById(containerId);
        if (!container || !ids.length) return;

        const src = currentZoneType === 'region' ? regionData : kommuneData;
        const agg = latestAggregatedData;

        // Build per-zone arrays (cap at 30 zones to keep charts readable)
        const zones = ids.map(id => ({ id, name: zoneName(id), d: src[id] || {} }))
          .filter(z => Object.keys(z.d).length);
        const capped = zones.length > 30 ? zones.slice(0, 30) : zones;

        const sv = (z, domain, key) => {
          const raw = z.d[domain]?.[key];
          return typeof raw === 'number' ? raw : (Array.isArray(raw) ? raw[0] : null);
        };

        // ── Section wrapper
        const section = document.createElement('div');
        section.style.cssText = 'border-top:2px solid #e5e7eb;margin-top:.5rem;padding:1.25rem 1.5rem 2rem;';
        const secTitle = document.createElement('div');
        secTitle.style.cssText = 'font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:1rem;';
        secTitle.textContent = 'Visual Analysis';
        section.appendChild(secTitle);
        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.25rem;';
        section.appendChild(grid);
        container.appendChild(section);

        const idPfx = tabKey + '_';

        if (tabKey === 'demo') {
          // ── Donut: Age structure
          const c1 = makeChartCard(grid, 'Age Composition (average of selected)', 200);
          c1.id = idPfx + 'age';
          const u15 = agg?.AgeStructure?.['Under 15 years (%)'] ?? 0;
          const o65 = agg?.AgeStructure?.['Over 65 years (%)'] ?? 0;
          renderDonutChart(c1, [
            { label: 'Under 15',  value: u15,                    color: '#4f46e5' },
            { label: '15–64',     value: 100 - u15 - o65,       color: '#2ca25f' },
            { label: 'Over 65',   value: o65,                    color: '#e07520' },
          ]);

          // ── Donut: Housing type
          const c2 = makeChartCard(grid, 'Housing Composition', 200);
          c2.id = idPfx + 'housing';
          const own = agg?.Housing?.['Owner-occupied (%)'] ?? 0;
          const soc = agg?.Housing?.['Social housing (%)'] ?? 0;
          renderDonutChart(c2, [
            { label: 'Owner-occupied', value: own,           color: '#1d6fa5' },
            { label: 'Social housing', value: soc,           color: '#6b2d8b' },
            { label: 'Other',          value: 100 - own - soc, color: '#d1d5db' },
          ]);

          // ── Donut: Ancestry composition
          const c2b = makeChartCard(grid, 'Ancestry Composition (average of selected)', 200);
          c2b.id = idPfx + 'ancestry';
          const dan = agg?.Ancestry?.['Danish origin (%)'] ?? 0;
          const imm = agg?.Ancestry?.['Immigrants (%)'] ?? 0;
          const des = agg?.Ancestry?.['Descendants (%)'] ?? 0;
          renderDonutChart(c2b, [
            { label: 'Danish origin', value: dan, color: '#2563eb' },
            { label: 'Immigrants',    value: imm, color: '#dc2626' },
            { label: 'Descendants',   value: des, color: '#d97706' },
          ]);

          // ── Bar: % over 65 per zone
          const age65Pairs = capped.map(z => ({ name: z.name, val: sv(z, 'AgeStructure', 'Over 65 years (%)') }))
            .filter(p => p.val != null);
          const c3 = makeChartCard(grid, '% Over 65 — by Zone', Math.max(180, age65Pairs.length * 22));
          c3.id = idPfx + 'over65'; c3.style.maxHeight = Math.max(180, age65Pairs.length * 22) + 'px';
          renderHBarChart(c3, age65Pairs.map(p => p.name), age65Pairs.map(p => p.val), '#e07520', agg?.AgeStructure?.['Over 65 years (%)']);

          // ── Bar: % foreign citizens per zone
          const fgnPairs = capped.map(z => ({ name: z.name, val: sv(z, 'Migration', 'Foreign citizens (%)') }))
            .filter(p => p.val != null);
          const c4 = makeChartCard(grid, 'Foreign Citizens (%) — by Zone', Math.max(180, fgnPairs.length * 22));
          c4.id = idPfx + 'foreign'; c4.style.maxHeight = Math.max(180, fgnPairs.length * 22) + 'px';
          renderHBarChart(c4, fgnPairs.map(p => p.name), fgnPairs.map(p => p.val), '#0e7490', agg?.Migration?.['Foreign citizens (%)']);

          // ── Bar: welfare dependency per zone
          const welPairs = capped.map(z => ({ name: z.name, val: sv(z, 'Welfare', 'Welfare dependency (%)') }))
            .filter(p => p.val != null);
          const c5 = makeChartCard(grid, 'Welfare Dependency (%) — by Zone', Math.max(180, welPairs.length * 22));
          c5.id = idPfx + 'welfare'; c5.style.maxHeight = Math.max(180, welPairs.length * 22) + 'px';
          renderHBarChart(c5, welPairs.map(p => p.name), welPairs.map(p => p.val), '#7c3aed', agg?.Welfare?.['Welfare dependency (%)']);

          // ── Live: sex breakdown + 5-year age groups from FOLK1A (async, appended after grid)
          container.appendChild(section);
          (async () => {
            try {
              const dstCodes = ids.map(id => dawaToDs(id));
              // Sex breakdown: male vs female (IALT age, TOT→M+K)
              const { rows: sexRows } = await dstFetch('FOLK1A', [
                { code: 'OMRÅDE', values: dstCodes },
                { code: 'KØN',    values: ['M', 'K'] },
                { code: 'ALDER',  values: ['IALT'] },
                { code: 'Tid',    values: [await dstTableInfo('FOLK1A').then(info => { const tv = info.variables.find(v => v.id === 'Tid' || v.id === 'KVART'); const all = (tv?.values || []).map(v => v.id); return all.filter(v => v.endsWith('Q1')).at(-1) || all.at(-1); })] },
              ]);
              if (sexRows.length) {
                const aK = Object.keys(sexRows[0]).find(k => /region|område/i.test(k));
                const sK = Object.keys(sexRows[0]).find(k => /sex|køn/i.test(k));
                const vK = Object.keys(sexRows[0]).find(k => /indhold/i.test(k)) || Object.keys(sexRows[0]).at(-1);
                let males = 0, females = 0;
                sexRows.forEach(r => {
                  const v = parseFloat(r[vK]); if (isNaN(v)) return;
                  const sex = (r[sK] || '').toLowerCase();
                  if (sex.includes('men') || sex === 'm') males += v;
                  else if (sex.includes('women') || sex === 'k') females += v;
                });
                if (males + females > 0) {
                  const sexSection = document.createElement('div');
                  sexSection.style.cssText = 'padding:0 1.5rem 1rem;';
                  const sexGrid = document.createElement('div');
                  sexGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;';
                  const cSex = makeChartCard(sexGrid, 'Sex Breakdown (selected zones, latest quarter)', 200);
                  cSex.id = idPfx + 'sex';
                  const total = males + females;
                  renderDonutChart(cSex, [
                    { label: `Male (${((males/total)*100).toFixed(1)}%)`,   value: (males/total)*100,   color: '#1d6fa5' },
                    { label: `Female (${((females/total)*100).toFixed(1)}%)`, value: (females/total)*100, color: '#c026d3' },
                  ]);
                  sexSection.appendChild(sexGrid);
                  container.appendChild(sexSection);
                }
              }
            } catch (_) { /* sex breakdown optional */ }
          })();
          return; // section already appended above
        }

        if (tabKey === 'econ') {
          // ── Scatter: income vs employment rate — filter zones with missing data
          const scatterPts = zones.map((z, i) => ({
            label: z.name,
            x: sv(z, 'Economy', 'Avg income (DKK)'),
            y: sv(z, 'LabourMarket', 'Employment rate (%)'),
            color: ZONE_PALETTE[i % ZONE_PALETTE.length] + 'cc',
          })).filter(p => p.x != null && p.y != null && p.x > 0 && p.y > 0);
          const c1 = makeChartCard(grid, `Income vs Employment Rate — ${scatterPts.length} zones`, 260);
          c1.id = idPfx + 'scatter'; c1.style.maxHeight = '260px';
          renderScatterChart(c1, scatterPts, 'Avg Income (DKK)', 'Employment Rate (%)');

          // ── Bar: income per zone — skip missing/zero values
          const incPairs = capped.map(z => ({ name: z.name, val: sv(z, 'Economy', 'Avg income (DKK)') }))
            .filter(p => p.val != null && p.val > 0).sort((a, b) => b.val - a.val);
          const c2 = makeChartCard(grid, 'Avg Income (DKK) — by Zone', Math.max(180, incPairs.length * 22));
          c2.id = idPfx + 'income'; c2.style.maxHeight = Math.max(180, incPairs.length * 22) + 'px';
          renderHBarChart(c2, incPairs.map(p => p.name), incPairs.map(p => p.val), '#2ca25f', agg?.Economy?.['Avg income (DKK)']);

          // ── Bar: unemployment per zone — skip missing/zero values
          const unempPairs = capped.map(z => ({ name: z.name, val: sv(z, 'LabourMarket', 'Unemployment rate (%)') }))
            .filter(p => p.val != null && p.val > 0);
          const c3 = makeChartCard(grid, 'Unemployment Rate (%) — by Zone', Math.max(180, unempPairs.length * 22));
          c3.id = idPfx + 'unemp'; c3.style.maxHeight = Math.max(180, unempPairs.length * 22) + 'px';
          renderHBarChart(c3, unempPairs.map(p => p.name), unempPairs.map(p => p.val), '#dc2626', agg?.LabourMarket?.['Unemployment rate (%)']);
        }

        // ── Time series: population trend (both tabs)
        const tsWrap = document.createElement('div');
        tsWrap.style.cssText = 'grid-column:1/-1;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:1.1rem;';
        const tsTtl = document.createElement('div');
        tsTtl.style.cssText = 'font-size:.82rem;font-weight:700;color:#1e3a5f;margin-bottom:.6rem;';
        tsTtl.textContent = tabKey === 'econ' ? 'Unemployment Rate Trend (DST · live)' : 'Population Trend (DST · live)';
        const tsLoading = document.createElement('div');
        tsLoading.style.cssText = 'font-size:.78rem;color:#9ca3af;padding:.5rem 0;';
        tsLoading.textContent = 'Loading time series…';
        const tsCanvas = document.createElement('canvas');
        tsCanvas.id = idPfx + 'trend';
        tsCanvas.style.cssText = 'max-height:220px;display:none;';
        tsWrap.appendChild(tsTtl);
        tsWrap.appendChild(tsLoading);
        tsWrap.appendChild(tsCanvas);
        grid.appendChild(tsWrap);

        try {
          // Limit to 8 zones for readable line chart; if more, show aggregate only
          const dstCodes = ids.map(id => dawaToDs(id));
          const showPerZone = zones.length <= 8;
          const fetchCodes = showPerZone ? dstCodes : ['000']; // '000' = All Denmark as fallback

          let tsSeries, tsYears;

          // Shared helper: pivot CSV rows into series for renderLineChart
          function pivotRows(rows, periods, tidKey, areaKey, valKey) {
            const piv = {};
            rows.forEach(r => {
              const a = r[areaKey]; const t = r[tidKey];
              const v = parseFloat(String(r[valKey] || '').replace(/\./g,'').replace(',','.'));
              if (a && t && !isNaN(v)) { if (!piv[a]) piv[a] = {}; piv[a][t] = v; }
            });
            return Object.entries(piv).map(([name, byPeriod]) => ({
              label: name, values: periods.map(p => byPeriod[p] ?? null)
            }));
          }

          if (tabKey === 'econ') {
            // INDKP106: Disposable income per person — read from pre-built data.json cache
            tsTtl.textContent = 'Disposable Income per Person — Trend';
            const incomeTs = window.timeseriesData?.income || {};
            const years = (incomeTs.years || []).map(String);
            if (!years.length) throw new Error('Income time series not available in data.json');
            tsYears = years;
            if (showPerZone) {
              tsSeries = zones.map(z => {
                const vals = incomeTs[dawaToDs(z.id)] || incomeTs[z.id] || null;
                if (!vals) return null;
                return { label: z.name, values: (Array.isArray(vals) ? vals : Object.values(vals)).map(Number) };
              }).filter(Boolean);
            }
            if (!tsSeries || !tsSeries.length) {
              // Fallback: show all-Denmark average if available
              const dkVals = incomeTs['000'] || null;
              if (dkVals) tsSeries = [{ label: 'All Denmark', values: (Array.isArray(dkVals) ? dkVals : Object.values(dkVals)).map(Number) }];
              else throw new Error('No income data for selected municipalities');
            }
          } else {
            // FOLK1A: Population quarterly — use Q1 of each year for clean annual view
            const info       = await dstTableInfo('FOLK1A');
            const tidVar     = info.variables.find(v => v.id === 'Tid' || v.id === 'KVART');
            const allPeriods = (tidVar?.values || []).map(v => v.id);
            const annualQ1   = allPeriods.filter(v => v.endsWith('Q1')).slice(-12);
            const periods    = annualQ1.length >= 4 ? annualQ1 : allPeriods.slice(-12);
            const { rows }   = await dstFetch('FOLK1A', [
              { code: 'OMRÅDE', values: showPerZone ? dstCodes : ['000'] },
              { code: 'KØN',    values: ['TOT'] },
              { code: 'ALDER',  values: ['IALT'] },
              { code: tidVar?.id || 'Tid', values: periods },
            ]);
            if (!rows.length) throw new Error('No population data for selected municipalities');
            const areaKey = Object.keys(rows[0]).find(k => /region|område/i.test(k)) || Object.keys(rows[0])[0];
            const tidKey  = Object.keys(rows[0]).find(k => /time|tid|quarter|kvart/i.test(k)) || Object.keys(rows[0])[1];
            const valKey  = Object.keys(rows[0]).find(k => /indhold/i.test(k)) || Object.keys(rows[0]).at(-1);
            tsYears  = periods.map(p => p.replace('Q1',''));
            tsSeries = pivotRows(rows, periods, tidKey, areaKey, valKey).map(s => ({ ...s, label: s.label.replace(/\s*Q1.*/, '') }));
          }

          if (tsSeries.length) {
            tsLoading.style.display = 'none';
            tsCanvas.style.display = '';
            renderLineChart(tsCanvas, tsSeries, tsYears);
          } else {
            tsLoading.textContent = 'No time series data returned.';
          }
        } catch (e) {
          tsLoading.textContent = 'Time series unavailable: ' + e.message;
        }
      }

      function renderDomainView(containerId, domains) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';

        const avail = Object.keys(latestAggregatedData);
        const valid = domains.filter(d => avail.includes(d));
        if (!valid.length) {
          container.innerHTML = '<p style="padding:2rem;color:#6b7280;">No data available for selected zones.</p>';
          return;
        }

        // Charts grid
        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.25rem;padding:1.5rem;';

        valid.forEach(domain => {
          const values = latestAggregatedData[domain];
          if (!values) return;
          const atDomain = denmarkTotals[domain] || {};

          const card = document.createElement('div');
          card.className = 'css-chart-domain-card';

          const head = document.createElement('div');
          head.className = 'css-chart-domain-head';
          head.innerHTML = `<span class="css-chart-domain-title">${escapeHtml(tDomain(domain))}</span>
            <span class="css-chart-at-legend"><span class="css-chart-at-swatch"></span>Denmark avg</span>`;
          card.appendChild(head);

          Object.entries(values).forEach(([rawLabel, value]) => {
            if (typeof value !== 'number') return;
            const atVal  = comparableDenmarkValue(domain, rawLabel, atDomain[rawLabel]);
            const fmt    = v => formatIndicatorValue(domain, rawLabel, v);
            const label  = displayIndicatorLabel(domain, rawLabel);
            const minVal   = Math.min(value, atVal ?? value, 0);
            const maxVal   = Math.max(value, atVal ?? 0, 0) * 1.12 || 1;
            const range    = (maxVal - minVal) || 1;
            const zeroPct  = ((-minVal / range) * 100).toFixed(1);
            const valPct   = ((value  - minVal) / range * 100).toFixed(1);
            const barLeft  = Math.min(+zeroPct, +valPct).toFixed(1);
            const barWidth = Math.abs(+zeroPct - +valPct).toFixed(1);
            const atPct    = atVal != null ? (((atVal - minVal) / range) * 100).toFixed(1) : null;
            const overAT   = atVal != null && value > atVal;
            const showZero = minVal < 0;

            const row = document.createElement('div');
            row.className = 'css-indicator-row';
            row.innerHTML = `
              <div class="css-indicator-meta">
                <span class="css-indicator-label">${escapeHtml(label)}</span>
                <span class="css-indicator-value">${escapeHtml(fmt(value))}${atVal != null ? ` <span class="css-indicator-at">(DK: ${escapeHtml(fmt(atVal))})</span>` : ''}</span>
              </div>
              <div class="css-bar-track">
                <div class="css-bar-fill${overAT ? ' over-at' : ''}" style="left:${barLeft}%;width:${barWidth}%"></div>
                ${showZero ? `<div class="css-bar-zero" style="left:${zeroPct}%"></div>` : ''}
                ${atPct != null ? `<div class="css-bar-at" style="left:${atPct}%"></div>` : ''}
              </div>`;
            card.appendChild(row);
          });

          grid.appendChild(card);
        });

        container.appendChild(grid);
      }

      function renderSFCPanel(container, zoneRows) {
        const pop = id => {
          const src = currentZoneType === 'region' ? regionData : kommuneData;
          return src[id]?.Population || 0;
        };
        const fin = (z, key) => {
          const v = z.fin?.[key];
          return typeof v === 'number' ? v : (Array.isArray(v) ? v[0] : null);
        };

        const wrap = document.createElement('div');
        wrap.style.cssText = 'margin:1.5rem 1.5rem 0;';
        const hdr = document.createElement('div');
        hdr.style.cssText = 'font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:1rem;';
        hdr.textContent = 'SFC Government Sector Accounts';
        wrap.appendChild(hdr);

        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;';

        zoneRows.forEach(z => {
          const p = pop(z.id);
          if (!p) return;

          // Derive absolute totals (DKK thousands) from per-capita × population
          const opEx    = (fin(z, 'Operating expenses/capita (DKK)') ?? 0) * p / 1000;
          const capEx   = (fin(z, 'Capital expenditures/capita (DKK)') ?? 0) * p / 1000;
          const grants  = (fin(z, 'Equalization grants/capita (DKK)') ?? 0) * p / 1000;
          const debt    = (fin(z, 'Long-term debt/capita (DKK)') ?? 0) * p / 1000;
          const totalEx = opEx + capEx;
          const balance = grants - totalEx;  // proxy: grants vs total expenditure
          const fmt     = v => v >= 1e6 ? (v/1e6).toFixed(1)+'B' : v >= 1e3 ? (v/1e3).toFixed(0)+'M' : Math.round(v)+'K';
          const balColor = balance >= 0 ? '#16a34a' : '#dc2626';

          const card = document.createElement('div');
          card.style.cssText = 'background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1rem 1.1rem;';
          card.innerHTML = `
            <div style="font-size:.8rem;font-weight:700;color:#1e3a5f;margin-bottom:.75rem;border-bottom:1px solid #f0f0f0;padding-bottom:.5rem;">
              ${escapeHtml(z.name)} — Government Sector (DKK)

            <div style="display:grid;grid-template-columns:1fr auto;gap:.3rem .75rem;font-size:.78rem;">
              <span style="color:#6b7280;">Central gov grants (T)</span>
              <span style="font-weight:600;color:#2563eb;font-family:monospace;">${escapeHtml(fmt(grants))}</span>
              <span style="color:#6b7280;">Operating expenditure (G)</span>
              <span style="font-weight:600;color:#374151;font-family:monospace;">${escapeHtml(fmt(opEx))}</span>
              <span style="color:#6b7280;">Capital investment (I)</span>
              <span style="font-weight:600;color:#374151;font-family:monospace;">${escapeHtml(fmt(capEx))}</span>
              <span style="color:#6b7280;border-top:1px solid #f0f0f0;padding-top:.3rem;">Fiscal balance (T−G−I)</span>
              <span style="font-weight:700;color:${balColor};font-family:monospace;border-top:1px solid #f0f0f0;padding-top:.3rem;">${balance>=0?'+':''}${escapeHtml(fmt(balance))}</span>
              <span style="color:#6b7280;margin-top:.4rem;">Debt stock (L)</span>
              <span style="font-weight:600;color:#7c3aed;font-family:monospace;margin-top:.4rem;">${escapeHtml(fmt(debt))}</span>
            </div>
            <div style="margin-top:.75rem;background:#f8fafc;border-radius:6px;padding:.4rem .6rem;font-size:.68rem;color:#9ca3af;">
              SFC identity: ΔL ≈ −(T − G − I) · Deficit adds to debt stock
            </div>`;
          grid.appendChild(card);
        });

        wrap.appendChild(grid);
        container.appendChild(wrap);
      }

          options: {
            indexAxis: 'y', responsive: true, maintainAspectRatio: false,

              legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12, padding: 8 } },
              tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.x.toFixed(2)} ${unit}` } }

              x: { stacked: true, grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } },
                   title: { display: true, text: unit, font: { size: 10 }, color: '#6b7280' } },

        climGrid.className = 'gt-climate-grid';

        const CLIM = [
          { key: 'Mean annual temperature (°C)', label: 'Mean Temperature', unit: '°C', icon: '🌡', dk: dkv('ClimateBaseline','Mean annual temperature (°C)'), higherIsBad: true },
          { key: 'Summer days per year (>25°C)', label: 'Summer Days', unit: 'days', icon: '☀️', dk: dkv('ClimateBaseline','Summer days per year (>25°C)'), higherIsBad: true },
          { key: 'Annual precipitation (mm)', label: 'Precipitation', unit: 'mm', icon: '🌧', dk: dkv('ClimateBaseline','Annual precipitation (mm)'), higherIsBad: false },
          { key: 'Heating degree days', label: 'Heating Degree Days', unit: 'HDD', icon: '🏠', dk: dkv('ClimateBaseline','Heating degree days'), higherIsBad: false },
        ];

        CLIM.forEach(c => {
          const val = wavg(zones.map(z => gv(z,'ClimateBaseline', c.key)));
          const diff = (val != null && c.dk != null) ? val - c.dk : null;
          const higher = diff != null && diff > 0;
          const arrowColor = (higher === c.higherIsBad) ? '#dc2626' : '#16a34a';
          const arrow = diff == null ? '' : (higher ? '▲' : '▼');
          const diffStr = diff != null ? `${arrow} ${Math.abs(diff).toFixed(1)} vs DK` : '';
          const tile = document.createElement('div');
          tile.className = 'gt-clim-tile';
          tile.innerHTML = `
            <div class="gt-clim-icon">${escapeHtml(c.icon)}</div>
            <div class="gt-clim-val">${val != null ? val.toFixed(1) : '–'}<span class="gt-clim-unit"> ${escapeHtml(c.unit)}</span></div>
            <div class="gt-clim-label">${escapeHtml(c.label)}</div>
            ${diffStr ? `<div class="gt-clim-diff" style="color:${arrowColor}">${escapeHtml(diffStr)}</div>` : ''}`;
          climGrid.appendChild(tile);
        });
        climCard.appendChild(climGrid);
        grid.appendChild(climCard);

        // ── 4. Transition Exposure Scatter — Fossil% vs Renewable/1k
        const scatCard = document.createElement('div');
        scatCard.className = 'gt-card';
        scatCard.innerHTML = '<div class="gt-card-title">Transition Exposure Matrix</div><div class="gt-card-sub">Fossil sector share vs renewable intensity — lower-right = most exposed, upper-left = most resilient</div>';
        const scatCanvas = document.createElement('canvas');
        scatCanvas.id = 'gt_scat';
        scatCanvas.style.maxHeight = '280px';
        scatCard.appendChild(scatCanvas);
        grid.appendChild(scatCard);

        const scatPoints = zones.map((z, i) => ({
          x: gv(z,'GreenTransition','Fossil-linked sector share (%)') ?? gv(z,'GreenTransition','Fossil sector share (%)') ?? 0,
          y: gv(z,'GreenEnergy','Renewable capacity (MW per 1,000)') ?? 0,
          label: z.name,
          color: ZONE_PALETTE[i % ZONE_PALETTE.length],
        }));
        const dkScatX = dkv('GreenTransition','Fossil-linked sector share (%)') ?? 0;
        const dkScatY = dkv('GreenEnergy','Renewable capacity (MW per 1,000)') ?? 0;
        scatPoints.push({ x: dkScatX, y: dkScatY, label: 'Denmark avg', color: '#dc2626' });
        renderScatterChart(scatCanvas, scatPoints, 'Fossil sector share (%)', 'Renewable capacity (MW/1,000)');
      }

      // ══ ML EXPORT TAB — feature matrix + CSV download ════════════════════════

      function renderMLExport(ids) {
        const container = document.getElementById('ml-export-container');
        if (!container) return;
        container.innerHTML = '';

        const dataSource = currentZoneType === 'region' ? regionData : kommuneData;

        // Build flat feature rows
        const ALL_DOMAINS = [...DEMO_DOMAINS, ...ECON_DOMAINS];
        const colDefs = []; // { domain, indicator, colName }

        // Discover all columns from first valid zone
        for (const id of ids) {
          const z = dataSource[id];
          if (!z) continue;
          ALL_DOMAINS.forEach(domain => {
            const domData = z[domain];
            if (!domData) return;
            Object.keys(domData).forEach(indicator => {
              const colName = (domain + '_' + indicator)
                .replace(/[^a-zA-Z0-9_]/g, '_')
                .replace(/_+/g, '_')
                .replace(/_%_/g, '_pct_')
                .toLowerCase();
              if (!colDefs.find(c => c.colName === colName)) {
                colDefs.push({ domain, indicator, colName });
              }
            });
          });
          break;
        }

        const metaCols = ['zone_code', 'zone_name', 'region', 'population', 'urban_rural', 'settlement_class'];
        const allCols  = [...metaCols, ...colDefs.map(c => c.colName)];

        const rows = ids.map(id => {
          const z = dataSource[id];
          if (!z) return null;
          const row = {
            zone_code:       id,
            zone_name:       zoneName(id),
            region:          getScalar(z['Region']) || '',
            population:      getScalar(z['Population']) || 0,
            urban_rural:     getScalar(z['Urban_rural_status']) || '',
            settlement_class: getScalar(z['Settlement_class']) || '',
          };
          colDefs.forEach(({ domain, indicator, colName }) => {
            const v = z[domain]?.[indicator];
            row[colName] = typeof v === 'number' ? v : '';
          });
          return row;
        }).filter(Boolean);

        if (!rows.length) {
          container.innerHTML = '<p style="padding:2rem;color:#6b7280;">No zone data found.</p>';
          return;
        }

        // Header
        const hdr = document.createElement('div');
        hdr.style.cssText = 'padding:1.25rem 1.5rem .5rem;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.75rem;';
        hdr.innerHTML = `<div>
          <h2 style="font-size:1rem;font-weight:700;color:#1e3a5f;margin:0 0 .2rem;">ML Feature Matrix</h2>
          <p style="font-size:.78rem;color:#6b7280;margin:0;">${escapeHtml(String(rows.length))} zones &times; ${escapeHtml(String(allCols.length))} features &nbsp;&middot;&nbsp; Each row = one area &nbsp;&middot;&nbsp; Ready for model training</p>
        </div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
          <button id="ml-dl-csv" style="background:#4f46e5;color:#fff;border:none;border-radius:6px;padding:.45rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;">⬇ Cross-section CSV</button>
          <button id="ml-dl-json" style="background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:6px;padding:.45rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;">⬇ JSON</button>
          <button id="ml-dl-panel" style="background:#0e7490;color:#fff;border:none;border-radius:6px;padding:.45rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;">⬇ Panel CSV (2012–2024)</button>
        </div>`;
        container.appendChild(hdr);

        // Column groups legend
        const legend = document.createElement('div');
        legend.style.cssText = 'padding:.25rem 1.5rem .9rem;display:flex;flex-wrap:wrap;gap:.4rem;';
        const groups = [
          { label: 'Meta', count: metaCols.length, color: '#6b7280' },
          { label: 'Demographics', count: colDefs.filter(c => DEMO_DOMAINS.includes(c.domain)).length, color: '#7c3aed' },
          { label: 'Economics', count: colDefs.filter(c => ECON_DOMAINS.includes(c.domain)).length, color: '#0e7490' },
        ];
        groups.forEach(g => {
          const chip = document.createElement('span');
          chip.style.cssText = `display:inline-flex;align-items:center;gap:.3rem;background:${g.color}18;border:1px solid ${g.color}40;color:${g.color};border-radius:99px;padding:.2rem .65rem;font-size:.72rem;font-weight:600;`;
          chip.textContent = `${g.label} (${g.count})`;
          legend.appendChild(chip);
        });
        container.appendChild(legend);

        // Table
        const scroll = document.createElement('div');
        scroll.style.cssText = 'overflow:auto;padding:0 1.5rem 1.5rem;max-height:60vh;';

        const tbl = document.createElement('table');
        tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:.75rem;white-space:nowrap;background:#fff;border:1px solid #e5e7eb;';

        const thead = document.createElement('thead');
        const hRow = document.createElement('tr');
        allCols.forEach((col, ci) => {
          const th = document.createElement('th');
          const isDemo = colDefs.find(c => c.colName === col && DEMO_DOMAINS.includes(c.domain));
          const isEcon = colDefs.find(c => c.colName === col && ECON_DOMAINS.includes(c.domain));
          const bg = ci < metaCols.length ? '#374151' : isDemo ? '#5b21b6' : '#0e7490';
          th.style.cssText = `background:${bg};color:#fff;padding:.45rem .65rem;text-align:left;position:sticky;top:0;font-weight:600;`;
          th.title = col;
          th.textContent = col.length > 20 ? col.substring(0,18) + '…' : col;
          hRow.appendChild(th);
        });
        thead.appendChild(hRow);
        tbl.appendChild(thead);

        const tbody = document.createElement('tbody');
        rows.forEach((row, ri) => {
          const tr = document.createElement('tr');
          tr.style.cssText = `border-bottom:1px solid #f0f0f0;${ri%2===1?'background:#f9fafb;':''}`;
          allCols.forEach((col, ci) => {
            const td = document.createElement('td');
            const isMeta = ci < metaCols.length;
            td.style.cssText = `padding:.38rem .65rem;${isMeta?'font-weight:500;color:#1e3a5f;':'font-family:"JetBrains Mono",monospace;color:#374151;text-align:right;'}`;
            const v = row[col];
            td.textContent = typeof v === 'number' ? (Number.isInteger(v) ? v.toLocaleString() : v.toFixed(2)) : String(v ?? '');
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        scroll.appendChild(tbl);
        container.appendChild(scroll);

        // CSV download
        document.getElementById('ml-dl-csv').addEventListener('click', () => {
          const lines = [allCols.join(',')];
          rows.forEach(row => {
            lines.push(allCols.map(col => {
              const v = row[col];
              const s = v == null ? '' : String(v);
              return s.includes(',') || s.includes('"') ? `"${s.replace(/"/g, '""')}"` : s;
            }).join(','));
          });
          const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `areastat_ml_features_${ids.length}zones.csv`;
          a.click();
        });

        // JSON download
        document.getElementById('ml-dl-json').addEventListener('click', () => {
          const blob = new Blob([JSON.stringify({ columns: allCols, rows }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `areastat_ml_features_${ids.length}zones.json`;
          a.click();
        });

        // Panel CSV download — long format: (zone × year) rows with 5 time series
        document.getElementById('ml-dl-panel').addEventListener('click', () => {
          const ts = window.timeseriesData || {};
          const SERIES = [
            { key: 'income',            col: 'avg_income_dkk' },
            { key: 'population',        col: 'population' },
            { key: 'foreign_pct',       col: 'foreign_citizens_pct' },
            { key: 'unemployment_rate', col: 'unemployment_rate_pct' },
            { key: 'crime_rate',        col: 'crime_per_1000' },
          ];
          const panelCols = ['zone_code','zone_name','region','year',
            ...SERIES.map(s => s.col)];
          const panelRows = [];
          const dataSource = currentZoneType === 'region' ? regionData : kommuneData;

          ids.forEach(id => {
            const z = dataSource[id];
            if (!z) return;
            // all series share TS_YEARS (2012-2024); use income.years as reference
            const years = (ts.income?.years || []).map(String);
            years.forEach((yr, yi) => {
              const row = {
                zone_code: id,
                zone_name: zoneName(id),
                region:    getScalar(z['Region']) || '',
                year:      yr,
              };
              SERIES.forEach(s => {
                const vals = ts[s.key]?.[id] || ts[s.key]?.[dawaToDs(id)] || null;
                row[s.col] = (Array.isArray(vals) ? vals[yi] : null) ?? '';
              });
              panelRows.push(row);
            });
          });

          const lines = [panelCols.join(',')];
          panelRows.forEach(row => {
            lines.push(panelCols.map(col => {
              const v = row[col];
              const s = v == null ? '' : String(v);
              return s.includes(',') || s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s;
            }).join(','));
          });
          const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `areastat_panel_${ids.length}zones_2012-2024.csv`;
          a.click();
        });
      }

    </script>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script>
    (function () {
      const ZONE_URLS = {
        kommune: [
          './data/kommuner.geojson',
          'https://api.dataforsyningen.dk/kommuner?format=geojson&srid=4326',
        ],
        region: [
          './data/regioner.geojson',
          'https://api.dataforsyningen.dk/regioner?format=geojson&srid=4326',
        ],
        sogn: [
          './data/regioner.geojson',
          'https://api.dataforsyningen.dk/regioner?format=geojson&srid=4326',
        ],
      };

      function toGeoJSON(raw) {
        if (raw.type === 'Topology') {
          const key = Object.keys(raw.objects)[0];
          return topojson.feature(raw, raw.objects[key]);
        }
        return raw;
      }

      function getGkz(props, idx, zoneType) {
        // DAWA GeoJSON uses 'kode' property (4-char zero-padded string)
        if (props.kode != null && props.kode !== '') return String(props.kode);
        const candidates = [props.KOMKODE, props.SOGNKODE, props.id, props.ID];
        for (const c of candidates) {
          if (c != null && c !== '') return String(c);
        }
        return null;
      }

      async function fetchFirst(urls) {
        for (const url of urls) {
          try { const r = await fetch(url); if (r.ok) return r.json(); } catch (_) {}
        }
        return null;
      }

      window.initZoneMiniMap = async function (selectedIds, zoneType) {
        const container = document.getElementById('zone-minimap');
        if (!container || typeof maplibregl === 'undefined' || typeof topojson === 'undefined') return;

        const raw = await fetchFirst(ZONE_URLS[zoneType] || ZONE_URLS.sogn);
        if (!raw) return;

        const geoJSON = toGeoJSON(raw);
        const selectedSet = new Set(selectedIds);

        let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
        geoJSON.features.forEach((f, idx) => {
          const gkz = getGkz(f.properties, idx, zoneType);
          f.properties._sel = gkz && selectedSet.has(gkz) ? 1 : 0;
          if (!f.properties._sel) return;
          const scan = (a) => {
            if (typeof a[0] === 'number') {
              if (a[0] < minLng) minLng = a[0]; if (a[0] > maxLng) maxLng = a[0];
              if (a[1] < minLat) minLat = a[1]; if (a[1] > maxLat) maxLat = a[1];
            } else a.forEach(scan);
          };
          if (f.geometry?.coordinates) scan(f.geometry.coordinates);
        });

        const bounds = minLng < Infinity
          ? [[minLng, minLat], [maxLng, maxLat]]
          : [[7.0, 54.5], [15.5, 58.1]];

        const map = new maplibregl.Map({
          container: 'zone-minimap',
          style: 'https://tiles.openfreemap.org/styles/bright',
          bounds,
          fitBoundsOptions: { padding: 32 },
          dragPan: false, scrollZoom: false, boxZoom: false,
          dragRotate: false, keyboard: false, doubleClickZoom: false,
          touchZoomRotate: false,
          attributionControl: false,
          preserveDrawingBuffer: true,
        });
        window._zoneMiniMap = map;

        map.on('load', () => {
          map.addSource('zones', { type: 'geojson', data: geoJSON, generateId: true });
          map.addLayer({ id: 'zones-bg', type: 'fill', source: 'zones',
            filter: ['==', ['get', '_sel'], 0],
            paint: { 'fill-color': '#d1d5db', 'fill-opacity': 0.5 } });
          map.addLayer({ id: 'zones-sel', type: 'fill', source: 'zones',
            filter: ['==', ['get', '_sel'], 1],
            paint: { 'fill-color': '#c026d3', 'fill-opacity': 0.65 } });
          map.addLayer({ id: 'zones-sel-line', type: 'line', source: 'zones',
            filter: ['==', ['get', '_sel'], 1],
            paint: { 'line-color': '#86198f', 'line-width': 1.2 } });
        });
      };
    })();
  </script>
