      // ══ CLUSTER TYPOLOGY FUNCTIONS ════════════════════════════════════════════

      const CLUSTER_COLORS = ['#1d6fa5', '#e07520', '#2ca25f', '#6b2d8b', '#dc2626', '#0e7490'];

      function renderTypologyResults(data) {
        document.getElementById('cluster-profiles').innerHTML = '';

        const container = document.getElementById('cluster-summary');
        container.innerHTML = '';

        const summary   = data.summary   || {};
        const profiles  = data.profiles  || [];
        const atProfile = data.at_profile || {};

        // Build per-cluster differentiator data from profiles array
        const profileByCluster = {};
        profiles.forEach(p => {
          const diffs = Object.entries(p)
            .filter(([key]) => key !== 'cluster')
            .map(([key, val]) => {
              const raw = atProfile[key];
              const at  = Array.isArray(raw) ? raw[0] : raw;
              if (at == null || typeof val !== 'number' || at === 0) return null;
              return { label: key, pct: ((val - at) / at) * 100 };
            })
            .filter(x => x && x.pct > 0)
            .sort((a, b) => b.pct - a.pct)
            .slice(0, 3);
          profileByCluster[p.cluster] = diffs;
        });

        const totalZones  = Object.values(summary).reduce((s, info) => s + (Number(info.count) || 0), 0);
        const numClusters = Object.keys(summary).length;

        // Section header
        const hdr = document.createElement('div');
        hdr.className = 'typology-section-header';
        hdr.innerHTML = `<span class="typology-badge">◈ Typology Analysis</span>
          <span class="typology-meta">${escapeHtml(String(totalZones))} zones &middot; ${escapeHtml(String(numClusters))} clusters</span>`;
        container.appendChild(hdr);

        let colorIdx = 0;
        for (const [clusterId, info] of Object.entries(summary)) {
          const color      = CLUSTER_COLORS[colorIdx++ % CLUSTER_COLORS.length];
          const zones      = info.zones || [];
          const clusterNum = parseInt(clusterId.split('_').pop(), 10);

          const zoneChips  = zones.map(z => `<span class="typology-zone-chip">${escapeHtml(z)}</span>`).join('');
          const traitItems = (info.common_traits || []).map(t => `<li>${escapeHtml(t)}</li>`).join('') || '<li>—</li>';
          const chalItems  = (info.challenges    || []).map(c => `<li>${escapeHtml(c)}</li>`).join('') || '<li>—</li>';
          const oppItems   = (info.opportunities || []).map(o => `<li>${escapeHtml(o)}</li>`).join('') || '<li>—</li>';

          // Differentiator bars
          const diffs = profileByCluster[clusterNum] || [];
          let driverHtml = '';
          if (diffs.length > 0) {
            driverHtml = diffs.map(d => {
              const barW = Math.min(Math.abs(d.pct), 100).toFixed(1);
              const sign = d.pct >= 0 ? '+' : '';
              return `<div class="typology-driver-row">
                <div class="typology-driver-label">${escapeHtml(d.label)}</div>
                <div class="typology-driver-bar-wrap">
                  <div class="typology-driver-bar-fill" style="width:${escapeHtml(barW)}%;background:${escapeHtml(color)}"></div>
                </div>
                <div class="typology-driver-pct">${escapeHtml(sign + d.pct.toFixed(1))}%</div>
              </div>`;
            }).join('');
          } else {
            driverHtml = `<p class="typology-no-data">No variable notably above the Austria-wide average.</p>`;
          }

          // Narrative from drivers in summary
          let narrativeHtml = '';
          if (Array.isArray(info.drivers) && info.drivers.length > 0) {
            let para = '';
            info.drivers.slice(0, 3).forEach((d, i) => {
              const variable = Array.isArray(d.variable) ? d.variable[0] : d.variable;
              const pct      = Array.isArray(d.pct_over) ? d.pct_over[0] : d.pct_over;
              const zVal     = Array.isArray(d.z) ? d.z[0] : d.z;
              const label    = variable.replace(/^.*\./, '').replace(/_/g, ' ');
              const absZ     = Math.abs(zVal);
              const strength = absZ > 2.0 ? 'strong' : absZ > 1.0 ? 'moderate' : 'mild';

              let lead;
              if (i === 0)      lead = `This cluster has a <strong>${escapeHtml(String(pct))}% higher</strong> share of <em>${escapeHtml(label)}</em> than the Austria-wide average.`;
              else if (i === 1) lead = ` It also has a <strong>${escapeHtml(String(pct))}% higher</strong> share of <em>${escapeHtml(label)}</em>.`;
              else              lead = ` Additionally, <em>${escapeHtml(label)}</em> is <strong>${escapeHtml(String(pct))}% above</strong> the national average.`;

              para += ` ${lead} This is a ${escapeHtml(strength)} relative outlier within this selection (z&nbsp;=&nbsp;${escapeHtml(zVal.toFixed(2))}).`;
            });
            narrativeHtml = `<div class="typology-narrative"><p>${para.trim()}</p></div>`;
          }

          const card = document.createElement('div');
          card.className = 'typology-cluster-card';
          card.innerHTML = `
            <div class="typology-card-accent" style="background:${escapeHtml(color)}"></div>
            <div class="typology-card-inner">
              <div class="typology-card-header">
                <div class="typology-card-title">
                  <span class="typology-cluster-dot" style="background:${escapeHtml(color)}"></span>
                  <span class="typology-cluster-name">${escapeHtml(clusterId.replace(/_/g, ' '))}</span>
                </div>
                <span class="typology-count-badge">${escapeHtml(String(info.count))} zones</span>
              </div>
              <div class="typology-zones-row">${zoneChips}</div>
              <div class="typology-insights-grid">
                <div class="typology-insight-col">
                  <div class="typology-insight-heading typology-traits-heading">Characteristics</div>
                  <ul class="typology-insight-list">${traitItems}</ul>
                </div>
                <div class="typology-insight-col">
                  <div class="typology-insight-heading typology-challenges-heading">Challenges</div>
                  <ul class="typology-insight-list">${chalItems}</ul>
                </div>
                <div class="typology-insight-col">
                  <div class="typology-insight-heading typology-opps-heading">Opportunities</div>
                  <ul class="typology-insight-list">${oppItems}</ul>
                </div>
              </div>
              <div class="typology-drivers-section">
                <div class="typology-section-label">Key differentiators vs Austria average</div>
                <div class="typology-driver-rows">${driverHtml}</div>
              </div>
              ${narrativeHtml}
            </div>`;
          container.appendChild(card);
        }
      }

      function runClusterTypologyAnalysis(ids) {
        if (ids.length < 3) {
          alert('Please select at least 3 zones to run typology clustering.');
          return;
        }

        const btn = document.getElementById('run-typology-btn');
        btn.disabled = true;
        btn.textContent = 'Running…';

        // Ensure cluster containers are visible (switch away from Analysis tab if needed)
        const modalBody = document.getElementById('modal-body');
        if (modalBody.classList.contains('analysis-active')) {
          modalBody.classList.remove('analysis-active');
          document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('selected'));
          const chartsTab = document.querySelector('.view-tab[data-view="charts"]');
          if (chartsTab) chartsTab.classList.add('selected');
          document.getElementById('charts-container').style.display = 'grid';
          document.getElementById('analysis-container').style.display = 'none';
        }

        const url = `${PLUMBER_BASE}/cluster_typology?ids=${encodeURIComponent(ids.join(','))}`;
        fetch(url)
          .then(res => {
            if (!res.ok) {
              alert(`Could not retrieve typology (status ${res.status}). Is your R plumber server running on port 8000?`);
              throw new Error('HTTP ' + res.status);
            }
            return res.json();
          })
          .then(data => {
            renderTypologyResults(data);
            document.getElementById('cluster-summary').scrollIntoView({ behavior: 'smooth', block: 'start' });
          })
          .catch(err => console.error('Cluster error:', err))
          .finally(() => {
            btn.disabled = false;
            btn.textContent = 'Run Typology';
          });
      }

      // ══ FISCAL ANALYSIS ════════════════════════════════════════════════════════

      async function runFiscalAnalysis(ids) {
        const container = document.getElementById('analysis-container');
        if (!ids.length) {
          container.innerHTML = '<p style="padding:2rem;color:#666;">No zones to analyse.</p>';
          return;
        }

        // Fiscal/ML panel data is municipality-level — expand any Bezirk IDs to
        // their constituent Gemeinden using the first 3 digits of the GKZ.
        const gemeindeIds = [...new Set(ids.flatMap(id => {
          if (String(id).length <= 3) {
            const prefix = String(id).padStart(3, '0');
            return Object.keys(gemeindeData || {}).filter(k => String(k).substring(0, 3) === prefix);
          }
          return [id];
        }))];

        if (gemeindeIds.length === 0) {
          container.innerHTML = '<p style="padding:2rem;color:#666;">No municipality data found for the selected zones.</p>';
          return;
        }

        container.innerHTML = `<div class="analysis-loading" id="analysis-loading-msg">
          <div class="analysis-spinner"></div>
          <span id="analysis-loading-text">Running fiscal analysis across ${gemeindeIds.length} zone${gemeindeIds.length > 1 ? 's' : ''}…</span>
        </div>`;

        const warmupTimer = setTimeout(() => {
          const el = document.getElementById('analysis-loading-text');
          if (el) el.innerHTML = `Running fiscal analysis across ${gemeindeIds.length} zone${gemeindeIds.length > 1 ? 's' : ''}…<br>
            <span style="font-size:.78rem;color:#6b7280;margin-top:.4rem;display:block;">
              API is warming up — this can take up to 60 seconds on first use.
            </span>`;
        }, 8000);

        const idsParam = gemeindeIds.join(',');
        const idsBody  = JSON.stringify({ ids: gemeindeIds });

        const TS_METRICS = [
          { key: 'deficit_ratio',      label: 'Deficit Ratio',        fmt: v => (v*100).toFixed(1)+'%' },
          { key: 'exp_per_capita',     label: 'Expenditure / Capita', fmt: v => '€'+Math.round(v).toLocaleString('de-AT') },
          { key: 'rev_per_capita',     label: 'Revenue / Capita',     fmt: v => '€'+Math.round(v).toLocaleString('de-AT') },
          { key: 'balance_per_capita', label: 'Balance / Capita',     fmt: v => (v>=0?'+':'')+'€'+Math.round(v).toLocaleString('de-AT') },
          { key: 'exp_growth',         label: 'Expenditure Growth',   fmt: v => (v*100).toFixed(1)+'%' },
          { key: 'rev_growth',         label: 'Revenue Growth',       fmt: v => (v*100).toFixed(1)+'%' },
        ];

        try {
          const [riskRes, profileRes, clusterRes, mlRes, shapRes, ...tsResults] = await Promise.allSettled([
            fetch(`${PLUMBER_BASE}/fiscal_risk_summary?ids=${encodeURIComponent(idsParam)}`).then(r => r.json()),
            fetch(`${PLUMBER_BASE}/fiscal_profile?ids=${encodeURIComponent(idsParam)}`).then(r => r.json()),
            fetch(`${PLUMBER_BASE}/fiscal_clustering?ids=${encodeURIComponent(idsParam)}&k=3`).then(r => r.json()),
            fetch(`${ML_BASE}/predict_distress`, { method:'POST', headers:{'Content-Type':'application/json'}, body: idsBody }).then(r => r.json()),
            fetch(`${ML_BASE}/shap_explain`,     { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ids, top_n: 6 }) }).then(r => r.json()),
            ...TS_METRICS.map(m => fetch(`${PLUMBER_BASE}/fiscal_timeseries?ids=${encodeURIComponent(idsParam)}&metric=${m.key}`).then(r => r.json())),
          ]);

          clearTimeout(warmupTimer);
          const risk    = riskRes.status    === 'fulfilled' ? riskRes.value    : null;
          const profile = profileRes.status === 'fulfilled' ? profileRes.value : null;
          const cluster = clusterRes.status === 'fulfilled' ? clusterRes.value : null;
          const ml      = mlRes.status      === 'fulfilled' ? mlRes.value      : null;
          const shap    = shapRes.status    === 'fulfilled' ? shapRes.value     : null;
          const tsData  = tsResults.map((r, i) => ({
            ...TS_METRICS[i],
            data: r.status === 'fulfilled' && !r.value.error ? r.value : null
          })).filter(t => t.data);

          window.latestAnalysisData = { ml, risk, profile, cluster, tsData, shap };

          container.innerHTML = '';

          // ── Data vintage note
          const dataNoteEl = document.createElement('div');
          dataNoteEl.className = 'data-note-banner';
          dataNoteEl.innerHTML = `
            <span class="data-note-icon">ⓘ</span>
            <div style="flex:1;min-width:0;">
              <strong>Data &amp; Model Notes</strong>
              <ul style="margin:.45rem 0 0;padding-left:1.1rem;line-height:1.65;list-style:disc;">
                <li><strong>Data source:</strong> All fiscal indicators are drawn from Statistik Austria's
                  free <strong>OGD</strong> municipal finance release (reference year <strong>2020</strong>),
                  the most recent complete cross-section publicly available at Gemeinde level.
                  Richer socio-demographic indicators (age structure, sex ratios, household composition)
                  held in <strong>STATcube</strong> (Statistik Austria's paid platform) were excluded to keep
                  the pipeline fully reproducible without a subscription; incorporating those variables
                  is a planned extension that is expected to meaningfully improve predictive performance.</li>
                <li><strong>Train / test split:</strong> The XGBoost distress classifier uses a
                  <strong>stratified 80 / 20 split</strong> on the 2020 cross-section
                  (stratified by Bundesland to preserve regional representation).
                  Model selection and hyperparameter tuning were performed on the training fold only;
                  AUC-ROC is reported on the held-out test set.</li>
                <li><strong>Temporal scope:</strong> Because a continuous annual panel is not yet
                  publicly available at Gemeinde level, predictions are anchored to 2020.
                  Extending to a longitudinal panel as future OGD releases become available
                  is a core next step of this research.</li>
              </ul>
            </div>`;
          container.appendChild(dataNoteEl);

          const rDown = !risk   || risk.error;
          const mDown = !ml     || ml.detail;
          if (rDown || mDown) {
            const banner = document.createElement('div');
            banner.className = 'analysis-api-banner';
            banner.innerHTML = [
              rDown ? '⚠ R analysis API not responding — fiscal indicators unavailable.' : '',
              mDown ? '⚠ Python ML API not responding — distress predictions unavailable.' : '',
            ].filter(Boolean).join('<br>');
            container.appendChild(banner);
          }

          const ATABS = [
            { id: 'atab-ml',       label: 'ML Distress',    available: !!(ml && ml.zones) },
            { id: 'atab-risk',     label: 'Risk Summary',   available: !!(risk && risk.zones) },
            { id: 'atab-spending', label: 'Spending',       available: !!(profile && profile.zones) },
            { id: 'atab-cluster',  label: 'Clustering',     available: !!(cluster && cluster.profiles) },
            { id: 'atab-trends',   label: 'Trends',         available: tsData.length > 0 },
          ].filter(t => t.available);

          if (ATABS.length === 0) {
            container.innerHTML += '<p style="padding:2rem;color:#888;">No data returned from either server.</p>';
          } else {
            const tabBar = document.createElement('div');
            tabBar.className = 'analysis-inner-tabbar';
            ATABS.forEach((t, i) => {
              const btn = document.createElement('button');
              btn.className = 'analysis-inner-tab' + (i === 0 ? ' active' : '');
              btn.dataset.target = t.id;
              btn.textContent = t.label;
              btn.addEventListener('click', () => {
                tabBar.querySelectorAll('.analysis-inner-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                panelWrap.querySelectorAll('.analysis-panel').forEach(p => p.style.display = 'none');
                panelWrap.querySelector('#' + t.id).style.display = '';
              });
              tabBar.appendChild(btn);
            });
            container.appendChild(tabBar);

            const panelWrap = document.createElement('div');
            panelWrap.className = 'analysis-panel-wrap';

            if (ml && ml.zones) {
              const p = document.createElement('div');
              p.className = 'analysis-panel'; p.id = 'atab-ml';
              renderMLRiskSection(p, ml, shap);
              panelWrap.appendChild(p);
            }
            if (risk && risk.zones) {
              const p = document.createElement('div');
              p.className = 'analysis-panel'; p.id = 'atab-risk';
              p.style.display = 'none';
              renderRiskSummarySection(p, risk);
              panelWrap.appendChild(p);
            }
            if (profile && profile.zones) {
              const p = document.createElement('div');
              p.className = 'analysis-panel'; p.id = 'atab-spending';
              p.style.display = 'none';
              renderSpendingProfileSection(p, profile);
              panelWrap.appendChild(p);
            }
            if (cluster && cluster.profiles) {
              const p = document.createElement('div');
              p.className = 'analysis-panel'; p.id = 'atab-cluster';
              p.style.display = 'none';
              renderFiscalClusterSection(p, cluster);
              panelWrap.appendChild(p);
            }
            if (tsData.length > 0) {
              const p = document.createElement('div');
              p.className = 'analysis-panel'; p.id = 'atab-trends';
              p.style.display = 'none';
              renderTrendsSection(p, tsData, ids);
              panelWrap.appendChild(p);
            }

            container.appendChild(panelWrap);
          }

        } catch (err) {
          container.innerHTML = `<div class="analysis-api-banner">Error running analysis: ${escapeHtml(err.message)}</div>`;
        }
      }

      function svgArcGauge(prob, color, size = 90) {
        const R = 34, cx = size / 2, cy = size * 0.58;
        const startA = Math.PI, endA = Math.PI + (prob / 100) * Math.PI;
        const x1 = cx + R * Math.cos(startA), y1 = cy + R * Math.sin(startA);
        const x2 = cx + R * Math.cos(endA),   y2 = cy + R * Math.sin(endA);
        const lg = prob > 50 ? 1 : 0;
        const track = `M${(cx - R).toFixed(1)},${cy.toFixed(1)} A${R},${R} 0 0,1 ${(cx + R).toFixed(1)},${cy.toFixed(1)}`;
        const fill  = `M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)}`;
        return `<svg width="${size}" height="${Math.round(size * 0.62)}" viewBox="0 0 ${size} ${Math.round(size * 0.62)}" style="display:block;overflow:visible">
          <path d="${track}" fill="none" stroke="#e2e8f0" stroke-width="7" stroke-linecap="round"/>
          <path d="${fill}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"/>
          <text x="${cx}" y="${(cy - 2).toFixed(1)}" text-anchor="middle" font-size="15" font-weight="800" fill="${color}">${prob}%</text>
        </svg>`;
      }

      function renderMLRiskSection(container, ml, shap) {
        const sec  = makeSection('ML Fiscal Distress Prediction', `XGBoost · Predicts deficit in ${ml.year + 1} · AUC-ROC 0.632`);
        const grid = document.createElement('div');
        grid.className = 'analysis-risk-grid';

        ml.zones.forEach(zone => {
          const shapZone = shap?.explanations?.find(e => e.gcd === zone.gcd);
          const card    = document.createElement('div');
          const riskCat = safeStr(zone.risk_category, 'Low');
          const riskKey = riskCat.toLowerCase();
          card.className = `analysis-risk-card arc-card risk-${riskKey}`;

          const prob  = Math.round((zone.distress_probability || 0) * 100);
          const color = riskColor(riskCat);
          card.innerHTML = `
            <div class="arc-card-header risk-${riskKey}">
              <div class="arc-card-title-row">
                <div>
                  <div class="arc-gcd">${escapeHtml(zoneName(zone.gcd))}</div>
                  <div class="arc-meta"><span class="arc-gcd-code">${escapeHtml(zone.gcd)}</span> · ${escapeHtml(safeStr(zone.bundesland,''))} · ${escapeHtml(safeStr(zone.settlement_class,''))}</div>
                </div>
                <div class="arc-badge risk-badge-${escapeHtml(riskKey)}">${escapeHtml(riskCat)}</div>
              </div>
            </div>
            <div class="arc-card-body">
              <div class="arc-gauge-row">
                <div class="arc-gauge-svg">${svgArcGauge(prob, color)}</div>
                <div class="arc-gauge-info">
                  <div class="arc-prob-label">Distress probability<br>in ${(ml.year || 2019) + 1}</div>
                  ${(zone.deficit_streak || 0) > 0
                    ? `<div class="arc-streak">${escapeHtml(zone.deficit_streak)} consecutive deficit yr${zone.deficit_streak > 1 ? 's' : ''}</div>`
                    : '<div class="arc-streak" style="color:#16a34a">No recent streak</div>'}
                </div>
              </div>
              ${shapZone ? renderShapDrivers(shapZone.top_drivers) : ''}
            </div>
          `;
          grid.appendChild(card);
        });

        sec.appendChild(grid);
        container.appendChild(sec);
      }

      function renderShapDrivers(drivers) {
        if (!drivers || !drivers.length) return '';
        const maxAbs = Math.max(...drivers.map(d => Math.abs(d.shap_value)), 0.001);
        const rows = drivers.map(d => {
          const pct  = Math.round((Math.abs(d.shap_value) / maxAbs) * 100);
          const col  = d.direction === 'increases_risk' ? '#dc2626' : '#16a34a';
          const sign = d.direction === 'increases_risk' ? '▲' : '▼';
          return `<div class="shap-row">
            <span class="shap-sign" style="color:${col}">${sign}</span>
            <span class="shap-feat">${escapeHtml(d.feature.replace(/_/g,' '))}</span>
            <div class="shap-bar-wrap">
              <div class="shap-bar" style="width:${pct}%;background:${col};"></div>
            </div>
          </div>`;
        }).join('');
        return `<div class="shap-section"><div class="shap-title">Key risk drivers</div>${rows}</div>`;
      }

      function renderRiskSummarySection(container, risk) {
        const nat = risk.national_context || {};
        const natDefPct = nat.median_deficit_ratio != null ? (Number(nat.median_deficit_ratio) * 100).toFixed(1) : '–';
        const natMunPct = nat.pct_municipalities_in_deficit != null ? Number(nat.pct_municipalities_in_deficit) : '–';
        const sec = makeSection('Fiscal Risk Summary',
          `Rule-based score · National median deficit ratio: ${natDefPct}% · ${natMunPct}% of all municipalities in deficit`);

        const table = document.createElement('table');
        table.className = 'analysis-table';
        table.innerHTML = `<thead><tr>
          <th>Zone</th><th>Risk</th><th>Score</th><th>Trend</th>
          <th>Deficit ratio</th><th>Streak (yrs)</th><th>Exp/capita €</th><th>Rev/capita €</th><th>National %ile</th>
        </tr></thead>`;
        const tbody = document.createElement('tbody');

        risk.zones.forEach(z => {
          const zRiskCat = safeStr(z.risk_category, 'Low');
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><strong>${escapeHtml(zoneName(z.gcd))}</strong><br><small class="arc-gcd-code">${escapeHtml(z.gcd)}</small> <small>${escapeHtml(safeStr(z.bundesland,''))}</small></td>
            <td><span class="risk-pill risk-pill-${escapeHtml(zRiskCat.toLowerCase())}">${escapeHtml(zRiskCat)}</span></td>
            <td>${escapeHtml(z.risk_score ?? '–')}</td>
            <td class="${safeStr(z.trend_direction,'') === 'Deteriorating' ? 'trend-bad' : safeStr(z.trend_direction,'') === 'Improving' ? 'trend-good' : ''}">${escapeHtml(safeStr(z.trend_direction,'–'))}</td>
            <td>${escapeHtml(z.deficit_ratio != null ? (z.deficit_ratio * 100).toFixed(1) + '%' : '–')}</td>
            <td>${escapeHtml(z.deficit_streak ?? '–')}</td>
            <td>${escapeHtml(z.exp_per_capita ? Math.round(z.exp_per_capita).toLocaleString('de-AT') : '–')}</td>
            <td>${escapeHtml(z.rev_per_capita ? Math.round(z.rev_per_capita).toLocaleString('de-AT') : '–')}</td>
            <td>${escapeHtml(z.national_percentile != null ? z.national_percentile + 'th' : '–')}</td>
          `;
          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        sec.appendChild(table);
        container.appendChild(sec);
      }

      function renderSpendingProfileSection(container, profile) {
        const sec = makeSection('Spending Profile', `Expenditure shares by category · Year ${profile.year}`);
        const nat = profile.national_benchmark?.spending_shares || {};

        const CATS = [
          { key: 'admin',             label: 'Administration',    color: '#4e79a7' },
          { key: 'education_culture', label: 'Education & Culture', color: '#f28e2b' },
          { key: 'social_welfare',    label: 'Social Welfare',    color: '#e15759' },
          { key: 'health',            label: 'Health',            color: '#76b7b2' },
          { key: 'infrastructure',    label: 'Infrastructure',    color: '#59a14f' },
          { key: 'finance_debt',      label: 'Finance & Debt',    color: '#edc949' },
          { key: 'economy',           label: 'Economy',           color: '#af7aa1' },
          { key: 'utilities',         label: 'Utilities',         color: '#ff9da7' },
        ];

        const grid = document.createElement('div');
        grid.className = 'spending-profile-grid';

        profile.zones.forEach(zone => {
          if (!zone.spending_shares) return;

          const allVals = CATS.map(cat => ((zone.spending_shares || {})[cat.key] || 0) * 100);
          const maxVal  = Math.max(...allVals, ...CATS.map(cat => (nat[cat.key] || 0) * 100)) * 1.1 || 1;

          const card = document.createElement('div');
          card.className = 'spending-card';
          card.innerHTML = `<div class="spending-card-title">${escapeHtml(zoneName(zone.gcd))} <span>${escapeHtml(safeStr(zone.bundesland,''))}</span></div>`;

          CATS.forEach(cat => {
            const val    = ((zone.spending_shares || {})[cat.key] || 0) * 100;
            const natVal = (nat[cat.key] || 0) * 100;
            const diff   = val - natVal;
            const barPct = Math.min((val / maxVal) * 100, 100).toFixed(1);
            const natPct = natVal > 0 ? Math.min((natVal / maxVal) * 100, 100).toFixed(1) : null;
            const diffStr = natVal > 0
              ? `<span class="spend-diff ${diff > 0 ? 'spend-over' : 'spend-under'}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}pp</span>`
              : '';
            card.innerHTML += `
              <div class="spend-row">
                <div class="spend-label">${escapeHtml(cat.label)}</div>
                <div class="spend-bar-wrap">
                  <div class="spend-bar" style="width:${barPct}%;background:${cat.color};"></div>
                  ${natPct != null ? `<div class="spend-nat-line" style="left:${natPct}%;"></div>` : ''}
                </div>
                <div class="spend-val">${escapeHtml(val.toFixed(1))}% ${diffStr}</div>
              </div>`;
          });

          const fis = zone.fiscal;
          const balColor = fis.fiscal_balance >= 0 ? '#16a34a' : '#dc2626';
          card.innerHTML += `
            <div class="spend-fiscal-footer">
              <span>Balance: <strong style="color:${balColor}">${escapeHtml(fis.fiscal_balance >= 0 ? '+' : '')}${escapeHtml(Math.round(fis.fiscal_balance / 1000).toLocaleString('de-AT'))}k €</strong></span>
              <span>Deficit ratio: ${escapeHtml((fis.deficit_ratio * 100).toFixed(1))}%</span>
              <span>Risk score: ${escapeHtml(zone.risk_score)}</span>
            </div>`;

          grid.appendChild(card);
        });

        sec.appendChild(grid);
        container.appendChild(sec);
      }

      function renderFiscalClusterSection(container, cluster) {
        const sec = makeSection('Fiscal Typology Clustering',
          `K-means on fiscal features · k=${cluster.k} · Year ${cluster.year} · ${cluster.n_zones} zones`);

        const CLUSTER_COLORS = ['#1d6fa5','#e07520','#2ca25f','#6b2d8b','#dc2626','#0e7490'];
        const SPEND_CATS = [
          { key: 'share_exp_admin',             label: 'Admin' },
          { key: 'share_exp_education_culture', label: 'Education' },
          { key: 'share_exp_social_welfare',    label: 'Social' },
          { key: 'share_exp_health',            label: 'Health' },
          { key: 'share_exp_infrastructure',    label: 'Infrastructure' },
          { key: 'share_exp_finance_debt',      label: 'Finance/Debt' },
        ];
        const safeNum = (v, mult, dec) => (v != null && !isNaN(Number(v))) ? (Number(v) * mult).toFixed(dec) : null;

        cluster.profiles.forEach((prof, i) => {
          const clr  = CLUSTER_COLORS[i % CLUSTER_COLORS.length];
          const nZ   = Number(prof.n_zones) || 0;
          const aRsk = Number(prof.avg_risk_score) || 0;
          const top  = safeStr(prof.top_spending_cat, '–').replace(/_/g, ' ');
          const fp   = prof.fiscal_profile || {};
          const riskClr = aRsk >= 60 ? '#dc2626' : aRsk >= 30 ? '#f97316' : '#16a34a';

          const block = document.createElement('div');
          block.className = 'fcb2-block';
          block.style.borderTopColor = clr;

          const hdr = document.createElement('div');
          hdr.className = 'fcb2-hdr';
          hdr.innerHTML = `
            <span class="fcb2-badge" style="background:${clr}">Cluster ${escapeHtml(prof.cluster)}</span>
            <span class="fcb2-count">${nZ} zone${nZ !== 1 ? 's' : ''}</span>
            <span class="fcb2-top">Top spend: <strong>${escapeHtml(top)}</strong></span>
            <span class="fcb2-risk" style="color:${riskClr}">Avg risk <strong>${aRsk}</strong>/100</span>
          `;
          block.appendChild(hdr);

          const body = document.createElement('div');
          body.className = 'fcb2-body';

          const left = document.createElement('div');
          left.className = 'fcb2-left';

          const kpis = [
            { label: 'Deficit ratio',  val: safeNum(fp.deficit_ratio, 100, 1) != null ? safeNum(fp.deficit_ratio, 100, 1)+'%' : '–', neg: fp.deficit_ratio > 0.3 },
            { label: 'Exp/capita',     val: fp.exp_per_capita != null ? '€'+Math.round(fp.exp_per_capita).toLocaleString('de-AT') : '–', neg: false },
            { label: 'Rev/capita',     val: fp.rev_per_capita != null ? '€'+Math.round(fp.rev_per_capita).toLocaleString('de-AT') : '–', neg: false },
            { label: 'Exp growth',     val: safeNum(fp.exp_growth, 100, 1) != null ? safeNum(fp.exp_growth,100,1)+'%' : '–', neg: fp.exp_growth > 0.05 },
            { label: 'Rev growth',     val: safeNum(fp.rev_growth, 100, 1) != null ? safeNum(fp.rev_growth,100,1)+'%' : '–', neg: false },
            { label: 'Deficit streak', val: fp.deficit_streak != null ? Number(fp.deficit_streak).toFixed(1)+' yrs' : '–', neg: fp.deficit_streak > 3 },
          ];
          left.innerHTML = `<div class="fcb2-kpi-grid">${
            kpis.map(k => `<div class="fcb2-kpi">
              <div class="fcb2-kpi-val" style="color:${k.neg ? '#dc2626' : '#1e3a5f'}">${escapeHtml(k.val)}</div>
              <div class="fcb2-kpi-lbl">${escapeHtml(k.label)}</div>
            </div>`).join('')
          }</div>`;

          const maxShare = Math.max(...SPEND_CATS.map(c => Number(fp[c.key]) || 0));
          left.innerHTML += `<div class="fcb2-spend-title">Spending breakdown (cluster avg)</div>
            <div class="fcb2-spend-bars">${
              SPEND_CATS.map(c => {
                const pct  = ((Number(fp[c.key]) || 0) * 100);
                const barW = maxShare > 0 ? Math.round((Number(fp[c.key]) || 0) / maxShare * 100) : 0;
                return `<div class="fcb2-spend-row">
                  <span class="fcb2-spend-lbl">${escapeHtml(c.label)}</span>
                  <div class="fcb2-spend-barwrap">
                    <div class="fcb2-spend-bar" style="width:${barW}%;background:${clr}88;"></div>
                  </div>
                  <span class="fcb2-spend-pct">${pct.toFixed(1)}%</span>
                </div>`;
              }).join('')
            }</div>`;

          body.appendChild(left);

          const right = document.createElement('div');
          right.className = 'fcb2-right';

          const blDist  = prof.bundesland_dist || {};
          const BL_COLORS = ['#1d6fa5','#e07520','#2ca25f','#6b2d8b','#dc2626','#0e7490','#b45309','#0f766e','#7c3aed'];
          const blEntries = Object.entries(blDist).sort((a,b) => b[1]-a[1]);
          const blSlices  = blEntries.map(([bl, cnt], j) => ({ label: bl, value: Number(cnt), color: BL_COLORS[j % BL_COLORS.length] }));
          const blTotal   = blSlices.reduce((s, d) => s + d.value, 0) || 1;
          const blLegend  = blSlices.map(s => `<div class="donut-legend-row"><span class="donut-dot" style="background:${s.color}"></span><span class="donut-lbl">${escapeHtml(s.label)}</span><span class="donut-pct">${Math.round(s.value/blTotal*100)}%</span></div>`).join('');
          right.innerHTML = `<div class="fcb2-dist-title">Bundesland distribution</div>
            <div class="donut-wrap">${svgDonut(blSlices, 90)}<div class="donut-legend">${blLegend}</div></div>`;

          const scDist   = prof.settlement_dist || {};
          const SC_COLORS = { Großstadt:'#6b2d8b', Kleinstadt:'#1d6fa5', Marktgemeinde:'#e07520', Dorfgemeinde:'#2ca25f' };
          const scOrder  = ['Großstadt','Kleinstadt','Marktgemeinde','Dorfgemeinde'];
          const scSlices = scOrder.filter(k => scDist[k]).map(k => ({ label: k, value: Number(scDist[k]), color: SC_COLORS[k] }));
          const scTotal  = scSlices.reduce((s, d) => s + d.value, 0) || 1;
          const scLegend = scSlices.map(s => `<div class="donut-legend-row"><span class="donut-dot" style="background:${s.color}"></span><span class="donut-lbl">${escapeHtml(s.label)}</span><span class="donut-pct">${Math.round(s.value/scTotal*100)}%</span></div>`).join('');
          right.innerHTML += `<div class="fcb2-dist-title" style="margin-top:12px">Settlement types</div>
            <div class="donut-wrap">${svgDonut(scSlices, 90)}<div class="donut-legend">${scLegend}</div></div>`;

          const zones      = Array.isArray(prof.zones) ? prof.zones : [];
          const zonesSorted = [...zones].sort((a,b) => (Number(b.risk_score)||0) - (Number(a.risk_score)||0));
          const listId     = `fcb2-zones-${i}`;
          right.innerHTML += `<div class="fcb2-zones-hdr">
            <span>${nZ} zone${nZ!==1?'s':''} — sorted by risk score</span>
            ${nZ > 6 ? `<button class="fcb2-show-all" onclick="
              const el=document.getElementById('${listId}');
              const hidden=el.querySelectorAll('.fcb2-zone-row.hidden');
              if(hidden.length){hidden.forEach(r=>r.classList.remove('hidden'));this.textContent='Show fewer';}
              else{el.querySelectorAll('.fcb2-zone-row:nth-child(n+7)').forEach(r=>r.classList.add('hidden'));this.textContent='Show all ${nZ}';}
            ">Show all ${nZ}</button>` : ''}
          </div>
          <div class="fcb2-zone-list" id="${listId}">${
            zonesSorted.map((z, zi) => {
              const zRisk    = Number(z.risk_score) || 0;
              const zRiskClr = zRisk >= 60 ? '#dc2626' : zRisk >= 30 ? '#f97316' : '#16a34a';
              const zName    = zoneName(safeStr(z.gcd,''));
              const zDr      = safeStr(z.deficit_ratio,'');
              const drPct    = zDr && !isNaN(Number(zDr)) ? (Number(zDr)*100).toFixed(1)+'%' : '–';
              const expCap   = Number(z.exp_per_capita) ? '€'+Math.round(z.exp_per_capita).toLocaleString('de-AT') : '–';
              return `<div class="fcb2-zone-row${zi>=6?' hidden':''}">
                <div class="fcb2-zone-name" title="${escapeHtml(safeStr(z.gcd,''))}">${escapeHtml(zName)}</div>
                <div class="fcb2-zone-meta">${escapeHtml(safeStr(z.bundesland,''))} · ${escapeHtml(safeStr(z.settlement_class,''))}</div>
                <div class="fcb2-zone-stats">
                  <span style="color:${zRiskClr};font-weight:700">${zRisk}</span>
                  <span class="fcb2-zone-stat-lbl">risk</span>
                  <span>${escapeHtml(drPct)}</span>
                  <span class="fcb2-zone-stat-lbl">def.</span>
                  <span>${escapeHtml(expCap)}</span>
                  <span class="fcb2-zone-stat-lbl">exp/cap</span>
                </div>
              </div>`;
            }).join('')
          }</div>`;

          body.appendChild(right);
          block.appendChild(body);
          sec.appendChild(block);
        });

        container.appendChild(sec);
      }

      // ══ SVG CHART HELPERS ══════════════════════════════════════════════════════

      function svgDonut(slices, size = 100) {
        const total = slices.reduce((s, d) => s + Number(d.value), 0);
        if (!total) return `<svg width="${size}" height="${size}"></svg>`;
        const cx = size / 2, cy = size / 2, r = size / 2 - 3, ir = r * 0.52;
        let angle = -Math.PI / 2;
        const paths = slices.map(d => {
          const a = Math.min((Number(d.value) / total) * 2 * Math.PI, 2 * Math.PI - 0.001);
          const x1  = cx + r  * Math.cos(angle),   y1  = cy + r  * Math.sin(angle);
          const x2  = cx + r  * Math.cos(angle+a),  y2  = cy + r  * Math.sin(angle+a);
          const ix1 = cx + ir * Math.cos(angle),    iy1 = cy + ir * Math.sin(angle);
          const ix2 = cx + ir * Math.cos(angle+a),  iy2 = cy + ir * Math.sin(angle+a);
          const la  = a > Math.PI ? 1 : 0;
          const seg = `<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r},0,${la},1,${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${ir},${ir},0,${la},0,${ix1.toFixed(2)},${iy1.toFixed(2)} Z" fill="${d.color}"><title>${escapeHtml(d.label)}: ${Math.round(Number(d.value)/total*100)}%</title></path>`;
          angle += a;
          return seg;
        }).join('');
        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;flex-shrink:0">${paths}</svg>`;
      }

      function svgLineChart(series, years, W = 420, H = 190) {
        if (!series.length || years.length < 2) return '';
        const PL = 46, PR = 14, PT = 10, PB = 28;
        const w = W - PL - PR, h = H - PT - PB;
        const allV = series.flatMap(s => s.values.filter(v => v != null && !isNaN(v)));
        if (!allV.length) return '';
        let lo = Math.min(...allV), hi = Math.max(...allV);
        const span = hi - lo || Math.abs(lo) * 0.2 || 1;
        lo -= span * 0.15; hi += span * 0.15;
        const xS   = i => PL + (i / (years.length - 1)) * w;
        const yS   = v => PT + h - ((v - lo) / (hi - lo)) * h;
        const fmtY = v => Math.abs(v) >= 1000 ? (v/1000).toFixed(1)+'k' : Math.abs(v) < 0.5 ? (v*100).toFixed(1)+'%' : v.toFixed(1);

        let grid = '', yLbls = '', xLbls = '';
        [0, 0.25, 0.5, 0.75, 1].forEach(t => {
          const v = lo + (hi - lo) * t;
          const y = yS(v).toFixed(1);
          grid  += `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="#eceff4" stroke-width="1"/>`;
          yLbls += `<text x="${PL - 5}" y="${(+y + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="#94a3b8">${fmtY(v)}</text>`;
        });
        years.forEach((yr, i) => {
          if (i % 2 === 0 || i === years.length - 1)
            xLbls += `<text x="${xS(i).toFixed(1)}" y="${(PT + h + 18).toFixed(1)}" text-anchor="middle" font-size="9" fill="#94a3b8">${escapeHtml(String(yr))}</text>`;
        });

        const seriesPts = series.map(s =>
          years.map((_, i) => { const v = s.values[i]; return (v != null && !isNaN(v)) ? [xS(i), yS(v), v] : null; })
        );

        function smoothPath(pts) {
          const valid = pts.filter(Boolean);
          if (valid.length < 2) return '';
          let d = `M${valid[0][0].toFixed(1)},${valid[0][1].toFixed(1)}`;
          for (let i = 1; i < valid.length; i++) {
            const p0 = valid[Math.max(i - 2, 0)], p1 = valid[i - 1], p2 = valid[i], p3 = valid[Math.min(i + 1, valid.length - 1)];
            const cp1x = p1[0] + (p2[0] - p0[0]) / 6, cp1y = p1[1] + (p2[1] - p0[1]) / 6;
            const cp2x = p2[0] - (p3[0] - p1[0]) / 6, cp2y = p2[1] - (p3[1] - p1[1]) / 6;
            d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
          }
          return d;
        }

        const baseY = (PT + h).toFixed(1);
        const defs = series.map((s, si) => s.dashed ? '' :
          `<linearGradient id="slg${si}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.color}" stop-opacity="0.25"/><stop offset="90%" stop-color="${s.color}" stop-opacity="0.02"/></linearGradient>`
        ).join('');

        const areas = series.map((s, si) => {
          if (s.dashed) return '';
          const valid = seriesPts[si].filter(Boolean);
          if (valid.length < 2) return '';
          const lp = smoothPath(seriesPts[si]);
          if (!lp) return '';
          return `<path d="${lp} L${valid[valid.length-1][0].toFixed(1)},${baseY} L${valid[0][0].toFixed(1)},${baseY} Z" fill="url(#slg${si})" stroke="none"/>`;
        }).join('');

        const lines = series.map((s, si) => {
          const lp = smoothPath(seriesPts[si]);
          if (!lp) return '';
          const dash = s.dashed ? ' stroke-dasharray="5,4"' : '';
          const sw   = s.dashed ? 1.5 : 2.5;
          const op   = s.dashed ? ' opacity="0.65"' : '';
          return `<path d="${lp}" fill="none" stroke="${s.color}" stroke-width="${sw}"${dash}${op} stroke-linejoin="round" stroke-linecap="round"><title>${escapeHtml(s.label)}</title></path>`;
        }).join('');

        const dots = series.map((s, si) => {
          if (s.dashed) return '';
          return years.map((yr, i) => {
            const pt = seriesPts[si][i];
            if (!pt) return '';
            return `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3.5" fill="${s.color}" stroke="#fff" stroke-width="1.5"><title>${escapeHtml(yr)}: ${escapeHtml(fmtY(pt[2]))}</title></circle>`;
          }).join('');
        }).join('');

        return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block"><defs>${defs}</defs>${grid}${yLbls}${xLbls}${areas}${lines}${dots}</svg>`;
      }

      function renderTrendsSection(container, tsData, ids) {
        const sec  = makeSection('Fiscal Trends', '10-year time series · National median shown as dashed grey line');
        const grid = document.createElement('div');
        grid.className = 'trends-grid';

        const zoneColorMap = {};
        ids.forEach((id, i) => { zoneColorMap[id] = ZONE_PALETTE[i % ZONE_PALETTE.length]; });

        tsData.forEach(ts => {
          const card  = document.createElement('div');
          card.className = 'trends-chart-card';

          const years  = ts.data.years_available || [];
          const series = (ts.data.series || []).map(z => ({
            label: `${zoneName(z.gcd)} (${z.gcd})`,
            color: zoneColorMap[z.gcd] || '#888',
            values: years.map(yr => {
              const idx = (z.years || []).indexOf(yr);
              return idx >= 0 ? z.values[idx] : null;
            }),
          }));

          const natMed = ts.data.national_median;
          if (natMed && natMed.years && natMed.values) {
            series.push({
              label: 'National median',
              color: '#94a3b8',
              dashed: true,
              values: years.map(yr => {
                const idx = natMed.years.indexOf(yr);
                return idx >= 0 ? natMed.values[idx] : null;
              }),
            });
          }

          const legendSeries = series.filter(s => !s.dashed);

          card.innerHTML = `
            <div class="trends-chart-title">
              ${escapeHtml(ts.label)}
              <button class="trends-expand-btn" title="Expand chart">⤢</button>
            </div>`;
          card.innerHTML += svgLineChart(series, years, 420, 190);
          if (legendSeries.length > 0) {
            card.innerHTML += `<div class="trends-legend">${
              legendSeries.map(s => `<span class="trends-legend-item"><span class="trends-legend-dot" style="background:${s.color}"></span>${escapeHtml(s.label)}</span>`).join('')
            }</div>`;
          }

          card.querySelector('.trends-expand-btn').addEventListener('click', () => {
            const overlay = document.getElementById('chart-zoom-overlay');
            document.getElementById('chart-zoom-title').textContent  = ts.label;
            document.getElementById('chart-zoom-svg').innerHTML      = svgLineChart(series, years, 1200, 420);
            document.getElementById('chart-zoom-legend').innerHTML   = legendSeries.map(s =>
              `<span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:50%;background:${s.color};flex-shrink:0"></span>${escapeHtml(s.label)}</span>`
            ).join('');
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
          });

          grid.appendChild(card);
        });

        sec.appendChild(grid);
        container.appendChild(sec);
      }

      // ══ INITIALISATION ══════════════════════════════════════════════════════════
      document.addEventListener('DOMContentLoaded', async () => {
        applyLang();

        // Pre-warm HuggingFace Spaces silently — free tier goes cold after inactivity,
        // cold start takes 30-60s. Pinging now means the Space is ready by the time
        // the user clicks the Analysis tab.
        Promise.allSettled([
          fetch(`${PLUMBER_BASE}/fiscal_risk_summary?ids=10101`).catch(() => {}),
          fetch(`${ML_BASE}/health`).catch(() => {}),
        ]);

        // Chart zoom overlay close handlers
        function closeChartZoom() {
          document.getElementById('chart-zoom-overlay').style.display = 'none';
          document.body.style.overflow = '';
        }
        document.getElementById('chart-zoom-close').addEventListener('click', closeChartZoom);
        document.getElementById('chart-zoom-overlay').addEventListener('click', e => {
          if (e.target === e.currentTarget) closeChartZoom();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChartZoom(); });

        if (!selectedIds.length) {
          document.getElementById('profile-loading').innerHTML =
            '<p style="color:#dc2626">No zones selected.<br><a href="./index.html" style="color:#1e3a5f;font-weight:500;">← Return to map</a></p>';
          return;
        }

        try {
          const data    = await fetch('./data.json').then(r => r.json());
          bezirkData    = data['Bezirk']       || {};
          gemeindeData  = data['Gemeinde']      || {};
          austriaTotals = data['Austria Total'] || {};
          window.austriaTotals = austriaTotals;
          window.austriaPopulation = totalPopulationForData(gemeindeData);

          // Show content
          document.getElementById('profile-loading').style.display    = 'none';
          document.getElementById('modal-header').style.display       = '';
          document.getElementById('modal-toolbar').style.display      = '';
          document.getElementById('modal-body').style.display         = '';

          // Sync category checkboxes to the saved selection
          document.querySelectorAll('#category-form input[type="checkbox"]').forEach(cb => {
            cb.checked = selectedCategories.includes(cb.value);
          });

          window.selectedIdsExcel = new Set(selectedIds);
          window.chosenCategories = selectedCategories;

          // Render initial view (charts)
          updateTables(selectedIds);

          // Mini-map — defer one frame so browser has calculated layout before MapLibre reads container size
          requestAnimationFrame(() => window.initZoneMiniMap(selectedIds, currentZoneType));

          // ── Tab bar
          const tabButtons = document.querySelectorAll('.view-tab');
          const views = {
            charts:   document.getElementById('charts-container'),
            tables:   document.getElementById('tables-container'),
            analysis: document.getElementById('analysis-container'),
          };

          tabButtons.forEach(tab => {
            tab.addEventListener('click', () => {
              tabButtons.forEach(btn => btn.classList.remove('selected'));
              tab.classList.add('selected');
              Object.values(views).forEach(div => div.style.display = 'none');

              const view = tab.getAttribute('data-view');
              currentView = view;

              if (view === 'analysis') {
                views.analysis.style.display = 'flex';
                document.getElementById('modal-body').classList.add('analysis-active');
                runFiscalAnalysis(selectedIds);
                return;
              }
              document.getElementById('modal-body').classList.remove('analysis-active');

              if (!selectedCategories || selectedCategories.length === 0) return;
              const avail = Object.keys(latestAggregatedData);
              const valid = selectedCategories.filter(c => avail.includes(c));

              if (view === 'charts') {
                renderAggregatedCharts(latestAggregatedData, valid);
                views[view].style.display = 'grid';
              } else if (view === 'tables') {
                renderAggregatedTables(latestAggregatedData, valid);
                views[view].style.display = 'block';
              }
            });
          });

          // ── Category form
          document.getElementById('category-form').addEventListener('change', () => {
            selectedCategories = Array.from(document.querySelectorAll('#category-form input:checked')).map(i => i.value);
            window.chosenCategories = selectedCategories;

            document.getElementById('charts-container').style.display = 'none';
            document.getElementById('tables-container').style.display = 'none';

            updateTables(selectedIds);

            if (selectedCategories.length === 0) return;
            const avail = Object.keys(latestAggregatedData);
            const valid = selectedCategories.filter(c => avail.includes(c));
            if (valid.length === 0) return;

            if (currentView === 'charts') {
              renderAggregatedCharts(latestAggregatedData, valid);
              document.getElementById('charts-container').style.display = 'grid';
            } else if (currentView === 'tables') {
              renderAggregatedTables(latestAggregatedData, valid);
              document.getElementById('tables-container').style.display = 'block';
            }
          });

          // ── Run Typology button
          document.getElementById('run-typology-btn').addEventListener('click', () => {
            runClusterTypologyAnalysis(selectedIds);
          });

          // ── Language toggle
          document.getElementById('lang-toggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'de' : 'en';
            applyLang();
            updateTables(selectedIds);
          });

          // ── Group toggle accordions
          document.querySelectorAll('.group-toggle').forEach(button => {
            const content = button.nextElementSibling;
            const label   = button.textContent.trim();
            content.style.display = 'block';
            button.textContent = label.replace('▼', '▲');
            button.addEventListener('click', () => {
              const isVisible = content.style.display !== 'none';
              content.style.display = isVisible ? 'none' : 'block';
              button.textContent = label.replace(isVisible ? '▲' : '▼', isVisible ? '▼' : '▲');
            });
          });

        } catch (err) {
          document.getElementById('profile-loading').style.display = 'none';
          const errDiv = document.getElementById('profile-error');
          errDiv.style.display = 'block';
          errDiv.innerHTML = `<strong>Error loading data:</strong> ${escapeHtml(err.message)}<br><br><a href="./index.html">← Return to map</a>`;
        }
      });
    </script>

  <!-- Chart zoom overlay -->
  <div id="chart-zoom-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(10,20,40,0.82);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
    <div id="chart-zoom-box" style="background:#fff;border-radius:14px;padding:24px 28px 20px;width:92vw;max-width:1300px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 24px 64px rgba(0,0,0,0.35);">
      <button id="chart-zoom-close" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#64748b;line-height:1;" title="Close">✕</button>
      <div id="chart-zoom-title" style="font-size:15px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;padding-right:32px;"></div>
      <div id="chart-zoom-svg"></div>
      <div id="chart-zoom-legend" style="display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:14px;font-size:11px;color:#374151;"></div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script>
    (function () {
      const ZONE_URLS = {
        bezirk: [
          'https://raw.githubusercontent.com/ginseng666/GeoJSON-TopoJSON-Austria/master/2021/simplified-99.9/bezirke_999_geo.json',
          'https://raw.githubusercontent.com/ginseng666/GeoJSON-TopoJSON-Austria/master/2021/simplified-99.5/bezirke_995_geo.json',
        ],
        gemeinde: [
          'https://raw.githubusercontent.com/ginseng666/GeoJSON-TopoJSON-Austria/master/2021/simplified-95/gemeinden_95_topo.json',
        ],
      };

      function toGeoJSON(raw) {
        if (raw.type === 'Topology') {
          const key = Object.keys(raw.objects)[0];
          return topojson.feature(raw, raw.objects[key]);
        }
        return raw;
      }

      function getGkz(props, idx, zoneType) {
        const candidates = [props.iso, props.GKZ, props.gkz, props.GCD, props.gcd, props.BEZ_ID, props.GEM_ID, props.id];
        for (const c of candidates) {
          if (c == null || c === '') continue;
          const n = parseInt(String(c), 10);
          if (isNaN(n)) continue;
          if (zoneType === 'bezirk'   && n >= 100   && n < 1000)  return String(n);
          if (zoneType === 'gemeinde' && n >= 10000  && n < 100000) return String(n).padStart(5, '0');
        }
        return null;
      }

      async function fetchFirst(urls) {
        for (const url of urls) {
          try { const r = await fetch(url); if (r.ok) return r.json(); } catch (_) {}
        }
        return null;
      }

      window.initZoneMiniMap = async function (selectedIds, zoneType) {
        const container = document.getElementById('zone-minimap');
        if (!container || typeof maplibregl === 'undefined' || typeof topojson === 'undefined') return;

        const raw = await fetchFirst(ZONE_URLS[zoneType] || ZONE_URLS.gemeinde);
        if (!raw) return;

        const geoJSON = toGeoJSON(raw);
        const selectedSet = new Set(selectedIds);

        let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
        geoJSON.features.forEach((f, idx) => {
          const gkz = getGkz(f.properties, idx, zoneType);
          f.properties._sel = gkz && selectedSet.has(gkz) ? 1 : 0;
          if (!f.properties._sel) return;
          const scan = (a) => {
            if (typeof a[0] === 'number') {
              if (a[0] < minLng) minLng = a[0]; if (a[0] > maxLng) maxLng = a[0];
              if (a[1] < minLat) minLat = a[1]; if (a[1] > maxLat) maxLat = a[1];
            } else a.forEach(scan);
          };
          if (f.geometry?.coordinates) scan(f.geometry.coordinates);
        });

        const bounds = minLng < Infinity
          ? [[minLng, minLat], [maxLng, maxLat]]
          : [[9.5, 46.4], [17.2, 49.0]];

        const map = new maplibregl.Map({
          container: 'zone-minimap',
          style: 'https://tiles.openfreemap.org/styles/bright',
          bounds,
          fitBoundsOptions: { padding: 32 },
          dragPan: false, scrollZoom: false, boxZoom: false,
          dragRotate: false, keyboard: false, doubleClickZoom: false,
          touchZoomRotate: false,
          attributionControl: false,
        });

        map.on('load', () => {
          map.addSource('zones', { type: 'geojson', data: geoJSON, generateId: true });
          map.addLayer({ id: 'zones-bg', type: 'fill', source: 'zones',
            filter: ['==', ['get', '_sel'], 0],
            paint: { 'fill-color': '#d1d5db', 'fill-opacity': 0.5 } });
