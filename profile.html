<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AreaStat DK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://kit.fontawesome.com/ee3848f0f5.js" crossorigin="anonymous"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js" integrity="sha512-Hn1w6YiiFw6p6S2lXv6yKeqTk0PLVzeCwWY9n32beuPjQ5HLcvz5l2QsP+KilEr1ws37rCTw3bZpvfvVIeTh0Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script src="js/shared.js"></script>
    <script src="js/dst-catalogue.js"></script>
    <script src="js/dst-explorer.js"></script>

    <style>
      body { display: block; height: auto; min-height: 100vh; background: #f8fafc; }

      #app-header {
        background: #ffffff;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
        height: 52px;
        gap: 1rem;
        position: sticky;
        top: 0;
        z-index: 200;
      }
      #app-header .back-link {
        color: #4f46e5;
        text-decoration: none;
        font-size: .875rem;
        font-weight: 500;
        white-space: nowrap;
      }
      #app-header .back-link:hover { text-decoration: underline; }
      #app-header .header-divider { width: 1px; height: 20px; background: #e5e7eb; flex-shrink: 0; }
      #app-header .header-title { flex: 1; font-size: .95rem; font-weight: 600; color: #111827; margin: 0; }
      #app-header .header-badge { font-size: .75rem; color: #6b7280; font-weight: 500; }
      #app-header #lang-toggle {
        background: #f3f4f6; border: 1px solid #e5e7eb; color: #374151;
        border-radius: 4px; padding: .25rem .6rem; font-size: .8rem; font-weight: 600;
        cursor: pointer; box-shadow: none;
      }
      #app-header #lang-toggle:hover { background: #e5e7eb; }

      #modal-header { border-radius: 0; position: static; flex-shrink: unset; }
      #modal-toolbar { position: sticky; top: 52px; z-index: 100; }
      #modal-body { flex: none; overflow-y: visible; height: auto; min-height: 0; display: block !important; }
      #modal-body.analysis-active { overflow: visible; height: auto; }
      #analysis-container { margin: 0 !important; min-height: 500px; }
      .analysis-panel-wrap { flex: none !important; overflow-y: visible !important; height: auto !important; }
      .analysis-panel { height: auto !important; overflow-y: visible !important; }

      /* ── DST Explorer ────────────────────────────── */
      #explorer-container {
        display: flex; height: calc(100vh - 104px);
        overflow: hidden; background: #f8fafc;
      }
      #explorer-sidebar {
        width: 260px; min-width: 220px; max-width: 300px;
        background: #fff; border-right: 1px solid #e5e7eb;
        overflow-y: auto; flex-shrink: 0;
        padding-bottom: 2rem;
      }
      .exp-sector { border-bottom: 1px solid #f0f0f0; }
      .exp-sector-header {
        width: 100%; background: none; border: none; cursor: pointer;
        display: flex; align-items: center; gap: 8px;
        padding: .55rem .85rem; font-size: .8rem; font-weight: 600;
        color: #374151; text-align: left;
      }
      .exp-sector-header:hover { background: #f9fafb; }
      .exp-sector-icon   { font-size: 1rem; flex-shrink: 0; }
      .exp-sector-name   { flex: 1; }
      .exp-sector-count  { font-size:.7rem; color:#9ca3af; background:#f3f4f6;
                           border-radius:10px; padding:1px 6px; }
      .exp-sector-chevron{ font-size:.65rem; color:#9ca3af; transition:transform .15s; }
      .exp-sector-tables { padding: 0 0 .3rem 0; }
      .exp-table-item {
        width: 100%; background: none; border: none; cursor: pointer;
        display: flex; flex-direction: column; gap: 2px;
        padding: .42rem .85rem .42rem 2rem; text-align: left;
        border-left: 3px solid transparent;
      }
      .exp-table-item:hover { background: #f3f4f6; }
      .exp-table-item.active { border-left-color: #4f46e5; background: #eef2ff; }
      .exp-table-id    { font-size: .68rem; font-weight: 700; color: #6b7280;
                         font-family: 'JetBrains Mono', monospace; }
      .exp-table-title { font-size: .77rem; color: #111827; }
      .exp-table-item.active .exp-table-title { color: #4f46e5; font-weight: 600; }

      #explorer-panel {
        flex: 1; overflow-y: auto; padding: 1.5rem 2rem 3rem;
        min-width: 0;
      }
      .exp-panel-header { margin-bottom: 1rem; }
      .exp-panel-title  { font-size: 1.15rem; font-weight: 700; color: #111827; margin: 0 0 .25rem; }
      .exp-panel-desc   { font-size: .83rem; color: #6b7280; margin: 0 0 .4rem; }
      .exp-panel-meta   { font-size: .72rem; color: #9ca3af; }
      .exp-controls     { display: flex; flex-wrap: wrap; gap: .6rem; align-items: flex-end;
                          margin-bottom: 1.25rem; padding-bottom: 1rem;
                          border-bottom: 1px solid #f0f0f0; }
      .exp-var-row      { display: flex; flex-wrap: wrap; gap: .6rem; flex: 1; min-width: 0; }
      .exp-var-control  { display: flex; flex-direction: column; gap: 3px; }
      .exp-var-label    { font-size: .68rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing:.04em; }
      .exp-var-select   { font-size: .78rem; padding: .28rem .6rem; border: 1px solid #d1d5db;
                          border-radius: 5px; background: #fff; color: #111827;
                          max-width: 180px; }
      .exp-chart-toggle { display: flex; gap: .4rem; align-items: flex-end; }
      .exp-chart-btn    { padding: .3rem .75rem; font-size: .77rem; border: 1px solid #d1d5db;
                          border-radius: 5px; background: #fff; cursor: pointer; color: #374151; }
      .exp-chart-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
      .exp-loading      { display: flex; align-items: center; gap: .75rem; padding: 2rem;
                          color: #6b7280; font-size: .9rem; }
      .exp-spinner      { width: 22px; height: 22px; border: 2px solid #e2e8f0;
                          border-top-color: #4f46e5; border-radius: 50%;
                          animation: profile-spin 0.7s linear infinite; flex-shrink: 0; }
      .exp-error        { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px;
                          padding: .9rem 1rem; color: #dc2626; font-size: .82rem; margin-bottom: 1rem; }
      .exp-nodata       { color: #9ca3af; font-size: .85rem; padding: 1rem 0; }
      .exp-bar-wrap, .exp-ts-wrap { background: #fff; border: 1px solid #e5e7eb;
                                     border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
      .exp-chart-title  { font-size: .9rem; font-weight: 600; color: #1e3a5f; margin: 0 0 .5rem; }
      .exp-dk-legend    { display: flex; align-items: center; gap: 6px; font-size: .75rem;
                          color: #555; margin-bottom: .75rem; }
      .exp-dk-swatch    { display: inline-block; width: 3px; height: 14px;
                          background: #dc2626; border-radius: 2px; }
      .exp-chart-container { margin-bottom: 1.5rem; }
      .exp-data-table-wrap { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
                              padding: 1rem; }
      .exp-table-heading { font-size: .85rem; font-weight: 600; color: #374151;
                           margin: 0 0 .75rem; display: flex; align-items: center; gap: .75rem; }
      .exp-table-count   { font-size: .72rem; color: #9ca3af; font-weight: 400; }
      .exp-dl-csv        { margin-left: auto; padding: .2rem .6rem; font-size: .72rem;
                           border: 1px solid #d1d5db; border-radius: 4px; background: #f9fafb;
                           cursor: pointer; color: #374151; }
      .exp-dl-csv:hover  { background: #f3f4f6; }
      .exp-table-scroll  { overflow-x: auto; }
      .exp-data-table    { width: 100%; border-collapse: collapse; font-size: .78rem; }
      .exp-data-table th { background: #1e3a5f; color: #fff; padding: .5rem .75rem;
                           text-align: left; font-weight: 600; white-space: nowrap; }
      .exp-data-table td { padding: .4rem .75rem; border-bottom: 1px solid #f0f0f0; }
      .exp-data-table tr:hover td { background: #f9fafb; }
      .exp-val-cell      { font-weight: 600; color: #1e3a5f; text-align: right; }
      .exp-empty-state   { display: flex; flex-direction: column; align-items: center;
                           justify-content: center; height: 60%; color: #9ca3af;
                           gap: 1rem; text-align: center; padding: 3rem; }
      .exp-empty-state .exp-empty-icon { font-size: 3rem; }
      .exp-empty-state h3 { font-size: 1rem; color: #374151; margin: 0; }
      .exp-empty-state p  { font-size: .82rem; margin: 0; }

      #profile-loading {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 280px; gap: 1rem; color: #64748b; font-size: .95rem;
      }
      .profile-spinner {
        width: 38px; height: 38px; border: 3px solid #e2e8f0;
        border-top-color: #4f46e5; border-radius: 50%; animation: profile-spin 0.8s linear infinite;
      }
      @keyframes profile-spin { to { transform: rotate(360deg); } }
      #profile-error { display: none; padding: 2.5rem; text-align: center; color: #dc2626; font-size: 1rem; }
      #profile-error a { color: #4f46e5; font-weight: 500; }
    </style>
  </head>

  <body>

    <!-- ── Header ── -->
    <header id="app-header">
      <a href="./index.html" class="back-link">← Map</a>
      <div class="header-divider"></div>
      <span class="header-title">AreaStat DK</span>
      <span class="header-badge" data-i18n="app.badge">PhD Research Proposal</span>
    </header>

    <!-- ── Loading / error ── -->
    <div id="profile-loading">
      <div class="profile-spinner"></div>
      <span>Loading profile data…</span>
    </div>
    <div id="profile-error"></div>

    <!-- ── Modal-header: zone breakdown summary ── -->
    <div id="modal-header" style="display:none">
      <div id="breakdown-container"></div>
    </div>

    <!-- ── Modal toolbar: domain tabs + actions ── -->
    <div id="modal-toolbar" style="display:none">
      <div id="drawer-tabs">
        <button class="view-tab selected" data-view="demographics">Demographics</button>
        <button class="view-tab" data-view="economics">Economics</button>
        <button class="view-tab" data-view="financial">Financial</button>
        <button class="view-tab" data-view="green-transition">🌱 Green Transition</button>
        <button class="view-tab" data-view="analysis">Analysis</button>
        <button class="view-tab" data-view="ml-export">ML Export</button>
        <button class="view-tab" data-view="explore">DST Explorer</button>
      </div>
      <div id="drawer-actions">
        <button onclick="downloadExcel()">⬇ Excel</button>
        <button onclick="downloadSummaryImage()">⬇ Image</button>
      </div>
      <!-- Hidden form kept for internal aggregation logic -->
      <form id="category-form" style="display:none">
        <input type="checkbox" value="AgeStructure" checked>
        <input type="checkbox" value="LabourMarket" checked>
        <input type="checkbox" value="Economy" checked>
        <input type="checkbox" value="Education" checked>
        <input type="checkbox" value="Migration" checked>
        <input type="checkbox" value="Housing" checked>
        <input type="checkbox" value="Safety" checked>
      </form>
    </div>

    <!-- ── Main body ── -->
    <div id="modal-body" style="display:none">
      <!-- Collapsible selection summary (always visible, never crowds content) -->
      <div id="zone-summary-bar"></div>
      <!-- Domain tabs -->
      <div id="demographics-container"></div>
      <div id="economics-container" style="display:none;"></div>
      <div id="financial-container" style="display:none;"></div>
      <div id="green-transition-container" style="display:none;"></div>
      <div id="ml-export-container" style="display:none;"></div>
      <!-- DST Explorer -->
      <div id="explorer-container" style="display:none;">
        <div id="explorer-sidebar"></div>
        <div id="explorer-panel">
          <div class="exp-empty-state">
            <div class="exp-empty-icon">🗄️</div>
            <h3>Select a table from the sidebar</h3>
            <p>Browse 100+ Statistics Denmark tables organised by sector.<br>
               Data will load automatically for your selected kommuner.</p>
          </div>
        </div>
      </div>
      <!-- Hidden: used by download functions only -->
      <div id="stats-strip" style="display:none;"></div>
      <div id="charts-container" style="display:none;"></div>
      <div id="tables-container" style="display:none;"></div>
      <div id="analysis-container" style="display:none;"></div>
      <div id="cluster-summary" style="display:none;"></div>
      <div id="cluster-profiles" style="display:none;"></div>
      <p class="drawer-source">
        Source: <a href="https://www.dst.dk" target="_blank">Statistics Denmark (DST)</a>
        · <a href="https://api.dataforsyningen.dk" target="_blank">DAWA</a> · CC BY 4.0
      </p>
    </div>

    <script>
      // ══ CONFIGURATION ══════════════════════════════════════════════════════════
      // ── Read selection from localStorage (written by index.html on Open in AreaStat click)
      const selectedIds      = JSON.parse(localStorage.getItem('profile_ids')        || '[]');
      let currentZoneType    = localStorage.getItem('profile_zone_type')              || 'kommune';
      let activeSegmentation = localStorage.getItem('profile_segmentation')           || 'settlement';
      let selectedCategories = JSON.parse(localStorage.getItem('profile_categories') || JSON.stringify(DEFAULT_PROFILE_CATEGORIES));
      window.gcdNameMap      = JSON.parse(localStorage.getItem('profile_gcd_names')  || '{}');

      let kommuneData          = {};
      let regionData           = {};
      let denmarkTotals        = {};
      let latestAggregatedData = {};
      let currentView          = 'demographics';
      window.chartInstances    = [];

      const DEMO_DOMAINS = ['AgeStructure', 'PopulationDynamics', 'Ancestry', 'Migration', 'Housing', 'Safety', 'Welfare'];
      const ECON_DOMAINS = ['LabourMarket', 'Economy', 'Education'];

      const excludedKeys = EXCLUDED_PROFILE_KEYS;

      // ══ HELPERS ════════════════════════════════════════════════════════════════

      function safeStr(val, fallback = 'Low') {
        if (val === null || val === undefined) return fallback;
        if (Array.isArray(val)) return String(val[0] || fallback);
        if (typeof val === 'object') return String(Object.values(val)[0] || fallback);
        return String(val);
      }

      function zoneName(gcd) {
        return (window.gcdNameMap && window.gcdNameMap[gcd]) || gcd;
      }

      function riskColor(cat) {
        return cat === 'High' ? '#dc2626' : cat === 'Medium' ? '#f97316' : '#16a34a';
      }

      function makeSection(title, subtitle) {
        const sec = document.createElement('div');
        sec.className = 'analysis-section';
        sec.innerHTML = `
          <div class="analysis-section-header">
            <h3>${escapeHtml(title)}</h3>
            ${subtitle ? `<p>${escapeHtml(subtitle)}</p>` : ''}
          </div>`;
        return sec;
      }

      const ZONE_PALETTE = ['#1d6fa5','#e07520','#2ca25f','#6b2d8b','#dc2626','#0e7490','#b45309','#0f766e','#7c3aed','#be185d'];

      // ══ RENDERING FUNCTIONS ════════════════════════════════════════════════════

      function renderStatsStrip(selectedIdsArray, dataSource) {
        const strip = document.getElementById('stats-strip');
        if (!strip) return;
        strip.innerHTML = '';

        if (!selectedIdsArray.length) { strip.style.display = 'none'; return; }

        const segCfg    = SEGMENTATION_CONFIG[activeSegmentation];
        const segCounts = {};
        segCfg.classes.forEach(c => { segCounts[c.key] = 0; });
        let totalPop = 0;
        const indicatorStats = {};

        selectedIdsArray.forEach(id => {
          const z = dataSource[id];
          if (!z) return;
          const segVal = getScalar(z[segCfg.dataKey]);
          if (segVal && segCounts[segVal] !== undefined) segCounts[segVal]++;
          totalPop += getScalar(z['Population']) || 0;

          for (const [key, value] of Object.entries(z)) {
            if (excludedKeys.includes(key) || typeof value !== 'object' || value === null) continue;
            if (!indicatorStats[key]) indicatorStats[key] = {};
            for (const [ind, val] of Object.entries(value)) {
              if (typeof val !== 'number') continue;
              if (!indicatorStats[key][ind]) indicatorStats[key][ind] = { min: Infinity, max: -Infinity, sum: 0, count: 0 };
              const s = indicatorStats[key][ind];
              if (val < s.min) s.min = val;
              if (val > s.max) s.max = val;
              s.sum += val; s.count++;
            }
          }
        });

        strip.style.display = 'block';

        const kpiRow = document.createElement('div');
        kpiRow.className = 'stats-kpi-row';
        const isEn = true;

        [
          { label: isEn ? 'Zones'      : 'Gebiete',     value: selectedIdsArray.length,          accent: '#1e3a5f' },
          { label: 'Population', value: totalPop.toLocaleString(), accent: '#1e3a5f' },
        ].forEach(kpi => {
          const card = document.createElement('div');
          card.className = 'stats-kpi-card';
          card.style.borderLeftColor = kpi.accent;
          card.innerHTML = `<div class="stats-kpi-value">${escapeHtml(kpi.value)}</div><div class="stats-kpi-label">${escapeHtml(kpi.label)}</div>`;
          kpiRow.appendChild(card);
        });

        segCfg.classes.filter(c => c.key !== 'Unbekannt').forEach(c => {
          const card = document.createElement('div');
          card.className = 'stats-kpi-card';
          card.style.borderLeftColor = c.color;
          const label = c.label_en;
          card.innerHTML = `<div class="stats-kpi-value">${segCounts[c.key] || 0}</div><div class="stats-kpi-label">${escapeHtml(label)}</div>`;
          kpiRow.appendChild(card);
        });

        strip.appendChild(kpiRow);

        const activeDomains = selectedCategories.filter(d => indicatorStats[d]);
        if (!activeDomains.length) return;

        const details = document.createElement('details');
        details.className = 'stats-minmax-section';
        const sumEl = document.createElement('summary');
        sumEl.className = 'stats-summary-toggle';
        sumEl.textContent = isEn ? 'Statistical Summary ▼' : 'Statistische Zusammenfassung ▼';
        details.appendChild(sumEl);

        const grid = document.createElement('div');
        grid.className = 'stats-minmax-grid';

        activeDomains.forEach(domain => {
          const ds = indicatorStats[domain];
          if (!ds || !Object.keys(ds).length) return;

          const card = document.createElement('div');
          card.className = 'stats-domain-card';
          const hdr = document.createElement('div');
          hdr.className = 'stats-domain-title';
          hdr.textContent = tDomain(domain);
          card.appendChild(hdr);

          const tbl = document.createElement('table');
          tbl.className = 'stats-table';
          tbl.innerHTML = `<thead><tr>
            <th>${isEn ? 'Indicator' : 'Indikator'}</th>
            <th>Min</th><th>${isEn ? 'Mean' : 'Ø'}</th><th>Max</th>
          </tr></thead>`;
          const tbody = document.createElement('tbody');
          for (const [ind, s] of Object.entries(ds)) {
            const mean = s.count > 0 ? s.sum / s.count : 0;
            const isPct = ind.includes('(%)');
            const fmt = v => (v === Infinity || v === -Infinity) ? '–' : (isPct ? v.toFixed(1) + '%' : v.toFixed(2));
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${escapeHtml(tLabel(ind))}</td><td>${escapeHtml(fmt(s.min))}</td><td><strong>${escapeHtml(fmt(mean))}</strong></td><td>${escapeHtml(fmt(s.max))}</td>`;
            tbody.appendChild(tr);
          }
          tbl.appendChild(tbody);
          card.appendChild(tbl);
          grid.appendChild(card);
        });

        details.appendChild(grid);
        strip.appendChild(details);
      }

      function renderZoneBreakdownTable(selectedIdsArray, dataSource, totalPopulation) {
        const container = document.getElementById('breakdown-container');

        if (!selectedIdsArray.length) {
          container.innerHTML = '';
          container.style.display = 'none';
          window.areaProfileTitle  = undefined;
          window.lastSelectionHash = undefined;
          return;
        }

        container.innerHTML = '';
        container.style.display = 'block';

        const regionStats  = {};
        const regionTotals = {};

        for (const [id, z] of Object.entries(dataSource)) {
          const bl = getScalar(z.Region);
          if (bl) regionTotals[bl] = (regionTotals[bl] || 0) + 1;
        }

        const currentSelectionHash = selectedIdsArray.slice().sort().join(',');
        const isSameSelection = currentSelectionHash === window.lastSelectionHash;
        window.lastSelectionHash = currentSelectionHash;
        if (!isSameSelection) window.areaProfileTitle = undefined;

        selectedIdsArray.forEach(id => {
          const z = dataSource[id];
          if (!z) return;
          const bl     = getScalar(z.Region) || 'Unbekannt';
          const segCfgS = SEGMENTATION_CONFIG[activeSegmentation];
          const status  = getScalar(z[segCfgS.dataKey]);

          if (!regionStats[bl]) {
            regionStats[bl] = { total: 0 };
            segCfgS.classes.forEach(c => { regionStats[bl][c.key] = 0; });
          }
          regionStats[bl].total++;
          if (status && regionStats[bl][status] !== undefined) regionStats[bl][status]++;
        });

        const savedTitle = window.areaProfileTitle || 'Click to edit title';
        const layout = document.createElement('div');
        layout.className = 'summary-row';
        layout.style.cssText = 'display:flex;align-items:stretch;gap:20px;';

        const left = document.createElement('div');
        left.className = 'summary-left';
        left.style.cssText = 'flex:1;min-width:0;';

        const editableTitle = document.createElement('h2');
        editableTitle.textContent     = savedTitle;
        editableTitle.contentEditable = true;
        editableTitle.spellcheck      = false;
        editableTitle.title           = 'Click to edit title';
        editableTitle.style.textAlign    = 'left';
        editableTitle.style.marginBottom = '1rem';
        editableTitle.style.outline      = 'none';
        editableTitle.addEventListener('blur', () => {
          window.areaProfileTitle = editableTitle.textContent.trim();
        });
        left.appendChild(editableTitle);

        const heading = document.createElement('h4');
        heading.textContent = 'Summary of Areas Selected:';
        heading.style.marginTop    = '0.5rem';
        heading.style.marginBottom = '1rem';
        left.appendChild(heading);

        const summaryList = document.createElement('ul');
        summaryList.style.listStyleType = 'none';

      function updateCategorySelector(availableKeys) {
        document.querySelectorAll('#category-form input[type="checkbox"]').forEach(checkbox => {
          const label = checkbox.closest('label');
          if (availableKeys.includes(checkbox.value)) {
            label.style.display = 'block';
          } else {
            label.style.display = 'none';
            checkbox.checked = false;
          }
        });
      }

      function updateTables(selectedIdsArray) {
        const tablesContainer = document.getElementById('tables-container');
        const chartsContainer = document.getElementById('charts-container');

        const selectedView = 'charts'; // always populate charts-container for Excel download

        tablesContainer.innerHTML = '';
        chartsContainer.innerHTML = '';
        tablesContainer.style.display = 'none';
        chartsContainer.style.display = 'none';

        const dataSource = currentZoneType === 'region' ? regionData : kommuneData;

        const domainAgg = {};
        let totalPopulation = 0;

        selectedIdsArray.forEach(id => {
          const zoneData = dataSource[id];
          if (!zoneData) return;
          totalPopulation += getScalar(zoneData['Population']) || 0;

          for (const [key, value] of Object.entries(zoneData)) {
            if (excludedKeys.includes(key)) continue;
            if (typeof value !== 'object' || value === null) continue;
            if (!domainAgg[key]) domainAgg[key] = {};
            for (const [indicator, val] of Object.entries(value)) {
              if (typeof val !== 'number') continue;
              if (!domainAgg[key][indicator]) domainAgg[key][indicator] = { sum: 0, count: 0 };
              domainAgg[key][indicator].sum   += val;
              domainAgg[key][indicator].count += 1;
            }
          }
        });

        const aggregatedData = {};
        for (const [domain, indicators] of Object.entries(domainAgg)) {
          aggregatedData[domain] = {};
          for (const [ind, { sum, count }] of Object.entries(indicators)) {
            if (isRatePer1000Indicator(domain, ind)) {
              aggregatedData[domain][ind] = totalPopulation > 0 ? parseFloat(((sum / totalPopulation) * 1000).toFixed(2)) : 0;
            } else {
              aggregatedData[domain][ind] = count > 0 ? parseFloat((sum / count).toFixed(2)) : 0;
            }
          }
        }

        latestAggregatedData = aggregatedData;
        window.latestAggregatedData = aggregatedData;
        window.chosenCategories     = selectedCategories;

        renderZoneBreakdownTable(selectedIdsArray, dataSource, totalPopulation);
        renderStatsStrip(selectedIdsArray, dataSource);

        const availableKeys   = Object.keys(aggregatedData);
        const validCategories = selectedCategories.filter(c => availableKeys.includes(c));
        updateCategorySelector(availableKeys);

        if (selectedView === 'charts') {
          chartsContainer.style.display = 'grid';
          renderAggregatedCharts(aggregatedData, validCategories);
        } else if (selectedView === 'tables') {
          tablesContainer.style.display = 'block';
          renderAggregatedTables(aggregatedData, validCategories);
        }
      }

      function renderAggregatedTables(aggregatedData, selCategories) {
        if (!aggregatedData || Object.keys(aggregatedData).length === 0) return;
        const valid = selCategories.filter(c => Object.keys(aggregatedData).includes(c));
        if (valid.length === 0) return;

        const container = document.getElementById('tables-container');
        container.innerHTML = '';

        const grid = document.createElement('div');
        grid.className = 'table-grid';
        grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:2rem;';

        valid.forEach(domain => {
          const values = aggregatedData[domain];
          if (!values) return;

          const wrapper = document.createElement('div');
          wrapper.className = 'table-wrapper';
          wrapper.style.cssText = 'flex:0 0 calc(50% - 1rem);background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.1);padding:16px;border-radius:8px;box-sizing:border-box;';

          const title = document.createElement('h3');
          title.textContent = tDomain(domain);
          wrapper.appendChild(title);

          const table = document.createElement('table');
          table.className = 'data-table';

          const thead = document.createElement('thead');
          const headerRow = document.createElement('tr');
          [t('col.indicator'), t('col.selected'), t('col.denmark')].forEach(text => {
            const th = document.createElement('th');
            th.textContent = text;
            headerRow.appendChild(th);
          });
          thead.appendChild(headerRow);
          table.appendChild(thead);

          const tbody = document.createElement('tbody');
          const atDomain = denmarkTotals[domain] || {};

          for (const [indicator, meanVal] of Object.entries(values)) {
            const row    = document.createElement('tr');
            const fmtV = v => formatIndicatorValue(domain, indicator, v);

            const tdLabel = document.createElement('td');
            tdLabel.textContent = displayIndicatorLabel(domain, indicator);
            row.appendChild(tdLabel);

            const tdMean = document.createElement('td');
            tdMean.textContent = typeof meanVal === 'number' ? fmtV(meanVal) : '–';
            row.appendChild(tdMean);

            const tdAt = document.createElement('td');
            const atVal = comparableDenmarkValue(domain, indicator, atDomain[indicator]);
            tdAt.textContent = typeof atVal === 'number' ? fmtV(atVal) : '–';
            row.appendChild(tdAt);

            tbody.appendChild(row);
          }

          table.appendChild(tbody);
          wrapper.appendChild(table);
          grid.appendChild(wrapper);
        });

        container.appendChild(grid);
        window.latestAggregatedData = aggregatedData;
      }

      function renderAggregatedCharts(data, selCategories) {
        if (!data || Object.keys(data).length === 0) return;
        const validCategories = selCategories.filter(c => Object.keys(data).includes(c));
        if (validCategories.length === 0) return;

        const container = document.getElementById('charts-container');
        container.innerHTML = '';

        validCategories.forEach(domain => {
          const values = data[domain];
          if (!values) return;

          const atDomain  = denmarkTotals[domain] || {};
          const rawLabels = Object.keys(values);

          const card = document.createElement('div');
          card.className = 'css-chart-domain-card';

          const head = document.createElement('div');
          head.className = 'css-chart-domain-head';
          head.innerHTML = `<span class="css-chart-domain-title">${escapeHtml(tDomain(domain))}</span>
            <span class="css-chart-at-legend"><span class="css-chart-at-swatch"></span>${escapeHtml(t('col.denmark'))}</span>`;
          card.appendChild(head);

          rawLabels.forEach(rawLabel => {
            const value = values[rawLabel];
            if (typeof value !== 'number') return;
            const atVal  = comparableDenmarkValue(domain, rawLabel, atDomain[rawLabel]);
            const fmt    = v => formatIndicatorValue(domain, rawLabel, v);
            const label  = displayIndicatorLabel(domain, rawLabel);
            const minVal   = Math.min(value, atVal ?? value, 0);
            const maxVal   = Math.max(value, atVal ?? 0, 0) * 1.12 || 1;
            const range    = (maxVal - minVal) || 1;
            const zeroPct  = ((-minVal / range) * 100).toFixed(1);
            const valPct   = ((value  - minVal) / range * 100).toFixed(1);
            const barLeft  = Math.min(+zeroPct, +valPct).toFixed(1);
            const barWidth = Math.abs(+zeroPct - +valPct).toFixed(1);
            const atPct    = atVal != null ? (((atVal - minVal) / range) * 100).toFixed(1) : null;
            const overAT   = atVal != null && value > atVal;
            const showZero = minVal < 0;

            const row = document.createElement('div');
            row.className = 'css-indicator-row';
            row.innerHTML = `
              <div class="css-indicator-meta">
                <span class="css-indicator-label">${escapeHtml(label)}</span>
                <span class="css-indicator-value">${escapeHtml(fmt(value))}${atVal != null ? ` <span class="css-indicator-at">(AT: ${escapeHtml(fmt(atVal))})</span>` : ''}</span>
              </div>
              <div class="css-bar-track">
                <div class="css-bar-fill${overAT ? ' over-at' : ''}" style="left:${barLeft}%;width:${barWidth}%"></div>
                ${showZero ? `<div class="css-bar-zero" style="left:${zeroPct}%"></div>` : ''}
                ${atPct != null ? `<div class="css-bar-at" style="left:${atPct}%"></div>` : ''}
              </div>`;
            card.appendChild(row);
          });

          container.appendChild(card);
        });
      }

      function aggregateUrbanRuralData(selectedIdsArray, selCategories) {
        const dataSource = currentZoneType === 'region' ? regionData : kommuneData;
        const segCfg     = SEGMENTATION_CONFIG[activeSegmentation];
        const classKeys  = segCfg.classes.map(c => c.key);
        const rawGroups  = {};
        const groupPopulations = {};
        classKeys.forEach(k => { rawGroups[k] = {}; });
        classKeys.forEach(k => { groupPopulations[k] = 0; });

        selectedIdsArray.forEach(id => {
          const data   = dataSource[id];
          const segVal = getScalar(data?.[segCfg.dataKey]);
          if (!data || !classKeys.includes(segVal)) return;
          groupPopulations[segVal] += Number(getScalar(data['Population'])) || 0;

          for (const [key, value] of Object.entries(data)) {
            if (excludedKeys.includes(key) || typeof value !== 'object' || value === null) continue;
            if (selCategories.length > 0 && !selCategories.includes(key)) continue;
            if (!rawGroups[segVal][key]) rawGroups[segVal][key] = {};
            for (const [ind, val] of Object.entries(value)) {
              if (typeof val !== 'number') continue;
              if (!rawGroups[segVal][key][ind]) rawGroups[segVal][key][ind] = { sum: 0, count: 0 };
              rawGroups[segVal][key][ind].sum   += val;
              rawGroups[segVal][key][ind].count += 1;
            }
          }
        });

        const groups = {};
        classKeys.forEach(k => { groups[k] = {}; });
        for (const g of classKeys) {
          for (const [domain, indicators] of Object.entries(rawGroups[g])) {
            groups[g][domain] = {};
            for (const [ind, { sum, count }] of Object.entries(indicators)) {
              if (isRatePer1000Indicator(domain, ind)) {
                groups[g][domain][ind] = groupPopulations[g] > 0 ? parseFloat(((sum / groupPopulations[g]) * 1000).toFixed(2)) : 0;
              } else {
                groups[g][domain][ind] = count > 0 ? parseFloat((sum / count).toFixed(2)) : 0;
              }
            }
          }
        }
        return groups;
      }

      window.renderUrbanRuralComparison = function (selectedIdsArray) {
        const groups = aggregateUrbanRuralData(selectedIdsArray, selectedCategories);
        window.urbanRuralComparisonData = groups;
        const container = document.getElementById('urban-rural-comparison');
        if (!container) return;
      };

      function waitForImagesToLoad(container) {
        const images   = container.querySelectorAll('img');
        const promises = Array.from(images).map(img => new Promise(resolve => {
          if (img.complete) resolve();
          else img.onload = img.onerror = resolve;
        }));
        return Promise.all(promises);
      }

      async function downloadSummaryImage() {
        const selectedTab = document.querySelector('.view-tab.selected');
        const view = selectedTab ? selectedTab.getAttribute('data-view') : 'demographics';

        const domainContainerMap = {
          demographics: 'demographics-container',
          economics:    'economics-container',
          financial:    'financial-container',
          'ml-export':  'ml-export-container',
        };
        const containerId = domainContainerMap[view];
        if (!containerId) return;

        const src = document.getElementById(containerId);
        if (!src) return;

        // Button feedback
        const btn = document.querySelector('#drawer-actions button:last-child');
        const origLabel = btn?.textContent;
        if (btn) { btn.disabled = true; btn.textContent = '⏳ Capturing…'; }

        // Temporarily replace MapLibre WebGL canvas with a static image so html2canvas can read it
        const mmDiv = document.getElementById('zone-minimap');
        let mmSavedHTML = null;
        if (mmDiv && window._zoneMiniMap) {
          try {
            mmSavedHTML = mmDiv.innerHTML;
            const mmImg = Object.assign(new Image(), {
              src: window._zoneMiniMap.getCanvas().toDataURL('image/png')
            });
            mmImg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit;';
            mmDiv.innerHTML = '';
            mmDiv.appendChild(mmImg);
          } catch (_) {}
        }

        try {
          // Capture the ACTUAL container — Chart.js canvases render correctly (cloneNode gives blank canvases)
          await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
          const contentCanvas = await html2canvas(src, {
            useCORS: true, scale: 2, backgroundColor: '#f8fafc', logging: false,
          });

          // Build title from view name + selection info
          const TITLE_MAP = { demographics: 'Demographics', economics: 'Economics',
                              financial: 'Municipal Finances', 'ml-export': 'ML Export' };
          const title = `AreaStat DK  —  ${TITLE_MAP[view] || view}`;
          const selectionInfo = (() => {
            const zoneEl = document.querySelector('#zone-summary-bar strong');
            const popEl  = document.querySelectorAll('#zone-summary-bar strong')[1];
            return zoneEl ? `${zoneEl.textContent}  ·  Pop. ${popEl?.textContent || ''}` : '';
          })();

          const HDR = 64, FTR = 36, S = 2; // header/footer heights at scale 2
          const W = contentCanvas.width, H = contentCanvas.height;
          const fc = document.createElement('canvas');
          fc.width = W; fc.height = H + HDR * S + FTR * S;
          const ctx = fc.getContext('2d');

          // Header
          ctx.fillStyle = '#1e3a5f';
          ctx.fillRect(0, 0, W, HDR * S);
          ctx.fillStyle = '#ffffff';
          ctx.font = `bold ${15 * S}px "Space Grotesk", sans-serif`;
          ctx.textAlign = 'left';
          ctx.fillText('◈ ' + title, 20 * S, 38 * S);
          if (selectionInfo) {
            ctx.font = `${11 * S}px Inter, sans-serif`;
            ctx.fillStyle = 'rgba(255,255,255,.65)';
            ctx.textAlign = 'right';
            ctx.fillText(selectionInfo, W - 20 * S, 38 * S);
          }

          // Content
          ctx.drawImage(contentCanvas, 0, HDR * S);

          // Footer
          ctx.fillStyle = '#f1f5f9';
          ctx.fillRect(0, HDR * S + H, W, FTR * S);
          ctx.fillStyle = '#9ca3af';
          ctx.font = `${10 * S}px Inter, sans-serif`;
          ctx.textAlign = 'right';
          ctx.fillText('Source: Statistics Denmark (DST) · api.statbank.dk · CC BY 4.0',
                       W - 16 * S, HDR * S + H + 24 * S);

          // Trigger download
          const date = new Date().toISOString().slice(0, 10);
          Object.assign(document.createElement('a'), {
            download: `areastat_dk_${view}_${date}.png`,
            href: fc.toDataURL('image/png'),
          }).click();

        } finally {
          // Restore MapLibre
          if (mmDiv && mmSavedHTML !== null) mmDiv.innerHTML = mmSavedHTML;
          if (btn) { btn.disabled = false; btn.textContent = origLabel; }
        }

        // ── Legacy path kept for analysis container (unused from main UI but kept for compatibility)
        if (false && view === 'analysis') {
          const src2 = document.getElementById('analysis-container');
          if (!src2) return;
          const wrap = document.createElement('div');
          wrap.style.cssText = 'background:#fff;padding:20px;font-family:sans-serif;max-width:1200px;margin:0 auto;';
          const clone = src2.cloneNode(true);
          clone.style.cssText = 'display:flex;flex-direction:column;visibility:visible;';
          wrap.appendChild(clone);
          document.body.appendChild(wrap);
          wrap.offsetHeight;
          waitForImagesToLoad(wrap).then(() =>
            new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(() =>
              html2canvas(wrap, { useCORS: true, scale: 2, backgroundColor: '#ffffff' }).then(resolve)
            )))
          ).then(canvas => {
            const fc = document.createElement('canvas');
            fc.width = canvas.width; fc.height = canvas.height + 40;
            const ctx = fc.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, fc.width, fc.height);
            ctx.drawImage(canvas, 0, 0);
            ctx.font = '12px sans-serif';
            ctx.fillStyle = '#666666';
            ctx.textAlign = 'right';
            ctx.fillText('Source: Statistics Denmark (DST) · api.statbank.dk', fc.width - 20, canvas.height + 25);
            const link = document.createElement('a');
            link.download = 'fiscal-analysis.png';
            link.href = fc.toDataURL('image/png');
            link.click();
            document.body.removeChild(wrap);
          });
          return;
        }

        const breakdownContainer = document.getElementById('breakdown-container');
        const contentSource = ({ charts: document.getElementById('charts-container'), tables: document.getElementById('tables-container') })[view];
        if (!contentSource) return;

        const cloneWrapper = document.createElement('div');
        cloneWrapper.style.cssText = 'background:#fff;padding:20px;font-family:sans-serif;max-width:1200px;margin:0 auto;';

        const breakdownClone = breakdownContainer.cloneNode(true);

        // Replace the WebGL mini-map with a static image so html2canvas can render it.
        // toDataURL works here because the MapLibre canvas is same-origin (no cross-origin taint).
        const miniMapInClone = breakdownClone.querySelector('#zone-minimap');
        if (miniMapInClone) {
          let mmDataUrl = null;
          if (window._zoneMiniMap) {
            try { mmDataUrl = window._zoneMiniMap.getCanvas().toDataURL('image/png'); } catch (_) {}
          }
          if (mmDataUrl) {
            const mmImg = new Image();
            mmImg.src = mmDataUrl;
            mmImg.style.cssText = 'width:100%;height:180px;border-radius:8px;object-fit:cover;display:block;';
            miniMapInClone.innerHTML = '';
            miniMapInClone.appendChild(mmImg);
          } else {
            miniMapInClone.remove();
          }
        }

        const contentClone = contentSource.cloneNode(true);

        // Charts are CSS bar charts (divs), not canvas — no conversion needed.
        // Restore the grid display that the live tab uses.
        if (view === 'charts') {
          contentClone.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.25rem;padding:1.5rem;visibility:visible;';
        } else {
          contentClone.style.cssText = 'display:block;visibility:visible;';
        }
        cloneWrapper.appendChild(breakdownClone);
        cloneWrapper.appendChild(document.createElement('hr'));
        cloneWrapper.appendChild(contentClone);
        document.body.appendChild(cloneWrapper);
        cloneWrapper.offsetHeight;

        waitForImagesToLoad(cloneWrapper).then(() =>
          new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(() =>
            html2canvas(cloneWrapper, { useCORS: true, scale: 2, backgroundColor: '#ffffff' }).then(resolve)
          )))
        ).then(canvas => {
          const finalCanvas = document.createElement('canvas');
          finalCanvas.width  = canvas.width;
          finalCanvas.height = canvas.height + 40;
          const ctx = finalCanvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
          ctx.drawImage(canvas, 0, 0);
          ctx.font      = '12px sans-serif';
          ctx.fillStyle = '#666666';
          ctx.textAlign = 'right';
          ctx.fillText('Source: Statistics Denmark (DST) · DAWA · CC BY 4.0', finalCanvas.width - 20, canvas.height + 25);
          const link = document.createElement('a');
          link.download = 'area-summary.png';
          link.href = finalCanvas.toDataURL('image/png');
          link.click();
          document.body.removeChild(cloneWrapper);
        });
      }

      function downloadExcel() {
        window.renderUrbanRuralComparison(selectedIds);

        const aggregated       = window.latestAggregatedData  || {};
        const comparison       = window.urbanRuralComparisonData || {};
        const chosenCategories = window.chosenCategories || [];
        const atTotals         = window.denmarkTotals    || {};
        const workbook         = XLSX.utils.book_new();
        const segCfgXlsx   = SEGMENTATION_CONFIG[activeSegmentation];
        const segGroupNames = segCfgXlsx.classes.map(c => c.key);

        (chosenCategories.length ? chosenCategories : Object.keys(aggregated)).forEach(domain => {
          const sheetData = [];
          sheetData.push([{ v: domain, t: 's' }]);
          sheetData.push([{ v: 'Indicator', t: 's' }, { v: 'Avg Selected', t: 's' }, { v: 'Denmark Avg', t: 's' }]);

          const values = aggregated[domain] || {};
          const atDom  = atTotals[domain] || {};

          for (const [ind, meanVal] of Object.entries(values)) {
            const atVal = comparableDenmarkValue(domain, ind, atDom[ind]);
            const isPct = ind.includes('(%)');
            sheetData.push([
              { v: displayIndicatorLabel(domain, ind), t: 's' },
              { v: typeof meanVal === 'number' ? (isPct ? meanVal / 100 : meanVal) : null, t: 'n', z: isPct ? '0.0%' : '0.0' },
              { v: typeof atVal   === 'number' ? (isPct ? atVal / 100 : atVal) : null, t: 'n', z: isPct ? '0.0%' : '0.0' }
            ]);
          }

          sheetData.push([]);

          segGroupNames.forEach(g => {
            const groupDomainData = comparison[g]?.[domain];
            if (!groupDomainData || Object.keys(groupDomainData).length === 0) return;
            sheetData.push([{ v: `${domain} – ${g}`, t: 's' }]);
            sheetData.push([{ v: 'Indicator', t: 's' }, { v: `Ø ${g}`, t: 's' }, { v: 'Denmark Avg', t: 's' }]);
            for (const [ind, meanVal] of Object.entries(groupDomainData)) {
              const atVal = comparableDenmarkValue(domain, ind, atDom[ind]);
              const isPct = ind.includes('(%)');
              sheetData.push([
                { v: displayIndicatorLabel(domain, ind), t: 's' },
                { v: typeof meanVal === 'number' ? (isPct ? meanVal / 100 : meanVal) : null, t: 'n', z: isPct ? '0.0%' : '0.0' },
                { v: typeof atVal   === 'number' ? (isPct ? atVal / 100 : atVal) : null, t: 'n', z: isPct ? '0.0%' : '0.0' }
              ]);
            }
            sheetData.push([]);
          });

          const worksheet = XLSX.utils.aoa_to_sheet(sheetData);
          XLSX.utils.book_append_sheet(workbook, worksheet, domain.substring(0, 31));
        });

        const ad = window.latestAnalysisData;

        if (ad?.ml?.zones) {
          const mlRows = [['Zone', 'GCD', 'Risk Category', 'Distress Probability (%)', 'Deficit Streak (yrs)', 'Bundesland', 'Settlement Class']];
          ad.ml.zones.forEach(z => {
            mlRows.push([
              zoneName(z.gcd), z.gcd,
              safeStr(z.risk_category, ''),
              ((z.distress_probability || 0) * 100).toFixed(1),
              z.deficit_streak ?? '',
              safeStr(z.region, ''),
              safeStr(z.settlement_class, '')
            ]);
          });
          if (ad.shap?.explanations?.length) {
            mlRows.push([], ['SHAP Key Drivers'], ['GCD', 'Feature', 'Direction', 'SHAP Value']);
            ad.shap.explanations.forEach(e => {
              (e.top_drivers || []).forEach(d => {
                mlRows.push([e.gcd, d.feature.replace(/_/g, ' '), d.direction === 'increases_risk' ? 'Increases risk' : 'Decreases risk', typeof d.shap_value === 'number' ? d.shap_value.toFixed(4) : '']);
              });
            });
          }
          XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(mlRows), 'ML Distress');
        }

        if (ad?.risk?.zones) {
          const riskRows = [['Zone', 'GCD', 'Risk Category', 'Risk Score', 'Trend', 'Deficit Ratio (%)', 'Deficit Streak (yrs)', 'Exp/Capita (€)', 'Rev/Capita (€)', 'National Percentile', 'Bundesland']];
          ad.risk.zones.forEach(z => {
            riskRows.push([
              zoneName(z.gcd), z.gcd,
              safeStr(z.risk_category, ''),
              z.risk_score ?? '',
              safeStr(z.trend_direction, ''),
              z.deficit_ratio != null ? (z.deficit_ratio * 100).toFixed(1) : '',
              z.deficit_streak ?? '',
              z.exp_per_capita ? Math.round(z.exp_per_capita) : '',
              z.rev_per_capita ? Math.round(z.rev_per_capita) : '',
              z.national_percentile ?? '',
              safeStr(z.region, '')
            ]);
          });
          XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(riskRows), 'Risk Summary');
        }

        if (ad?.profile?.zones) {
          const SPEND_CATS_XL = [
            { key: 'admin',             label: 'Administration (%)' },
            { key: 'education_culture', label: 'Education & Culture (%)' },
            { key: 'social_welfare',    label: 'Social Welfare (%)' },
            { key: 'health',            label: 'Health (%)' },
            { key: 'infrastructure',    label: 'Infrastructure (%)' },
            { key: 'finance_debt',      label: 'Finance & Debt (%)' },
            { key: 'economy',           label: 'Economy (%)' },
            { key: 'utilities',         label: 'Utilities (%)' },
          ];
          const spendRows = [['Zone', 'GCD', 'Year', ...SPEND_CATS_XL.map(c => c.label), 'Deficit Ratio (%)', 'Risk Score', 'Bundesland']];
          ad.profile.zones.forEach(z => {
            if (!z.spending_shares) return;
            spendRows.push([
              zoneName(z.gcd), z.gcd, ad.profile.year ?? '',
              ...SPEND_CATS_XL.map(c => ((z.spending_shares[c.key] || 0) * 100).toFixed(1)),
              z.fiscal?.deficit_ratio != null ? (z.fiscal.deficit_ratio * 100).toFixed(1) : '',
              z.risk_score ?? '',
              safeStr(z.region, '')
            ]);
          });
          XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(spendRows), 'Spending Profile');
        }

        if (ad?.tsData?.length) {
          const trendRows = [];
          ad.tsData.forEach(ts => {
            const years = ts.data.years_available || [];
            trendRows.push([ts.label], ['Zone', 'GCD', ...years.map(String)]);
            (ts.data.series || []).forEach(z => {
              trendRows.push([
                zoneName(z.gcd), z.gcd,
                ...years.map(yr => { const idx = (z.years || []).indexOf(yr); return idx >= 0 ? z.values[idx] : ''; })
              ]);
            });
            trendRows.push([]);
          });
          XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(trendRows), 'Fiscal Trends');
        }

        XLSX.writeFile(workbook, 'denmark_area_profile.xlsx');
      }

      // ══ CLUSTER TYPOLOGY FUNCTIONS ════════════════════════════════════════════

      const CLUSTER_COLORS = ['#1d6fa5', '#e07520', '#2ca25f', '#6b2d8b', '#dc2626', '#0e7490'];

      function renderTypologyResults(data) {
        document.getElementById('cluster-profiles').innerHTML = '';

        const container = document.getElementById('cluster-summary');
        container.innerHTML = '';

        const summary   = data.summary   || {};
        const profiles  = data.profiles  || [];
        const atProfile = data.at_profile || {};

        // Build per-cluster differentiator data from profiles array
        const profileByCluster = {};
        profiles.forEach(p => {
          const diffs = Object.entries(p)
            .filter(([key]) => key !== 'cluster')
            .map(([key, val]) => {
              const raw = atProfile[key];
              const at  = Array.isArray(raw) ? raw[0] : raw;
              if (at == null || typeof val !== 'number' || at === 0) return null;
              return { label: key, pct: ((val - at) / at) * 100 };
            })
            .filter(x => x && x.pct > 0)
            .sort((a, b) => b.pct - a.pct)
            .slice(0, 3);
          profileByCluster[p.cluster] = diffs;
        });

        const totalZones  = Object.values(summary).reduce((s, info) => s + (Number(info.count) || 0), 0);
        const numClusters = Object.keys(summary).length;

        // Section header
        const hdr = document.createElement('div');
        hdr.className = 'typology-section-header';
        hdr.innerHTML = `<span class="typology-badge">◈ Typology Analysis</span>
          <span class="typology-meta">${escapeHtml(String(totalZones))} zones &middot; ${escapeHtml(String(numClusters))} clusters</span>`;
        container.appendChild(hdr);

        let colorIdx = 0;
        for (const [clusterId, info] of Object.entries(summary)) {
          const color      = CLUSTER_COLORS[colorIdx++ % CLUSTER_COLORS.length];
          const zones      = [].concat(info.zones || []);
          const clusterNum = parseInt(clusterId.split('_').pop(), 10);

          const zoneChips  = zones.map(z => `<span class="typology-zone-chip">${escapeHtml(z)}</span>`).join('');
          const traitItems = [].concat(info.common_traits || []).map(t => `<li>${escapeHtml(t)}</li>`).join('') || '<li>—</li>';
          const chalItems  = [].concat(info.challenges    || []).map(c => `<li>${escapeHtml(c)}</li>`).join('') || '<li>—</li>';
          const oppItems   = [].concat(info.opportunities || []).map(o => `<li>${escapeHtml(o)}</li>`).join('') || '<li>—</li>';

          // Differentiator bars
          const diffs = profileByCluster[clusterNum] || [];
          let driverHtml = '';
          if (diffs.length > 0) {
            driverHtml = diffs.map(d => {
              const barW = Math.min(Math.abs(d.pct), 100).toFixed(1);
              const sign = d.pct >= 0 ? '+' : '';
              return `<div class="typology-driver-row">
                <div class="typology-driver-label">${escapeHtml(d.label)}</div>
                <div class="typology-driver-bar-wrap">
                  <div class="typology-driver-bar-fill" style="width:${escapeHtml(barW)}%;background:${escapeHtml(color)}"></div>
                </div>
                <div class="typology-driver-pct">${escapeHtml(sign + d.pct.toFixed(1))}%</div>
              </div>`;
            }).join('');
          } else {
            driverHtml = `<p class="typology-no-data">No variable notably above the Denmark-wide average.</p>`;
          }

          // Narrative from drivers in summary
          let narrativeHtml = '';
          if (Array.isArray(info.drivers) && info.drivers.length > 0) {
            let para = '';
            info.drivers.slice(0, 3).forEach((d, i) => {
              const variable = Array.isArray(d.variable) ? d.variable[0] : d.variable;
              const pct      = Array.isArray(d.pct_over) ? d.pct_over[0] : d.pct_over;
              const zVal     = Array.isArray(d.z) ? d.z[0] : d.z;
              const label    = variable.replace(/^.*\./, '').replace(/_/g, ' ');
              const absZ     = Math.abs(zVal);
              const strength = absZ > 2.0 ? 'strong' : absZ > 1.0 ? 'moderate' : 'mild';

              let lead;
              if (i === 0)      lead = `This cluster has a <strong>${escapeHtml(String(pct))}% higher</strong> share of <em>${escapeHtml(label)}</em> than the Denmark-wide average.`;
              else if (i === 1) lead = ` It also has a <strong>${escapeHtml(String(pct))}% higher</strong> share of <em>${escapeHtml(label)}</em>.`;
              else              lead = ` Additionally, <em>${escapeHtml(label)}</em> is <strong>${escapeHtml(String(pct))}% above</strong> the national average.`;

              para += ` ${lead} This is a ${escapeHtml(strength)} relative outlier within this selection (z&nbsp;=&nbsp;${escapeHtml(zVal.toFixed(2))}).`;
            });
            narrativeHtml = `<div class="typology-narrative"><p>${para.trim()}</p></div>`;
          }

          const card = document.createElement('div');
          card.className = 'typology-cluster-card';
          card.innerHTML = `
            <div class="typology-card-accent" style="background:${escapeHtml(color)}"></div>
            <div class="typology-card-inner">
              <div class="typology-card-header">
                <div class="typology-card-title">
                  <span class="typology-cluster-dot" style="background:${escapeHtml(color)}"></span>
                  <span class="typology-cluster-name">${escapeHtml(clusterId.replace(/_/g, ' '))}</span>
                </div>
                <span class="typology-count-badge">${escapeHtml(String(info.count))} zones</span>
              </div>
              <div class="typology-zones-row">${zoneChips}</div>
              <div class="typology-insights-grid">
                <div class="typology-insight-col">
                  <div class="typology-insight-heading typology-traits-heading">Characteristics</div>
                  <ul class="typology-insight-list">${traitItems}</ul>
                </div>
                <div class="typology-insight-col">
                  <div class="typology-insight-heading typology-challenges-heading">Challenges</div>
                  <ul class="typology-insight-list">${chalItems}</ul>
                </div>
                <div class="typology-insight-col">
                  <div class="typology-insight-heading typology-opps-heading">Opportunities</div>
                  <ul class="typology-insight-list">${oppItems}</ul>
                </div>
              </div>
              <div class="typology-drivers-section">
                <div class="typology-section-label">Key differentiators vs Denmark average</div>
                <div class="typology-driver-rows">${driverHtml}</div>
              </div>
              ${narrativeHtml}
            </div>`;
          container.appendChild(card);
        }
      }

      function runClusterTypologyAnalysis(ids) {
        if (ids.length < 3) {
          alert('Please select at least 3 zones to run typology clustering.');
          return;
        }

        const btn = document.getElementById('run-typology-btn');
        if (btn) { btn.disabled = true; btn.textContent = 'Running…'; }

        document.getElementById('modal-body').classList.remove('analysis-active');

        const url = `${PLUMBER_BASE}/cluster_typology?ids=${encodeURIComponent(ids.join(','))}`;
        fetch(url)
          .then(res => {
            if (!res.ok) {
              alert(`Could not retrieve typology (status ${res.status}). Is your R plumber server running on port 8000?`);
              throw new Error('HTTP ' + res.status);
            }
            return res.json();
          })
          .then(data => {
            renderTypologyResults(data);
            document.getElementById('cluster-summary').scrollIntoView({ behavior: 'smooth', block: 'start' });
          })
          .catch(err => console.error('Cluster error:', err))
          .finally(() => {
            if (btn) { btn.disabled = false; btn.textContent = 'Run Typology'; }
          });
      }

      // ══ FISCAL ANALYSIS ════════════════════════════════════════════════════════

      async function runFiscalAnalysis(ids) {
        const container = document.getElementById('analysis-container');
        if (!ids.length) {
          container.innerHTML = '<p style="padding:2rem;color:#666;">No zones to analyse.</p>';
          return;
        }

        // Use ids directly — analysis operates at komunnal level
        const analysisIds = ids;

        if (analysisIds.length === 0) {
          container.innerHTML = '<p style="padding:2rem;color:#666;">No zone data found for the selected areas.</p>';
          return;
        }

        container.innerHTML = `<div class="analysis-loading" id="analysis-loading-msg">
          <div class="analysis-spinner"></div>
          <span id="analysis-loading-text">Running fiscal analysis across ${analysisIds.length} zone${analysisIds.length > 1 ? 's' : ''}…</span>
        </div>`;

        const warmupTimer = setTimeout(() => {
          const el = document.getElementById('analysis-loading-text');
          if (el) el.innerHTML = `Running fiscal analysis across ${analysisIds.length} zone${analysisIds.length > 1 ? 's' : ''}…<br>
            <span style="font-size:.78rem;color:#6b7280;margin-top:.4rem;display:block;">
              API is warming up — this can take up to 60 seconds on first use.
            </span>`;
        }, 8000);

        const idsParam = analysisIds.join(',');
        const idsBody  = JSON.stringify({ ids: analysisIds });

        // Time series pulled from pre-loaded data.json (no extra API calls)
        const TS_SERIES = [
          { key: 'income',            label: 'Avg Income (DKK)',      fmt: v => 'DKK ' + Math.round(v).toLocaleString() },
          { key: 'unemployment_rate', label: 'Unemployment Rate (%)', fmt: v => v.toFixed(1) + '%' },
          { key: 'population',        label: 'Population',            fmt: v => Math.round(v).toLocaleString() },
          { key: 'foreign_pct',       label: 'Foreign Citizens (%)',  fmt: v => v.toFixed(1) + '%' },
          { key: 'crime_rate',        label: 'Crime Rate per 1,000',  fmt: v => v.toFixed(1) },
        ];

        try {
          // HF free-tier spaces can take 60-90s to wake from cold. Use AbortController
          // with 90s timeout so we don't fail silently on a cold start.
          const withTimeout = (promise, ms) => {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms);
            return promise.finally(() => clearTimeout(timer));
          };

          const [clusterRes, mlRes, shapRes] = await Promise.allSettled([
            withTimeout(
              fetch(`${PLUMBER_BASE}/cluster_typology?ids=${encodeURIComponent(idsParam)}`).then(r => r.json()),
              90000
            ),
            withTimeout(
              fetch(`${ML_BASE}/predict_distress`, { method:'POST', headers:{'Content-Type':'application/json'}, body: idsBody }).then(r => r.json()),
              90000
            ),
            withTimeout(
              fetch(`${ML_BASE}/shap_explain`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ids: analysisIds, top_n: 6 }) }).then(r => r.json()),
              90000
            ),
          ]);

          clearTimeout(warmupTimer);
          const cluster = clusterRes.status === 'fulfilled' ? clusterRes.value : null;
          const ml      = mlRes.status      === 'fulfilled' ? mlRes.value      : null;
          const shap    = shapRes.status    === 'fulfilled' ? shapRes.value     : null;

          // Build tsData from window.timeseriesData (already loaded with data.json)
          const tsData = TS_SERIES.map(s => {
            const ser = window.timeseriesData?.[s.key];
            if (!ser?.years?.length) return null;
            const yrs  = ser.years.map(String);
            const series = analysisIds.map(id => {
              const vals = ser[id];
              if (!vals) return null;
              return { gcd: id, zone_code: id, years: yrs.map(Number), values: vals.map(Number) };
            }).filter(Boolean);
            if (!series.length) return null;
            const dkVals = ser['000'];
            return {
              key: s.key, label: s.label, fmt: s.fmt,
              data: {
                metric: s.key,
                years_available: yrs.map(Number),
                series,
                national_median: dkVals ? { years: yrs.map(Number), values: dkVals.map(Number) } : null,
              },
            };
          }).filter(Boolean);

          window.latestAnalysisData = { ml, cluster, tsData, shap };

          container.innerHTML = '';

          // ── Data vintage note
          const dataNoteEl = document.createElement('div');
          dataNoteEl.className = 'data-note-banner';
          dataNoteEl.innerHTML = `
            <span class="data-note-icon">ⓘ</span>
            <div style="flex:1;min-width:0;">
              <strong>Data &amp; Model Notes</strong>
              <ul style="margin:.45rem 0 0;padding-left:1.1rem;line-height:1.65;list-style:disc;">
                <li><strong>Data source:</strong> Panel data drawn from Statistics Denmark (DST)
                  public API at Kommune level — 98 municipalities × 13 years (2012–2024).
                  Indicators: avg income, population, foreign citizens %, unemployment rate, crime rate.</li>
                <li><strong>ML target:</strong> Binary — will this municipality have
                  <strong>above-median unemployment</strong> next year?
                  Temporal train/test split: train 2012–2018, test 2020–2023.</li>
                <li><strong>Clustering:</strong> K-means (k=3) on all indicator domains from data.json
                  via the R Plumber API. Trait interpretation uses Danish policy context.</li>
                <li><strong>Multi-year forecasts (if used):</strong> Scenario simulation only — not a
                  statistical forecast. Each step nudges unemployment by a fixed rule (+4% if high-risk,
                  −3% if low-risk). These multipliers are not learned from data. Uncertainty compounds
                  with each year; treat projections beyond 1 year as indicative only.</li>
              </ul>
            </div>`;
          container.appendChild(dataNoteEl);

          const rDown = !cluster || cluster.error;
          const mDown = !ml     || ml.detail;
          if (rDown || mDown) {
            const banner = document.createElement('div');
            banner.className = 'analysis-api-banner';
            const retryNote = ' HF free-tier spaces sleep after inactivity — wait 60s then <button onclick="window._retryAnalysis()" style="background:none;border:none;color:#4f46e5;cursor:pointer;font-weight:600;text-decoration:underline;padding:0">retry</button>.';
            banner.innerHTML = [
              rDown ? `⚠ R API not responding — clustering unavailable.${retryNote}` : '',
              mDown ? `⚠ Python ML API not responding — predictions unavailable.${retryNote}` : '',
            ].filter(Boolean).join('<br>');
            container.appendChild(banner);
          }

          const ATABS = [
            { id: 'atab-ml',      label: 'ML Risk',       available: !!(ml && ml.zones) },
            { id: 'atab-cluster', label: 'Clustering',    available: !!(cluster && cluster.summary) },
            { id: 'atab-socio',   label: 'Socio Profile', available: analysisIds.length > 0 },
            { id: 'atab-trends',  label: 'Trends',        available: tsData.length > 0 },
          ].filter(t => t.available);

          if (ATABS.length === 0) {
            container.innerHTML += '<p style="padding:2rem;color:#888;">No data returned from either server.</p>';
          } else {
            const tabBar = document.createElement('div');
            tabBar.className = 'analysis-inner-tabbar';
            ATABS.forEach((t, i) => {
              const btn = document.createElement('button');
              btn.className = 'analysis-inner-tab' + (i === 0 ? ' active' : '');
              btn.dataset.target = t.id;
              btn.textContent = t.label;
              btn.addEventListener('click', () => {
                tabBar.querySelectorAll('.analysis-inner-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                panelWrap.querySelectorAll('.analysis-panel').forEach(p => p.style.display = 'none');
                panelWrap.querySelector('#' + t.id).style.display = '';
              });
              tabBar.appendChild(btn);
            });
            container.appendChild(tabBar);

            const panelWrap = document.createElement('div');
            panelWrap.className = 'analysis-panel-wrap';

            if (ml && ml.zones) {
              const p = document.createElement('div');
              p.className = 'analysis-panel'; p.id = 'atab-ml';
              renderMLRiskSection(p, ml, shap);
              panelWrap.appendChild(p);
            }
            if (cluster && cluster.summary) {
              const p = document.createElement('div');
              p.className = 'analysis-panel'; p.id = 'atab-cluster';
              p.style.display = 'none';
              renderDkClusterSection(p, cluster);
              panelWrap.appendChild(p);
            }
            if (analysisIds.length > 0) {
              const p = document.createElement('div');
              p.className = 'analysis-panel'; p.id = 'atab-socio';
              p.style.display = 'none';
              renderSocioProfileSection(p, analysisIds);
              panelWrap.appendChild(p);
            }
            if (tsData.length > 0) {
              const p = document.createElement('div');
              p.className = 'analysis-panel'; p.id = 'atab-trends';
              p.style.display = 'none';
              renderTrendsSection(p, tsData, analysisIds);
              panelWrap.appendChild(p);
            }

            container.appendChild(panelWrap);
          }

        } catch (err) {
          container.innerHTML = `<div class="analysis-api-banner">Error running analysis: ${escapeHtml(err.message)}</div>`;
        }
      }

      function svgArcGauge(prob, color, size = 90) {
        const R = 34, cx = size / 2, cy = size * 0.58;
        const startA = Math.PI, endA = Math.PI + (prob / 100) * Math.PI;
        const x1 = cx + R * Math.cos(startA), y1 = cy + R * Math.sin(startA);
        const x2 = cx + R * Math.cos(endA),   y2 = cy + R * Math.sin(endA);
        const lg = prob > 50 ? 1 : 0;
        const track = `M${(cx - R).toFixed(1)},${cy.toFixed(1)} A${R},${R} 0 0,1 ${(cx + R).toFixed(1)},${cy.toFixed(1)}`;
        const fill  = `M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)}`;
        return `<svg width="${size}" height="${Math.round(size * 0.62)}" viewBox="0 0 ${size} ${Math.round(size * 0.62)}" style="display:block;overflow:visible">
          <path d="${track}" fill="none" stroke="#e2e8f0" stroke-width="7" stroke-linecap="round"/>
          <path d="${fill}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"/>
          <text x="${cx}" y="${(cy - 2).toFixed(1)}" text-anchor="middle" font-size="15" font-weight="800" fill="${color}">${prob}%</text>
        </svg>`;
      }

      function renderMLRiskSection(container, ml, shap) {
        const predYr = (ml.year || 2023) + 1;
        const sec  = makeSection('ML Unemployment Risk Prediction',
          `XGBoost · Above-median unemployment risk in ${predYr} · trained on DST panel 2012–2024 · indicative only — see model notes below`);
        const grid = document.createElement('div');
        grid.className = 'analysis-risk-grid';

        ml.zones.forEach(zone => {
          const zoneId  = zone.zone_code || zone.gcd;
          const shapZone = shap?.explanations?.find(e => (e.zone_code || e.gcd) === zoneId);
          const card    = document.createElement('div');
          const riskCat = safeStr(zone.risk_category, 'Low');
          const riskKey = riskCat.toLowerCase();
          card.className = `analysis-risk-card arc-card risk-${riskKey}`;

          const prob  = Math.round((zone.high_unemp_probability || zone.distress_probability || 0) * 100);
          const color = riskColor(riskCat);
          const curUnemp = zone.current_unemp_rate != null ? Number(zone.current_unemp_rate).toFixed(1) + '%' : '–';
          const natMed   = zone.national_median_unemp != null ? Number(zone.national_median_unemp).toFixed(1) + '%' : null;
          card.innerHTML = `
            <div class="arc-card-header risk-${riskKey}">
              <div class="arc-card-title-row">
                <div>
                  <div class="arc-gcd">${escapeHtml(zoneName(zoneId))}</div>
                  <div class="arc-meta"><span class="arc-gcd-code">${escapeHtml(zoneId)}</span> · ${escapeHtml(safeStr(zone.region,''))}</div>
                </div>
                <div class="arc-badge risk-badge-${escapeHtml(riskKey)}">${escapeHtml(riskCat)}</div>
              </div>
            </div>
            <div class="arc-card-body">
              <div class="arc-gauge-row">
                <div class="arc-gauge-svg">${svgArcGauge(prob, color)}</div>
                <div class="arc-gauge-info">
                  <div class="arc-prob-label">High unemployment risk<br>in ${predYr}</div>
                  <div class="arc-streak">Current unemp: <strong>${escapeHtml(curUnemp)}</strong>
                    ${natMed ? ` · DK median: ${escapeHtml(natMed)}` : ''}</div>
                </div>
              </div>
              ${shapZone ? renderShapDrivers(shapZone.top_drivers) : ''}
            </div>
          `;
          grid.appendChild(card);
        });

        sec.appendChild(grid);
        container.appendChild(sec);
      }

      function renderShapDrivers(drivers) {
        if (!drivers || !drivers.length) return '';
        const maxAbs = Math.max(...drivers.map(d => Math.abs(d.shap_value)), 0.001);
        const rows = drivers.map(d => {
          const pct  = Math.round((Math.abs(d.shap_value) / maxAbs) * 100);
          const col  = d.direction === 'increases_risk' ? '#dc2626' : '#16a34a';
          const sign = d.direction === 'increases_risk' ? '▲' : '▼';
          return `<div class="shap-row">
            <span class="shap-sign" style="color:${col}">${sign}</span>
            <span class="shap-feat">${escapeHtml(d.feature.replace(/_/g,' '))}</span>
            <div class="shap-bar-wrap">

        const sec = makeSection('Spending Profile', `Expenditure shares by category · Year ${profile.year}`);
        const nat = profile.national_benchmark?.spending_shares || {};

        const CATS = [
          { key: 'admin',             label: 'Administration',    color: '#4e79a7' },
          { key: 'education_culture', label: 'Education & Culture', color: '#f28e2b' },
          { key: 'social_welfare',    label: 'Social Welfare',    color: '#e15759' },
          { key: 'health',            label: 'Health',            color: '#76b7b2' },
          { key: 'infrastructure',    label: 'Infrastructure',    color: '#59a14f' },

        const grid = document.createElement('div');

          if (!zone.spending_shares) return;

          const maxVal  = Math.max(...allVals, ...CATS.map(cat => (nat[cat.key] || 0) * 100)) * 1.1 || 1;

          const card = document.createElement('div');
          card.className = 'spending-card';
          card.innerHTML = `<div class="spending-card-title">${escapeHtml(zoneName(zone.gcd))} <span>${escapeHtml(safeStr(zone.bundesland,''))}</span></div>`;

          CATS.forEach(cat => {
            const val    = ((zone.spending_shares || {})[cat.key] || 0) * 100;
            const natVal = (nat[cat.key] || 0) * 100;
            const diff   = val - natVal;
            const barPct = Math.min((val / maxVal) * 100, 100).toFixed(1);

            const diffStr = natVal > 0
              ? `<span class="spend-diff ${diff > 0 ? 'spend-over' : 'spend-under'}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}pp</span>`
