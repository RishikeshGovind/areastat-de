<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AreaStat AT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script src="js/shared.js"></script>
  </head>

  <body>

    <div id="app-shell">

      <main id="map-area">
        <div id="map"></div>

        <!-- ══ FLOATING CONTROL CARD ══ -->
        <div id="map-control-card">
          <div class="mcc-header">
            <span>◈ AreaStat AT</span>
            <button id="lang-toggle" class="lang-btn">DE</button>
          </div>

          <div class="mcc-section">
            <div class="mcc-label" data-i18n="card.ebene">Geographic Level</div>
            <select id="zone-selector" class="mcc-select">
              <option value="bezirk">Bezirk (District)</option>
              <option value="gemeinde" selected>Gemeinde (Municipality)</option>
            </select>
          </div>

          <div class="mcc-section">
            <div class="mcc-label" data-i18n="card.bundesland">Federal State</div>
            <div class="mcc-pills" id="bundesland-buttons">
              <div class="bl-option"><input type="checkbox" id="bl-bgld" value="Burgenland"><label for="bl-bgld">Bgld</label></div>
              <div class="bl-option"><input type="checkbox" id="bl-ktn" value="Kärnten"><label for="bl-ktn">Ktn</label></div>
              <div class="bl-option"><input type="checkbox" id="bl-noe" value="Niederösterreich"><label for="bl-noe">NÖ</label></div>
              <div class="bl-option"><input type="checkbox" id="bl-ooe" value="Oberösterreich"><label for="bl-ooe">OÖ</label></div>
              <div class="bl-option"><input type="checkbox" id="bl-sbg" value="Salzburg"><label for="bl-sbg">Sbg</label></div>
              <div class="bl-option"><input type="checkbox" id="bl-stmk" value="Steiermark"><label for="bl-stmk">Stmk</label></div>
              <div class="bl-option"><input type="checkbox" id="bl-tir" value="Tirol"><label for="bl-tir">Tir</label></div>
              <div class="bl-option"><input type="checkbox" id="bl-vbg" value="Vorarlberg"><label for="bl-vbg">Vbg</label></div>
              <div class="bl-option"><input type="checkbox" id="bl-wien" value="Wien"><label for="bl-wien">Wien</label></div>
            </div>
          </div>

          <div class="mcc-section">
            <div class="mcc-label">Map Colour</div>
            <div class="seg-switcher" id="seg-switcher">
              <button class="seg-btn" data-seg="urban_rural">Urban-Rural</button>
              <button class="seg-btn active" data-seg="settlement">Settlement</button>
              <button class="seg-btn" data-seg="density">Density</button>
            </div>
          </div>

          <div class="mcc-section mcc-controls">
            <div id="selection-info" style="font-size:.72rem;color:var(--text-muted);width:100%;padding-bottom:.2rem;">0 zones selected</div>
            <button id="clear-selection-btn" class="mcc-btn" data-i18n="card.clear">Clear</button>
            <button id="resetZoomBtn" class="mcc-btn" data-i18n="card.reset">Reset</button>
          </div>
        </div>

        <!-- ══ LEGEND ══ -->
        <div id="map-legend"></div>

        <!-- ══ OPEN PROFILE BUTTON ══ -->
        <button id="build-profile-btn" data-i18n="btn.build">Open in AreaStat →</button>

      </main>

    </div>

    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

    <script>
      let currentLang = 'en'; // default English so user can read it

      // ── Boundary URLs — correct paths from ginseng666/GeoJSON-TopoJSON-Austria
      // Bezirke: GeoJSON (.geo.json)  |  Gemeinden: TopoJSON (.topo.json, converted below)
      const BEZIRKE_URLS = [
        'https://raw.githubusercontent.com/ginseng666/GeoJSON-TopoJSON-Austria/master/2021/simplified-99.9/bezirke_999_geo.json',
        'https://raw.githubusercontent.com/ginseng666/GeoJSON-TopoJSON-Austria/master/2021/simplified-99.5/bezirke_995_geo.json',
      ];
      // Gemeinden only exists as TopoJSON at this simplification — loaded and converted below
      const GEMEINDEN_URLS = [
        'https://raw.githubusercontent.com/ginseng666/GeoJSON-TopoJSON-Austria/master/2021/simplified-95/gemeinden_95_topo.json',
      ];

      async function fetchFirstWorking(urls, label) {
        for (const url of urls) {
          try {
            const r = await fetch(url);
            if (r.ok) { console.log(`Loaded ${label} from: ${url}`); return r.json(); }
          } catch (_) { /* try next */ }
        }
        throw new Error(`All ${label} URL attempts failed`);
      }

      // Convert TopoJSON → GeoJSON if needed (gemeinden source is topo format)
      function ensureGeoJSON(raw) {
        if (raw.type === 'Topology') {
          const objName = Object.keys(raw.objects)[0];
          return topojson.feature(raw, raw.objects[objName]);
        }
        return raw; // already GeoJSON
      }

      // ── GKZ extraction — tries common property names from various Austrian GeoJSON sources
      function extractGkz(properties, featureIndex, zoneType) {
        const p = properties;
        const candidates = [p.iso, p.GKZ, p.gkz, p.GCD, p.gcd, p.BEZ_ID, p.GEM_ID, p.id];
        for (const c of candidates) {
          if (c == null || c === '') continue;
          const n = parseInt(String(c), 10);
          if (isNaN(n)) continue;
          if (zoneType === 'bezirk'   && n >= 100 && n < 1000) return String(n);
          if (zoneType === 'gemeinde' && n >= 10000 && n < 100000) return String(n).padStart(5, '0');
        }
        return null; // unmatched feature — won't appear in selectedIds
      }

      const selectedIds = new Set();

      document.addEventListener('DOMContentLoaded', function () {
        const map = new maplibregl.Map({
          container: 'map',
          style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
          center: [14.55, 47.62],
          zoom: 7.0,
          minZoom: 5.5,
          maxZoom: 13,
          maxBounds: [[9.0, 45.8], [18.0, 49.5]]
        });

        let activeZone = 'gemeinde';
        let currentZoneType = 'gemeinde';
        let bezirkData = {};
        let gemeindeData = {};
        let austriaTotals = {};
        let selectedCategories = [...DEFAULT_PROFILE_CATEGORIES];
        let currentView = 'charts';
        let latestAggregatedData = {};
        let fillVisible = true;
        let sourcesReady = false;

        const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false });
        const selectedBundeslaender = new Set();

        const excludedKeys = EXCLUDED_PROFILE_KEYS;

        let activeSegmentation = 'settlement';

        // ── Zone selector
        document.getElementById('zone-selector').addEventListener('change', function (e) {
          currentZoneType = e.target.value;
          activeZone = e.target.value;

          if (sourcesReady) {
            const show = (id, vis) => map.setLayoutProperty(id, 'visibility', vis ? 'visible' : 'none');
            const isBezirk = currentZoneType === 'bezirk';
            show('bezirk-fill', isBezirk);
            show('bezirk-outline-default', isBezirk);
            show('bezirk-outline-hover', isBezirk);
            show('gemeinde-fill', !isBezirk);
            show('gemeinde-outline-default', !isBezirk);
            show('gemeinde-outline-hover', !isBezirk);
          }

          clearSelections();
          selectedIds.clear();
          selectedBundeslaender.clear();
          popup.remove();
        });

        // ── ID maps: MapLibre generateId index → GKZ string, and reverse
        // Using generateId:true means features get sequential numeric IDs matching array index
        let bezirkIdMap   = {}; // index → '101'
        let gemeindeIdMap = {}; // index → '10101'
        let bezirkGkzToId   = {}; // '101'   → index
        let gemeindeGkzToId = {}; // '10101' → index

        // ── Load data.json then GeoJSON boundaries
        let mapLoaded = false;
        let dataLoaded = false;
        let bezirkeGeoJSON  = null;
        let gemeindenGeoJSON = null;

        map.on('load', () => {
          mapLoaded = true;
          tryAddSources();
        });

        fetch('./data.json')
          .then(r => r.json())
          .then(data => {
            bezirkData    = data['Bezirk']        || {};
            gemeindeData  = data['Gemeinde']       || {};
            austriaTotals = data['Austria Total']  || {};
            window.austriaTotals = austriaTotals;
            window.austriaPopulation = totalPopulationForData(gemeindeData);

            return Promise.all([
              fetchFirstWorking(BEZIRKE_URLS,   'Bezirke'),
              fetchFirstWorking(GEMEINDEN_URLS, 'Gemeinden')
            ]);
          })
          .then(([bgRaw, ggRaw]) => {
            const bg = ensureGeoJSON(bgRaw);
            const gg = ensureGeoJSON(ggRaw);
            // Build ID maps and annotate features with all segmentation properties
            const annotateFeature = (f, data) => {
              for (const [segKey, segCfg] of Object.entries(SEGMENTATION_CONFIG)) {
                f.properties[segCfg.prop] = data ? getScalar(data[segCfg.dataKey]) || '' : '';
              }
            };
            bg.features.forEach((f, idx) => {
              const gkz = extractGkz(f.properties, idx, 'bezirk');
              bezirkIdMap[idx] = gkz;
              if (gkz) bezirkGkzToId[gkz] = idx;
              annotateFeature(f, gkz && bezirkData[gkz] ? bezirkData[gkz] : null);
            });
            window.gcdNameMap = {};
            gg.features.forEach((f, idx) => {
              const gkz = extractGkz(f.properties, idx, 'gemeinde');
              gemeindeIdMap[idx] = gkz;
              if (gkz) {
                gemeindeGkzToId[gkz] = idx;
                const n = f.properties.name || f.properties.NAME_2 || f.properties.NAME || f.properties.GEN || null;
                if (n) window.gcdNameMap[gkz] = n;
              }
              annotateFeature(f, gkz && gemeindeData[gkz] ? gemeindeData[gkz] : null);
            });

            bezirkeGeoJSON   = bg;
            gemeindenGeoJSON = gg;
            dataLoaded = true;
            tryAddSources();
          })
          .catch(err => {
            console.error('Data loading error:', err);
            const mapDiv = document.getElementById('map');
            const msg = document.createElement('div');
            msg.style.cssText = 'position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#fff3cd;border:1px solid #ffc107;padding:12px 18px;border-radius:6px;z-index:9999;max-width:600px;font-size:13px;';
            msg.innerHTML = `<strong>⚠ Boundary data could not be loaded.</strong><br>
              Check the browser console (F12) for the exact error.<br>
              Download Bezirke/Gemeinden GeoJSON from
              <a href="https://github.com/ginseng666/GeoJSON-TopoJSON-Austria" target="_blank">ginseng666/GeoJSON-TopoJSON-Austria</a>
              and update the <code>BEZIRKE_URLS</code> / <code>GEMEINDEN_URLS</code> constants at the top of the script.`;
            mapDiv.style.position = 'relative';
            mapDiv.appendChild(msg);
          });

        function tryAddSources() {
          if (!mapLoaded || !dataLoaded) return;
          addSourcesAndLayers();
          syncPendingSelections();
          renderLegend();
        }

        function syncPendingSelections() {
          selectedIds.forEach(gkz => {
            const bzId = bezirkGkzToId[gkz];
            if (bzId !== undefined) map.setFeatureState({ source: 'bezirke',   id: bzId }, { hovered: true });
            const gmId = gemeindeGkzToId[gkz];
            if (gmId !== undefined) map.setFeatureState({ source: 'gemeinden', id: gmId }, { hovered: true });
          });
        }

        function buildFillExpression(segKey, hoverColor) {
          const cfg = SEGMENTATION_CONFIG[segKey];
          const matchArgs = [];
          cfg.classes.forEach(c => { matchArgs.push(c.key, c.color); });
          return [
            'case',
            ['boolean', ['feature-state', 'hovered'], false], hoverColor,
            ['match', ['get', cfg.prop], ...matchArgs, '#e8e0d4']
          ];
        }

        function urFillColor(hoverColor) {
          return buildFillExpression(activeSegmentation, hoverColor);
        }

        function switchSegmentation(segKey) {
          activeSegmentation = segKey;
          // Update map paint
          if (map.getLayer('bezirk-fill')) {
            map.setPaintProperty('bezirk-fill',   'fill-color', buildFillExpression(segKey, '#5b8fc7'));
          }
          if (map.getLayer('gemeinde-fill')) {
            map.setPaintProperty('gemeinde-fill', 'fill-color', buildFillExpression(segKey, '#5b8fc7'));
          }
          // Update legend
          renderLegend();
          // Update switcher button states
          document.querySelectorAll('.seg-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.seg === segKey);
          });
        }

        function renderLegend() {
          const legend = document.getElementById('map-legend');
          if (!legend) return;
          const cfg = SEGMENTATION_CONFIG[activeSegmentation];
          const isEn = currentLang === 'en';
          legend.innerHTML = cfg.classes
            .filter(c => c.key !== 'Unbekannt')
            .map(c => `<div><span class="legend-swatch" style="background:${c.color};opacity:0.75"></span> ${escapeHtml(isEn ? c.label_en : c.label_de)}</div>`)
            .join('');
        }

        function addSourcesAndLayers() {
          // generateId:true → MapLibre assigns sequential 0-based numeric IDs
          // matching the feature array index — consistent with our bezirkIdMap
          map.addSource('bezirke', {
            type: 'geojson',
            data: bezirkeGeoJSON,
            generateId: true
          });

          map.addSource('gemeinden', {
            type: 'geojson',
            data: gemeindenGeoJSON,
            generateId: true
          });

          // Bezirk fill (hidden by default — Gemeinde is default level)
          map.addLayer({
            id: 'bezirk-fill', type: 'fill', source: 'bezirke',
            layout: { visibility: 'none' },
            paint: { 'fill-color': urFillColor('#5b8fc7'), 'fill-opacity': 0.62 }
          });

          // Gemeinde fill (visible by default)
          map.addLayer({
            id: 'gemeinde-fill', type: 'fill', source: 'gemeinden',
            layout: { visibility: 'visible' },
            paint: { 'fill-color': urFillColor('#5b8fc7'), 'fill-opacity': 0.62 }
          });

          // Outlines
          map.addLayer({
            id: 'bezirk-outline-default', type: 'line', source: 'bezirke',
            layout: { visibility: 'none' },
            paint: { 'line-color': '#666666', 'line-width': 1 }
          });

          map.addLayer({
            id: 'gemeinde-outline-default', type: 'line', source: 'gemeinden',
            layout: { visibility: 'visible' },
            paint: { 'line-color': '#666666', 'line-width': 0.5 }
          });

          map.addLayer({
            id: 'bezirk-outline-hover', type: 'line', source: 'bezirke',
            layout: { visibility: 'none' },
            paint: {
              'line-color': ['case', ['boolean', ['feature-state', 'hovered'], false], '#000000', 'rgba(0,0,0,0)'],
              'line-width': 1.5
            }
          });

          map.addLayer({
            id: 'gemeinde-outline-hover', type: 'line', source: 'gemeinden',
            layout: { visibility: 'visible' },
            paint: {
              'line-color': ['case', ['boolean', ['feature-state', 'hovered'], false], '#000000', 'rgba(0,0,0,0)'],
              'line-width': 1.5
            }
          });

          sourcesReady = true;
          setupMapEvents();
        }

        function setupMapEvents() {
          // ── Hover
          function onHover(layerId, idMap, dataMap) {
            map.on('mousemove', layerId, (e) => {
              if (!e.features.length) return;
              const feature = e.features[0];
              const mlId = feature.id;            // numeric index from generateId
              const gkz  = idMap[mlId] || '';
              const data = gkz ? dataMap[gkz] : null;
              const name    = feature.properties.name || feature.properties.NAME_2 || gkz || 'Unknown';
              const bl      = data ? getScalar(data.Bundesland) || '' : '';
              const segCfg  = SEGMENTATION_CONFIG[activeSegmentation];
              const segVal  = data ? getScalar(data[segCfg.dataKey]) || '' : '';
              const segClr  = segCfg.classes.find(c => c.key === segVal)?.color || '#888';
              const pop     = data ? (getScalar(data['Bevölkerung']) || 0).toLocaleString('de-AT') : '';

              const popupHtml = `<div>
                <strong>${escapeHtml(name)}</strong>${bl ? ` – ${escapeHtml(bl)}` : ''}<br>
                ${segVal ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${segClr};margin-right:4px;vertical-align:middle"></span><em>${escapeHtml(segVal)}</em>` : ''}${pop ? ` | Bev.: ${escapeHtml(pop)}` : ''}
              </div>`;

              map.getCanvas().style.cursor = 'pointer';
              popup.setLngLat(e.lngLat).setOffset([0, -10]).setHTML(popupHtml).addTo(map);
            });

            map.on('mouseleave', layerId, () => {
              map.getCanvas().style.cursor = '';
              popup.remove();
            });
          }

          onHover('bezirk-fill',   bezirkIdMap,   bezirkData);
          onHover('gemeinde-fill', gemeindeIdMap, gemeindeData);

          // ── Click
          function onClick(layerId, sourceId, idMap, gkzToId) {
            map.on('click', layerId, (e) => {
              if (!e.features.length) return;
              const feature = e.features[0];
              const mlId = feature.id;  // numeric
              const gkz  = idMap[mlId];
              if (!gkz) return;

              if (selectedIds.has(gkz)) {
                selectedIds.delete(gkz);
                map.setFeatureState({ source: sourceId, id: mlId }, { hovered: false });
              } else {
                selectedIds.add(gkz);
                map.setFeatureState({ source: sourceId, id: mlId }, { hovered: true });
              }

              window.selectedIdsExcel = selectedIds;
              const info = document.getElementById('selection-info');
              if (info) info.textContent = selectedIds.size + ' zone' + (selectedIds.size !== 1 ? 's' : '') + ' selected';
            });
          }

          onClick('bezirk-fill',   'bezirke',   bezirkIdMap,   bezirkGkzToId);
          onClick('gemeinde-fill', 'gemeinden', gemeindeIdMap, gemeindeGkzToId);

          // Build / Close modal
          const buildBtn = document.getElementById('build-profile-btn');
          function openProfilePage() {
            if (!selectedIds.size) {
              alert('Please select at least one zone on the map first.');
              return;
            }
            // Store selection in localStorage for profile.html to read
            localStorage.setItem('profile_ids',         JSON.stringify(Array.from(selectedIds)));
            localStorage.setItem('profile_zone_type',   currentZoneType);
            localStorage.setItem('profile_lang',        currentLang);
            localStorage.setItem('profile_segmentation',activeSegmentation);
            localStorage.setItem('profile_categories',  JSON.stringify(selectedCategories));
            // Pass the GCD→name map so profile.html doesn't need to re-fetch GeoJSON
            localStorage.setItem('profile_gcd_names',   JSON.stringify(window.gcdNameMap || {}));
            window.location.href = './profile.html';
          }

          buildBtn.addEventListener('click', openProfilePage);
        }

        // ── Language toggle
        document.getElementById('lang-toggle').addEventListener('click', () => {
          currentLang = currentLang === 'en' ? 'de' : 'en';
          applyLang();
          renderLegend();
        });
        applyLang(); // Apply default language (English) on load

        const zoneSelector  = document.getElementById('zone-selector');

        // ── Reset zoom
        document.getElementById('resetZoomBtn').addEventListener('click', () => {
          map.easeTo({ center: [14.55, 47.62], zoom: 7.0, duration: 2000 });
        });

        // ── Segmentation switcher
        document.getElementById('seg-switcher').addEventListener('click', e => {
          const btn = e.target.closest('.seg-btn');
          if (!btn) return;
          switchSegmentation(btn.dataset.seg);
        });


        // ── renderStatsStrip
        // Shows KPI cards (zone count, population, urban/inter/rural split)
        // and a collapsible min/mean/max table for active domains.
        function renderStatsStrip(selectedIdsArray, dataSource) {
          const strip = document.getElementById('stats-strip');
          if (!strip) return;
          strip.innerHTML = '';

          if (!selectedIdsArray.length) {
            strip.style.display = 'none';
            return;
          }

          const segCfg    = SEGMENTATION_CONFIG[activeSegmentation];
          const segCounts = {};
          segCfg.classes.forEach(c => { segCounts[c.key] = 0; });
          let totalPop = 0;
          const indicatorStats = {};

          selectedIdsArray.forEach(id => {
            const z = dataSource[id];
            if (!z) return;
            const segVal = getScalar(z[segCfg.dataKey]);
            if (segVal && segCounts[segVal] !== undefined) segCounts[segVal]++;
            totalPop += getScalar(z['Bevölkerung']) || 0;

            for (const [key, value] of Object.entries(z)) {
              if (excludedKeys.includes(key) || typeof value !== 'object' || value === null) continue;
              if (!indicatorStats[key]) indicatorStats[key] = {};
              for (const [ind, val] of Object.entries(value)) {
                if (typeof val !== 'number') continue;
                if (!indicatorStats[key][ind]) indicatorStats[key][ind] = { min: Infinity, max: -Infinity, sum: 0, count: 0 };
                const s = indicatorStats[key][ind];
                if (val < s.min) s.min = val;
                if (val > s.max) s.max = val;
                s.sum += val; s.count++;
              }
            }
          });

          strip.style.display = 'block';

          // KPI row
          const kpiRow = document.createElement('div');
          kpiRow.className = 'stats-kpi-row';
          const isEn = currentLang === 'en';

          // First two fixed cards (zones + population)
          [
            { label: isEn ? 'Zones'      : 'Gebiete',     value: selectedIdsArray.length,          accent: '#1e3a5f' },
            { label: isEn ? 'Population' : 'Bevölkerung', value: totalPop.toLocaleString('de-AT'), accent: '#1e3a5f' },
          ].forEach(kpi => {
            const card = document.createElement('div');
            card.className = 'stats-kpi-card';
            card.style.borderLeftColor = kpi.accent;
            card.innerHTML = `<div class="stats-kpi-value">${escapeHtml(kpi.value)}</div><div class="stats-kpi-label">${escapeHtml(kpi.label)}</div>`;
            kpiRow.appendChild(card);
          });

          // Dynamic class-count cards from active segmentation
          segCfg.classes.filter(c => c.key !== 'Unbekannt').forEach(c => {
            const card = document.createElement('div');
            card.className = 'stats-kpi-card';
            card.style.borderLeftColor = c.color;
            const label = isEn ? c.label_en : c.label_de;
            card.innerHTML = `<div class="stats-kpi-value">${segCounts[c.key] || 0}</div><div class="stats-kpi-label">${escapeHtml(label)}</div>`;
            kpiRow.appendChild(card);
          });

          strip.appendChild(kpiRow);

          // Min / Mean / Max collapsible
          const activeDomains = selectedCategories.filter(d => indicatorStats[d]);
          if (!activeDomains.length) return;

          const details = document.createElement('details');
          details.className = 'stats-minmax-section';

          const sumEl = document.createElement('summary');
          sumEl.className = 'stats-summary-toggle';
          sumEl.textContent = isEn ? 'Statistical Summary ▼' : 'Statistische Zusammenfassung ▼';
          details.appendChild(sumEl);

          const grid = document.createElement('div');
          grid.className = 'stats-minmax-grid';

          activeDomains.forEach(domain => {
            const ds = indicatorStats[domain];
            if (!ds || !Object.keys(ds).length) return;

            const card = document.createElement('div');
            card.className = 'stats-domain-card';

            const hdr = document.createElement('div');
            hdr.className = 'stats-domain-title';
            hdr.textContent = tDomain(domain);
            card.appendChild(hdr);

            const tbl = document.createElement('table');
            tbl.className = 'stats-table';
            tbl.innerHTML = `<thead><tr>
              <th>${isEn ? 'Indicator' : 'Indikator'}</th>
              <th>Min</th><th>${isEn ? 'Mean' : 'Ø'}</th><th>Max</th>
            </tr></thead>`;

            const tbody = document.createElement('tbody');
            for (const [ind, s] of Object.entries(ds)) {
              const mean = s.count > 0 ? s.sum / s.count : 0;
              const isPct = ind.includes('(%)');
              const fmt = v => (v === Infinity || v === -Infinity) ? '–' : (isPct ? v.toFixed(1) + '%' : v.toFixed(2));
              const tr = document.createElement('tr');
              tr.innerHTML = `<td>${escapeHtml(tLabel(ind))}</td><td>${escapeHtml(fmt(s.min))}</td><td><strong>${escapeHtml(fmt(mean))}</strong></td><td>${escapeHtml(fmt(s.max))}</td>`;
              tbody.appendChild(tr);
            }
            tbl.appendChild(tbody);
            card.appendChild(tbl);
            grid.appendChild(card);
          });

          details.appendChild(grid);
          strip.appendChild(details);
        }

        // ── updateTables
        function updateTables(selectedIdsArray) {
          const tablesContainer    = document.getElementById('tables-container');
          const chartsContainer    = document.getElementById('charts-container');

          let selectedTab = document.querySelector('.view-tab.selected');
          if (!selectedTab) {
            selectedTab = document.querySelector('.view-tab[data-view="charts"]');
            selectedTab.classList.add('selected');
          }
          const selectedView = selectedTab.getAttribute('data-view');

          tablesContainer.innerHTML = '';
          chartsContainer.innerHTML = '';
          tablesContainer.style.display    = 'none';
          chartsContainer.style.display    = 'none';

          const dataSource = currentZoneType === 'gemeinde' ? gemeindeData : bezirkData;

          // Aggregate: mean of continuous indicators across selected zones
          const domainAgg = {}; // domain -> indicator -> { sum, count }
          let totalPopulation = 0;

          selectedIdsArray.forEach(id => {
            const zoneData = dataSource[id];
            if (!zoneData) return;
            totalPopulation += getScalar(zoneData['Bevölkerung']) || 0;

            for (const [key, value] of Object.entries(zoneData)) {
              if (excludedKeys.includes(key)) continue;
              if (typeof value !== 'object' || value === null) continue;

              if (!domainAgg[key]) domainAgg[key] = {};
              for (const [indicator, val] of Object.entries(value)) {
                if (typeof val !== 'number') continue;
                if (!domainAgg[key][indicator]) domainAgg[key][indicator] = { sum: 0, count: 0 };
                domainAgg[key][indicator].sum   += val;
                domainAgg[key][indicator].count += 1;
              }
            }
          });

          const aggregatedData = {};
          for (const [domain, indicators] of Object.entries(domainAgg)) {
            aggregatedData[domain] = {};
            for (const [ind, { sum, count }] of Object.entries(indicators)) {
              if (isRatePer1000Indicator(domain, ind)) {
                aggregatedData[domain][ind] = totalPopulation > 0 ? parseFloat(((sum / totalPopulation) * 1000).toFixed(2)) : 0;
              } else {
                aggregatedData[domain][ind] = count > 0 ? parseFloat((sum / count).toFixed(2)) : 0;
              }
            }
          }

          latestAggregatedData = aggregatedData;
          window.latestAggregatedData = aggregatedData;
          window.chosenCategories     = selectedCategories;

          renderZoneBreakdownTable(selectedIdsArray, dataSource, totalPopulation);
          renderStatsStrip(selectedIdsArray, dataSource);

          const availableKeys   = Object.keys(aggregatedData);
          const validCategories = selectedCategories.filter(c => availableKeys.includes(c));

          updateCategorySelector(availableKeys);

          if (selectedView === 'charts') {
            chartsContainer.style.display = 'grid';
            renderAggregatedCharts(aggregatedData, validCategories);
          } else if (selectedView === 'tables') {
            tablesContainer.style.display = 'block';
            renderAggregatedTables(aggregatedData, validCategories);
          }
        }

        function updateCategorySelector(availableKeys) {
          document.querySelectorAll('#category-form input[type="checkbox"]').forEach(checkbox => {
            const label = checkbox.closest('label');
            if (availableKeys.includes(checkbox.value)) {
              label.style.display = 'block';
            } else {
              label.style.display = 'none';
              checkbox.checked = false;
            }
          });
        }

        // ── Zone breakdown table
        function renderZoneBreakdownTable(selectedIdsArray, dataSource, totalPopulation) {
          const container = document.getElementById('breakdown-container');

          if (!selectedIdsArray.length) {
            container.innerHTML = '';
            container.style.display = 'none';
            window.areaProfileTitle  = undefined;
            window.lastSelectionHash = undefined;
            return;
          }

          container.innerHTML = '';
          container.style.display = 'block';

          const bundeslandStats  = {}; // { Burgenland: { total, ...segmentationClassCounts } }
          const bundeslandTotals = {}; // total zones per Bundesland in full dataset

          for (const [id, z] of Object.entries(dataSource)) {
            const bl = getScalar(z.Bundesland);
            if (bl) bundeslandTotals[bl] = (bundeslandTotals[bl] || 0) + 1;
          }

          const currentSelectionHash = selectedIdsArray.slice().sort().join(',');
          const isSameSelection = currentSelectionHash === window.lastSelectionHash;
          window.lastSelectionHash = currentSelectionHash;
          if (!isSameSelection) window.areaProfileTitle = undefined;

          selectedIdsArray.forEach(id => {
            const z = dataSource[id];
            if (!z) return;
            const bl     = getScalar(z.Bundesland) || 'Unbekannt';
            const segCfgS = SEGMENTATION_CONFIG[activeSegmentation];
            const status  = getScalar(z[segCfgS.dataKey]);

            if (!bundeslandStats[bl]) {
              bundeslandStats[bl] = { total: 0 };
              segCfgS.classes.forEach(c => { bundeslandStats[bl][c.key] = 0; });
            }
            bundeslandStats[bl].total++;
            if (status && bundeslandStats[bl][status] !== undefined) bundeslandStats[bl][status]++;
          });

          const savedTitle = window.areaProfileTitle || 'Click to edit title';
          const layout = document.createElement('div');
          layout.className = 'summary-row';

          const left = document.createElement('div');
          left.className = 'summary-left';

          const editableTitle = document.createElement('h2');
          editableTitle.textContent  = savedTitle;
          editableTitle.contentEditable = true;
          editableTitle.spellcheck   = false;
          editableTitle.title        = 'Click to edit title';
          editableTitle.style.textAlign    = 'left';
          editableTitle.style.marginBottom = '1rem';
          editableTitle.style.outline      = 'none';
          editableTitle.addEventListener('blur', () => {
            window.areaProfileTitle = editableTitle.textContent.trim();
          });
          left.appendChild(editableTitle);

          const heading = document.createElement('h4');
          heading.textContent = 'Summary of Areas Selected:';
          heading.style.marginTop    = '0.5rem';
          heading.style.marginBottom = '1rem';
          left.appendChild(heading);

          const summaryList = document.createElement('ul');
          summaryList.style.listStyleType = 'none';
          summaryList.style.paddingLeft   = '0';
          summaryList.style.textAlign     = 'left';

          const segCfgSummary = SEGMENTATION_CONFIG[activeSegmentation];
          const isEnSummary   = currentLang === 'en';
          Object.keys(bundeslandStats).sort().forEach(bl => {
            const stats      = bundeslandStats[bl];
            const totalInBl  = bundeslandTotals[bl] || stats.total;
            const parts      = segCfgSummary.classes
              .filter(c => c.key !== 'Unbekannt' && stats[c.key] > 0)
              .map(c => `${stats[c.key]} ${isEnSummary ? c.label_en.toLowerCase() : c.label_de.toLowerCase()}`);

            const li = document.createElement('li');
            li.innerHTML = `${escapeHtml(bl)}: <strong>${stats.total} of ${totalInBl}</strong> zones selected${parts.length ? ` (${escapeHtml(parts.join(', '))})` : ''}`;
            summaryList.appendChild(li);
          });
          left.appendChild(summaryList);

          const right = document.createElement('div');
          right.className = 'summary-right';

          const card = document.createElement('div');
          card.className = 'population-card';

          const lbl = document.createElement('div');
          lbl.className   = 'population-label';
          lbl.textContent = 'Population selected';

          const val = document.createElement('div');
          val.className   = 'population-value';
          val.id          = 'totalPopulation';
          val.textContent = totalPopulation.toLocaleString('de-AT');

          card.appendChild(lbl);
          card.appendChild(val);
          right.appendChild(card);
          layout.appendChild(left);
          layout.appendChild(right);
          container.appendChild(layout);
        }

        // ── Tab buttons
        const tabButtons = document.querySelectorAll('.view-tab');
        const views = {
          charts:   document.getElementById('charts-container'),
          tables:   document.getElementById('tables-container'),
        };

        tabButtons.forEach(tab => {
          tab.addEventListener('click', () => {
            tabButtons.forEach(btn => btn.classList.remove('selected'));
            tab.classList.add('selected');
            Object.values(views).forEach(div => div.style.display = 'none');

            const view = tab.getAttribute('data-view');
            currentView = view;

            if (!selectedCategories || selectedCategories.length === 0) return;

            if (view === 'charts') {
              renderAggregatedCharts(latestAggregatedData, selectedCategories);
              views[view].style.display = 'grid';
            } else if (view === 'tables') {
              renderAggregatedTables(latestAggregatedData, selectedCategories);
              views[view].style.display = 'block';
            }
          });
        });

        // ── renderAggregatedTables
        // Austrian data: continuous indicators (already %). Columns: Indikator | Ø Ausgewählt | Österreich Ø
        function renderAggregatedTables(aggregatedData, selectedCategories) {
          if (!aggregatedData || Object.keys(aggregatedData).length === 0) return;
          const valid = selectedCategories.filter(c => Object.keys(aggregatedData).includes(c));
          if (valid.length === 0) return;

          const container = document.getElementById('tables-container');
          container.innerHTML = '';

          const grid = document.createElement('div');
          grid.className = 'table-grid';
          grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:2rem;';

          valid.forEach(domain => {
            const values = aggregatedData[domain];
            if (!values) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'table-wrapper';
            wrapper.style.cssText = 'flex:0 0 calc(50% - 1rem);background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.1);padding:16px;border-radius:8px;box-sizing:border-box;';

            const title = document.createElement('h3');
            title.textContent = tDomain(domain);
            wrapper.appendChild(title);

            const table = document.createElement('table');
            table.className = 'data-table';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            [t('col.indicator'), t('col.selected'), t('col.austria')].forEach(text => {
              const th = document.createElement('th');
              th.textContent = text;
              headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            const atDomain = austriaTotals[domain] || {};

            for (const [indicator, meanVal] of Object.entries(values)) {
              const row = document.createElement('tr');

              const tdLabel = document.createElement('td');
              tdLabel.textContent = displayIndicatorLabel(domain, indicator);
              row.appendChild(tdLabel);

              const fmtV = v => formatIndicatorValue(domain, indicator, v);

              const tdMean = document.createElement('td');
              tdMean.textContent = typeof meanVal === 'number' ? fmtV(meanVal) : '–';
              row.appendChild(tdMean);

              const tdAt = document.createElement('td');
              const atVal = comparableAustriaValue(domain, indicator, atDomain[indicator]);
              tdAt.textContent = typeof atVal === 'number' ? fmtV(atVal) : '–';
              row.appendChild(tdAt);

              tbody.appendChild(row);
            }

            table.appendChild(tbody);
            wrapper.appendChild(table);
            grid.appendChild(wrapper);
          });

          container.appendChild(grid);
          window.latestAggregatedData = aggregatedData;
        }

        // ── renderAggregatedCharts
        // One mini-chart per indicator so each has its own axis scale.
        // Mixing e.g. "Avg household size" (2.37) with "Households per 1,000" (420)
        // on a shared axis makes the small-value bar invisible — this avoids that.
        function renderAggregatedCharts(data, selectedCategories) {
          if (!data || Object.keys(data).length === 0) return;
          const validCategories = selectedCategories.filter(c => Object.keys(data).includes(c));
          if (validCategories.length === 0) return;

          const container = document.getElementById('charts-container');
          container.innerHTML = '';

          window.chartInstances?.forEach(c => c.destroy());
          window.chartInstances = [];

          validCategories.forEach(domain => {
            const values = data[domain];
            if (!values) return;

            const atDomain   = austriaTotals[domain] || {};
            const rawLabels  = Object.keys(values);

            const chartWrapper = document.createElement('div');
            chartWrapper.className = 'chart-wrapper';

            const h3 = document.createElement('h3');
            h3.textContent = tDomain(domain);
            h3.className   = 'chart-domain-heading';
            chartWrapper.appendChild(h3);

            // AT legend line once per domain card
            const legend = document.createElement('div');
            legend.className = 'custom-legend';
            legend.style.cssText = 'font-size:11px;color:#555;padding:6px 14px 2px;display:flex;align-items:center;gap:5px;';
            legend.innerHTML = `<span style="width:3px;height:14px;background:#dc2626;display:inline-block;border-radius:2px;flex-shrink:0;"></span>${escapeHtml(t('col.austria'))}`;
            chartWrapper.appendChild(legend);

            // One mini-chart per indicator
            rawLabels.forEach(rawLabel => {
              const value = values[rawLabel];
              if (typeof value !== 'number') return;
              const atVal  = comparableAustriaValue(domain, rawLabel, atDomain[rawLabel]);
              const fmt    = v => formatIndicatorValue(domain, rawLabel, v);
              const label  = displayIndicatorLabel(domain, rawLabel);

              const maxVal = Math.max(
                value,
                typeof atVal === 'number' ? atVal : 0
              ) * 1.12 || 1;

              const indicatorEl = document.createElement('div');
              indicatorEl.style.cssText = 'padding:0 14px 10px;';

              const labelRow = document.createElement('div');
              labelRow.style.cssText = 'font-size:11px;font-weight:600;color:#1e3a5f;margin-bottom:2px;display:flex;justify-content:space-between;';
              labelRow.innerHTML = `<span>${escapeHtml(label)}</span><span style="font-weight:400;color:#555;">${escapeHtml(fmt(value))}${typeof atVal === 'number' ? ` <span style="color:#dc2626">(AT: ${escapeHtml(fmt(atVal))})</span>` : ''}</span>`;
              indicatorEl.appendChild(labelRow);

              // Fixed-height wrapper is the Chart.js resize anchor.
              // Without it, responsive:true + no maintainAspectRatio → infinite growth loop.
              const canvasWrap = document.createElement('div');
              canvasWrap.style.cssText = 'position:relative;height:22px;width:100%;';
              const canvas = document.createElement('canvas');
              canvasWrap.appendChild(canvas);
              indicatorEl.appendChild(canvasWrap);
              chartWrapper.appendChild(indicatorEl);

              const chart = new Chart(canvas, {
                type: 'bar',
                data: {
                  labels: [''],
                  datasets: [{ data: [value], backgroundColor: '#1e3a5f', borderWidth: 0, barPercentage: 0.7, categoryPercentage: 1 }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  indexAxis: 'y',
                  layout: { padding: 0 },
                  plugins: { legend: { display: false }, tooltip: { enabled: false } },
                  scales: {
                    x: { display: false, min: 0, max: maxVal },
                    y: { display: false }
                  },
                  animation: { duration: 300 }
                },
                plugins: [{
                  id: 'atLine',
                  afterDatasetsDraw(ch) {
                    if (typeof atVal !== 'number') return;
                    const ctx = ch.ctx;
                    const bar = ch.getDatasetMeta(0).data[0];
                    if (!bar) return;
                    const x = ch.scales.x.getPixelForValue(atVal);
                    ctx.save();
                    ctx.strokeStyle = '#dc2626';
                    ctx.lineWidth   = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(x, bar.y - bar.height / 2);
                    ctx.lineTo(x, bar.y + bar.height / 2);
                    ctx.stroke();
                    ctx.restore();
                  }
                }]
              });

              window.chartInstances.push(chart);
            });

            container.appendChild(chartWrapper);
          });
        }

        // ── clearSelections
        function clearSelections() {
          if (sourcesReady) {
            selectedIds.forEach(gkz => {
              const bzId = bezirkGkzToId[gkz];
              const gmId = gemeindeGkzToId[gkz];
              if (bzId !== undefined) map.setFeatureState({ source: 'bezirke',   id: bzId }, { hovered: false });
              if (gmId !== undefined) map.setFeatureState({ source: 'gemeinden', id: gmId }, { hovered: false });
            });
          }

          selectedIds.clear();
          selectedBundeslaender.clear();
          popup.remove();
          const _si = document.getElementById('selection-info');
          if (_si) _si.textContent = '0 zones selected';

          // Elements live in profile.html now — skip if not present
          const _tc = document.getElementById('tables-container');
          if (_tc) { _tc.innerHTML = ''; _tc.style.display = 'none'; }
          const _bc = document.getElementById('breakdown-container');
          if (_bc) _bc.innerHTML = '';
          const statsStrip = document.getElementById('stats-strip');
          if (statsStrip) { statsStrip.innerHTML = ''; statsStrip.style.display = 'none'; }

          document.querySelectorAll('#bundesland-buttons input[type="checkbox"]').forEach(cb => cb.checked = false);
          document.querySelectorAll('.bl-btn').forEach(label => label.classList.remove('selected'));

          const totalPop = document.getElementById('totalPopulation');
          if (totalPop) totalPop.textContent = '0';

          if (sourcesReady) {
            const center = map.getCenter();
            const zoom   = map.getZoom();
            map.jumpTo({ center, zoom: zoom + 0.00001 });
          }

          if (window.chartInstances && window.chartInstances.length > 0) {
            window.chartInstances.forEach(c => { if (c && typeof c.destroy === 'function') c.destroy(); });
            window.chartInstances = [];
          }

          const container = document.getElementById('charts-container');
          if (container) container.innerHTML = '';
        }

        document.getElementById('clear-selection-btn').addEventListener('click', function (e) {
          e.preventDefault();
          this.blur();
          clearSelections();
        });

        // ── Bundesland selector
        document.querySelectorAll('#bundesland-buttons input[type="checkbox"]').forEach(checkbox => {
          checkbox.addEventListener('change', () => {
            const bundeslandName = checkbox.value;
            const label = document.querySelector(`label[for="${checkbox.id}"]`);
            const dataSource = currentZoneType === 'gemeinde' ? gemeindeData : bezirkData;
            const sourceId   = currentZoneType === 'gemeinde' ? 'gemeinden' : 'bezirke';

            const gkzToId = currentZoneType === 'gemeinde' ? gemeindeGkzToId : bezirkGkzToId;

            if (checkbox.checked) {
              selectedBundeslaender.add(bundeslandName);
              label.classList.add('selected');

              Object.entries(dataSource)
                .filter(([, d]) => getScalar(d?.Bundesland) === bundeslandName)
                .forEach(([gkz]) => {
                  if (!selectedIds.has(gkz)) {
                    selectedIds.add(gkz);
                    if (sourcesReady) {
                      const mlId = gkzToId[gkz];
                      if (mlId !== undefined) map.setFeatureState({ source: sourceId, id: mlId }, { hovered: true });
                    }
                  }
                });
            } else {
              selectedBundeslaender.delete(bundeslandName);
              label.classList.remove('selected');

              Array.from(selectedIds)
                .filter(gkz => getScalar(dataSource[gkz]?.Bundesland) === bundeslandName)
                .forEach(gkz => {
                  selectedIds.delete(gkz);
                  if (sourcesReady) {
                    const mlId = gkzToId[gkz];
                    if (mlId !== undefined) map.setFeatureState({ source: sourceId, id: mlId }, { hovered: false });
                  }
                });
            }

            window.selectedIdsExcel = selectedIds;
          });
        });

        // ── aggregateSegmentationData
        // Returns mean indicator values grouped by the active segmentation's classes
        function aggregateUrbanRuralData(selectedIdsArray, selectedCategories) {
          const dataSource = currentZoneType === 'gemeinde' ? gemeindeData : bezirkData;
          const segCfg     = SEGMENTATION_CONFIG[activeSegmentation];
          const classKeys  = segCfg.classes.map(c => c.key);
          const rawGroups  = {};
          const groupPopulations = {};
          classKeys.forEach(k => { rawGroups[k] = {}; });
          classKeys.forEach(k => { groupPopulations[k] = 0; });

          selectedIdsArray.forEach(id => {
            const data    = dataSource[id];
            const segVal  = getScalar(data?.[segCfg.dataKey]);
            if (!data || !classKeys.includes(segVal)) return;
            groupPopulations[segVal] += Number(getScalar(data['Bevölkerung'])) || 0;

            for (const [key, value] of Object.entries(data)) {
              if (excludedKeys.includes(key) || typeof value !== 'object' || value === null) continue;
              if (selectedCategories.length > 0 && !selectedCategories.includes(key)) continue;

              if (!rawGroups[segVal][key]) rawGroups[segVal][key] = {};
              for (const [ind, val] of Object.entries(value)) {
                if (typeof val !== 'number') continue;
                if (!rawGroups[segVal][key][ind]) rawGroups[segVal][key][ind] = { sum: 0, count: 0 };
                rawGroups[segVal][key][ind].sum   += val;
                rawGroups[segVal][key][ind].count += 1;
              }
            }
          });

          // Convert sums to means
          const groups = {};
          classKeys.forEach(k => { groups[k] = {}; });
          for (const g of classKeys) {
            for (const [domain, indicators] of Object.entries(rawGroups[g])) {
              groups[g][domain] = {};
              for (const [ind, { sum, count }] of Object.entries(indicators)) {
                if (isRatePer1000Indicator(domain, ind)) {
                  groups[g][domain][ind] = groupPopulations[g] > 0 ? parseFloat(((sum / groupPopulations[g]) * 1000).toFixed(2)) : 0;
                } else {
                  groups[g][domain][ind] = count > 0 ? parseFloat((sum / count).toFixed(2)) : 0;
                }
              }
            }
          }

          return groups;
        }

        // ── renderUrbanRuralComparison
        window.renderUrbanRuralComparison = function (selectedIdsArray) {
          const groups = aggregateUrbanRuralData(selectedIdsArray, selectedCategories);
          window.urbanRuralComparisonData = groups;

          const container = document.getElementById('urban-rural-comparison');
          if (!container) return; // element removed — just populate the data object

          const segCfgComp  = SEGMENTATION_CONFIG[activeSegmentation];
          const classKeysC  = segCfgComp.classes.map(c => c.key);
          const isEnComp    = currentLang === 'en';
          const allGroupKeysC = Object.keys(groups);

          const categoriesToDisplay = selectedCategories.length
            ? selectedCategories
            : Array.from(new Set(allGroupKeysC.flatMap(g => Object.keys(groups[g] || {}))));

          const rowWrapper = document.createElement('div');
          rowWrapper.style.cssText = 'display:flex;flex-wrap:wrap;gap:20px;';

          categoriesToDisplay.forEach(domain => {
            const activeGrpsC = classKeysC.filter(g => groups[g]?.[domain]);
            if (!activeGrpsC.length) return;

            const allInds = new Set(activeGrpsC.flatMap(g => Object.keys(groups[g]?.[domain] || {})));

            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'flex:0 0 calc(50% - 10px);background:#fff;padding:16px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);box-sizing:border-box;align-self:flex-start;';

            const title = document.createElement('h3');
            title.textContent = `${domain} – ${isEnComp ? segCfgComp.label_en : segCfgComp.label_de}`;
            title.style.marginBottom = '12px';
            wrapper.appendChild(title);

            const table = document.createElement('table');
            table.style.cssText = 'width:100%;border-collapse:collapse;table-layout:fixed;';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const cols = [isEnComp ? 'Indicator' : 'Indikator', ...activeGrpsC.map(g => {
              const cls = segCfgComp.classes.find(c => c.key === g);
              return cls ? (isEnComp ? cls.label_en : cls.label_de) : g;
            }), 'Österreich Ø'].filter(Boolean);

            cols.forEach((col, i) => {
              const th = document.createElement('th');
              th.textContent = col;
              th.style.cssText = 'padding:8px;border:1px solid #ccc;background-color:#1e3a5f;color:#fff;font-weight:bold;font-size:14px;text-align:left;vertical-align:top;white-space:normal;word-break:break-word;';
              if (i === 0) th.style.width = '35%';
              headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            const atDomain = austriaTotals[domain] || {};

            Array.from(allInds).sort().forEach(ind => {
              const row = document.createElement('tr');
              const grpVals = activeGrpsC.map(g => groups[g]?.[domain]?.[ind]);
              const atVal = comparableAustriaValue(domain, ind, atDomain[ind]);

              const rowData = [
                displayIndicatorLabel(domain, ind),
                ...grpVals.map(v => typeof v === 'number' ? formatIndicatorValue(domain, ind, v) : '–'),
                typeof atVal === 'number' ? formatIndicatorValue(domain, ind, atVal) : '–'
              ];

              rowData.forEach((cellText, ci) => {
                const td = document.createElement('td');
                td.textContent = cellText;
                td.style.cssText = 'padding:8px;border:1px solid #ccc;font-size:14px;text-align:left;vertical-align:top;white-space:normal;word-break:break-word;';
                if (ci === 0) td.style.width = '35%';
                row.appendChild(td);
              });

              tbody.appendChild(row);
            });

            table.appendChild(tbody);
            wrapper.appendChild(table);
            rowWrapper.appendChild(wrapper);
          });

          container.appendChild(rowWrapper);
        };

        // ── renderUrbanRuralCharts
        function renderUrbanRuralCharts(selectedIdsArray) {
          const groups    = aggregateUrbanRuralData(selectedIdsArray, selectedCategories);
          const container = document.getElementById('urban-rural-charts');
          if (!container) return;
          container.innerHTML = '';

          window.chartInstances?.forEach(c => c.destroy());
          window.chartInstances = [];

          const segCfg2   = SEGMENTATION_CONFIG[activeSegmentation];
          const classKeys2 = segCfg2.classes.map(c => c.key);
          const colorMap2  = Object.fromEntries(segCfg2.classes.map(c => [c.key, c.color]));
          const isEn2      = currentLang === 'en';
          const segLabel2  = isEn2 ? segCfg2.label_en : segCfg2.label_de;

          const allGroupKeys = Object.keys(groups);
          const categories = selectedCategories.length
            ? selectedCategories
            : Array.from(new Set(allGroupKeys.flatMap(g => Object.keys(groups[g] || {}))));

          const FONT             = '500 11px Inter, sans-serif';
          const LINE_HEIGHT      = 16;
          const BAR_HEIGHT       = 16;
          const BAR_SPACING      = 4;
          const LABEL_BLOCK_H    = LINE_HEIGHT * 2 + 4;
          const CHART_TOP_PAD    = 60;

          const grid = document.createElement('div');
          grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:2rem;';

          categories.forEach(domain => {
            const hasData = allGroupKeys.some(g => groups[g]?.[domain]);
            if (!hasData) return;

            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'flex:0 0 calc(50% - 1rem);background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.1);padding:16px;border-radius:8px;box-sizing:border-box;';

            const title = document.createElement('h3');
            title.textContent = `${domain} – ${segLabel2}`;
            wrapper.appendChild(title);

            const canvas = document.createElement('canvas');
            canvas.style.cssText = 'display:block;margin-top:-50px;width:100%;max-height:none;';
            wrapper.appendChild(canvas);
            grid.appendChild(wrapper);

            const labelSet = new Set(allGroupKeys.flatMap(g => Object.keys(groups[g]?.[domain] || {})));
            const labels = Array.from(labelSet).sort();

            const activeGroups = classKeys2.filter(g => groups[g]?.[domain]);
            const datasets = activeGroups.map(g => {
              const isEn3  = currentLang === 'en';
              const cls    = segCfg2.classes.find(c => c.key === g);
              const lbl    = cls ? (isEn3 ? cls.label_en : cls.label_de) : g;
              return {
                label: lbl,
                data: labels.map(l => groups[g][domain]?.[l] ?? 0),
                backgroundColor: colorMap2[g] || '#94a3b8',
                barThickness: BAR_HEIGHT
              };
            });

            const atDomain    = austriaTotals[domain] || {};
            const atLineVals  = labels.map(l => comparableAustriaValue(domain, l, atDomain[l]));

            datasets.push({
              label: 'Österreich Ø',
              data: [],
              type: 'line',
              borderColor: '#dc2626',
              borderWidth: 2,
              fill: false,
              pointRadius: 0
            });

            const barsPerGroup  = activeGroups.length;
            const isShortChart  = labels.length <= 3;
            const EXTRA_SPACE   = isShortChart ? 20 : 8;
            const GROUP_SPACING = LABEL_BLOCK_H + barsPerGroup * (BAR_HEIGHT + BAR_SPACING) + EXTRA_SPACE;
            const canvasHeight  = labels.length * GROUP_SPACING + CHART_TOP_PAD;
            canvas.height       = canvasHeight;
            wrapper.style.height = `${canvasHeight + 120}px`;

            requestAnimationFrame(() => {
              const chart = new Chart(canvas, {
                type: 'bar',
                data: { labels, datasets },
                options: {
                  indexAxis: 'y',
                  responsive: true,
                  maintainAspectRatio: false,
                  layout: { padding: { top: CHART_TOP_PAD, left: 10, right: 10, bottom: 30 } },
                  plugins: {
                    legend: { position: 'top' },
                    tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${formatIndicatorValue(domain, ctx.label, ctx.raw)}` } }
                  },
                  scales: {
                    x: {
                      beginAtZero: true,
                      suggestedMax: Math.max(
                        ...datasets.flatMap(ds => ds.data || []),
                        ...atLineVals.filter(v => v !== null)
                      ) * 1.05,
                      title: { display: true, text: domain === RATE_PER_1000_DOMAIN ? 'Rate per 1,000 residents' : 'Value' },
                      ticks: { callback: val => formatIndicatorValue(domain, labels[0] || '', Number(val)) }
                    },
                    y: { ticks: { display: false }, grid: { display: false }, offset: true }
                  }
                },
                plugins: [
                  {
                    id: 'aboveGroupLabels',
                    afterDatasetsDraw(chart) {
                      const ctx    = chart.ctx;
                      ctx.save();
                      ctx.font          = FONT;
                      ctx.fillStyle     = '#000';
                      ctx.textAlign     = 'left';
                      ctx.textBaseline  = 'top';
                      const xStart = chart.chartArea.left + 4;

                      chart.data.labels.forEach((label, i) => {
                        const bars = activeGroups.map(g =>
                          chart.getDatasetMeta(datasets.findIndex(d => d.label === g)).data[i]
                        );
                        const topBar    = bars[0];
                        const bottomBar = bars[bars.length - 1];
                        if (!topBar || !bottomBar) return;

                        const topY   = topBar.y - topBar.height / 2;
                        const labelY = topY - LABEL_BLOCK_H - 2;
                        ctx.fillText(displayIndicatorLabel(domain, label), xStart, labelY);

                        const groupText = activeGroups
                          .map(g => `${g}: ${typeof groups[g][domain]?.[label] === 'number' ? formatIndicatorValue(domain, label, groups[g][domain][label]) : '–'}`)
                          .join(' | ');
                        const atVal   = comparableAustriaValue(domain, label, atDomain[label]);
                        const atText  = typeof atVal === 'number' ? `AT: ${formatIndicatorValue(domain, label, atVal)}` : null;
                        const breakdown = atText ? `${groupText} | ${atText}` : groupText;
                        ctx.fillText(breakdown, xStart, labelY + LINE_HEIGHT);
                      });

                      ctx.restore();
                    }
                  },
                  {
                    id: 'atLine',
                    afterDatasetsDraw(chart) {
                      const ctx    = chart.ctx;
                      const xScale = chart.scales.x;
                      ctx.save();
                      ctx.strokeStyle = '#dc2626';
                      ctx.lineWidth   = 3;
                      ctx.setLineDash([]);

                      atLineVals.forEach((val, i) => {
                        if (val == null) return;
                        const x    = xScale.getPixelForValue(val);
                        const bars = activeGroups.map(g =>
                          chart.getDatasetMeta(datasets.findIndex(d => d.label === g)).data[i]
                        );
                        const top    = bars[0]?.y - bars[0]?.height / 2;
                        const bottom = bars[bars.length - 1]?.y + bars[bars.length - 1]?.height / 2;
                        if (x && top && bottom) {
                          ctx.beginPath();
                          ctx.moveTo(x, top);
                          ctx.lineTo(x, bottom);
                          ctx.stroke();
                        }
                      });

                      ctx.restore();
                    }
                  }
                ]
              });

              window.chartInstances.push(chart);
            });
          });

          container.appendChild(grid);
        }

        // ── Group-toggle behavior
        document.querySelectorAll('.group-toggle').forEach(button => {
          const content = button.nextElementSibling;
          const label   = button.textContent.trim();

          // Open all groups by default
          content.style.display = 'block';
          button.textContent = label.replace('▼', '▲');

          button.addEventListener('click', () => {
            const isVisible = content.style.display !== 'none';
            content.style.display = isVisible ? 'none' : 'block';
            button.textContent = label.replace(isVisible ? '▲' : '▼', isVisible ? '▼' : '▲');
          });
        });

      }); // end DOMContentLoaded

      // ── downloadSummaryImage
      function waitForImagesToLoad(container) {
        const images   = container.querySelectorAll('img');
        const promises = Array.from(images).map(img => new Promise(resolve => {
          if (img.complete) resolve();
          else img.onload = img.onerror = resolve;
        }));
        return Promise.all(promises);
      }

      function downloadSummaryImage() {
        const selectedTab = document.querySelector('.view-tab.selected');
        const view = selectedTab ? selectedTab.getAttribute('data-view') : 'charts';

        const breakdownContainer = document.getElementById('breakdown-container');
        const contentSource = ({
          charts:  document.getElementById('charts-container'),
          tables:  document.getElementById('tables-container'),
        })[view];

        if (!contentSource) return;

        const cloneWrapper = document.createElement('div');
        cloneWrapper.style.cssText = 'background:#fff;padding:20px;font-family:sans-serif;max-width:1200px;margin:0 auto;';

        const breakdownClone = breakdownContainer.cloneNode(true);
        const contentClone   = contentSource.cloneNode(true);

        if (view === 'charts') {
          const chartWrapper = document.createElement('div');
          chartWrapper.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:20px;';
          const origCards   = contentSource.querySelectorAll('.chart-wrapper');
          const clonedCards = contentClone.querySelectorAll('.chart-wrapper');

          origCards.forEach((origCard, i) => {
            const clonedCard   = clonedCards[i];
            const origCanvas   = origCard.querySelector('canvas');
            const clonedCanvas = clonedCard?.querySelector('canvas');
            if (origCanvas && clonedCanvas) {
              const img = new Image();
              img.src = origCanvas.toDataURL('image/png');
              img.style.cssText = 'max-width:100%;display:block;margin-top:10px;';
              clonedCanvas.parentNode.replaceChild(img, clonedCanvas);
            }
            if (clonedCard) chartWrapper.appendChild(clonedCard);
          });

          contentClone.innerHTML = '';
          contentClone.appendChild(chartWrapper);
        }

        contentClone.style.cssText = 'display:block;visibility:visible;';
        cloneWrapper.appendChild(breakdownClone);
        cloneWrapper.appendChild(document.createElement('hr'));
        cloneWrapper.appendChild(contentClone);
        document.body.appendChild(cloneWrapper);
        cloneWrapper.offsetHeight;

        waitForImagesToLoad(cloneWrapper).then(() =>
          new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(() =>
            html2canvas(cloneWrapper, { useCORS: true, scale: 2, backgroundColor: '#ffffff' }).then(resolve)
          )))
        ).then(canvas => {
          const finalCanvas = document.createElement('canvas');
          finalCanvas.width  = canvas.width;
          finalCanvas.height = canvas.height + 40;

          const ctx = finalCanvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
          ctx.drawImage(canvas, 0, 0);
          ctx.font      = '12px sans-serif';
          ctx.fillStyle = '#666666';
          ctx.textAlign = 'right';
          ctx.fillText(
            'Datenquelle: Statistik Austria OGD | OGDEXT_AEST_GEMTAB_1',
            finalCanvas.width - 20,
            canvas.height + 25
          );

          const link  = document.createElement('a');
          link.download = 'area-summary.png';
          link.href   = finalCanvas.toDataURL('image/png');
          link.click();
          document.body.removeChild(cloneWrapper);
        });
      }

      // ── downloadExcel
      function downloadExcel() {
        const selectedArray    = Array.from(window.selectedIdsExcel || []);
        renderUrbanRuralComparison(selectedArray);

        const aggregated       = window.latestAggregatedData  || {};
        const comparison       = window.urbanRuralComparisonData || {};
        const chosenCategories = window.chosenCategories || [];
        const atTotals         = window.austriaTotals    || {};
        const workbook         = XLSX.utils.book_new();
        const segCfgXlsx   = SEGMENTATION_CONFIG[activeSegmentation];
        const segGroupNames = segCfgXlsx.classes.map(c => c.key);

        (chosenCategories.length ? chosenCategories : Object.keys(aggregated)).forEach(domain => {
          const sheetData = [];

          sheetData.push([{ v: domain, t: 's' }]);
          sheetData.push([
            { v: 'Indikator',     t: 's' },
            { v: 'Ø Ausgewählt', t: 's' },
            { v: 'Österreich Ø', t: 's' }
          ]);

          const values = aggregated[domain] || {};
          const atDom  = atTotals[domain] || {};

          for (const [ind, meanVal] of Object.entries(values)) {
            const atVal = comparableAustriaValue(domain, ind, atDom[ind]);
            const isPct = ind.includes('(%)');
            sheetData.push([
              { v: displayIndicatorLabel(domain, ind), t: 's' },
              { v: typeof meanVal === 'number' ? (isPct ? meanVal / 100 : meanVal) : null, t: 'n', z: isPct ? '0.0%' : '0.0' },
              { v: typeof atVal   === 'number' ? (isPct ? atVal / 100 : atVal) : null, t: 'n', z: isPct ? '0.0%' : '0.0' }
            ]);
          }

          sheetData.push([]);

          segGroupNames.forEach(g => {
            const groupDomainData = comparison[g]?.[domain];
            if (!groupDomainData || Object.keys(groupDomainData).length === 0) return;

            sheetData.push([{ v: `${domain} – ${g}`, t: 's' }]);
            sheetData.push([
              { v: 'Indikator',     t: 's' },
              { v: `Ø ${g}`,       t: 's' },
              { v: 'Österreich Ø', t: 's' }
            ]);

            for (const [ind, meanVal] of Object.entries(groupDomainData)) {
              const atVal = comparableAustriaValue(domain, ind, atDom[ind]);
              const isPct = ind.includes('(%)');
              sheetData.push([
                { v: displayIndicatorLabel(domain, ind), t: 's' },
                { v: typeof meanVal === 'number' ? (isPct ? meanVal / 100 : meanVal) : null, t: 'n', z: isPct ? '0.0%' : '0.0' },
                { v: typeof atVal   === 'number' ? (isPct ? atVal / 100 : atVal) : null, t: 'n', z: isPct ? '0.0%' : '0.0' }
              ]);
            }

            sheetData.push([]);
          });

          const worksheet = XLSX.utils.aoa_to_sheet(sheetData);
          XLSX.utils.book_append_sheet(workbook, worksheet, domain.substring(0, 31));
        });

        XLSX.writeFile(workbook, 'austria_area_profile.xlsx');
      }

      // ── Cluster typology
      function displayClusterProfiles(profiles, atProfile) {
        const container = document.getElementById('cluster-profiles');
        container.innerHTML = '<h3>Cluster Typology Profiles</h3>';

        profiles.forEach(profile => {
          const clusterNum       = profile.cluster;
          const clusterContainer = document.createElement('div');
          clusterContainer.style.margin = '1rem 0';

          const title = document.createElement('h4');
          title.textContent = `Cluster ${clusterNum}`;
          clusterContainer.appendChild(title);

          const diffs = Object.entries(profile)
            .filter(([key]) => key !== 'cluster')
            .map(([key, val]) => {
              const at = atProfile?.[key];
              if (at == null || typeof val !== 'number' || at === 0) return null;
              return { label: key, pct: ((val - at) / at) * 100 };
            })
            .filter(x => x && x.pct > 0)
            .sort((a, b) => b.pct - a.pct)
            .slice(0, 3);

          if (diffs.length === 0) {
            const p = document.createElement('p');
            p.textContent = 'Keine Variable deutlich über Österreich-Durchschnitt.';
            clusterContainer.appendChild(p);
          } else {
            const table = document.createElement('table');
            table.style.borderCollapse = 'collapse';
            table.innerHTML = `
              <thead>
                <tr>
                  <th style="border:1px solid #ccc;padding:4px;text-align:left;">Variable</th>
                  <th style="border:1px solid #ccc;padding:4px;">% über Österreich Ø</th>
                </tr>
              </thead>`;
            const tbody = document.createElement('tbody');
            diffs.forEach(d => {
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td style="border:1px solid #ccc;padding:4px;">${escapeHtml(d.label)}</td>
                <td style="border:1px solid #ccc;padding:4px;text-align:right;">${escapeHtml(d.pct.toFixed(1))}%</td>`;
              tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            clusterContainer.appendChild(table);
          }

          container.appendChild(clusterContainer);
        });
      }


    </script>
